name: Build token-exchange-svc
run-name: Build token-exchange-svc (${{ inputs.ref }})

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build from DIGIT-keycloak-overlay"
        required: false
        default: "main"
      repo:
        description: "Source repository (owner/repo)"
        required: false
        default: "ChakshuGautam/DIGIT-keycloak-overlay"

env:
  IMAGE_NAME: token-exchange-svc
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}

jobs:
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}

      - name: Generate tag
        id: tag
        run: |
          RAW_REF="${{ inputs.ref }}"
          BRANCH=$(printf '%s' "$RAW_REF" | tr '/:@' '-' | sed 's/[^A-Za-z0-9_.-]/-/g')
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          TAG="${BRANCH}-${COMMIT_HASH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "### Tag: \`$TAG\`" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build ${{ matrix.arch }}
    needs: resolve-tag
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ env.IMAGE_NAME }}-${{ inputs.ref }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ env.IMAGE_NAME }}-

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file Dockerfile \
            --tag egovio/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}-${{ matrix.arch }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --push \
            .

  manifest:
    name: Create manifest
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          docker manifest create egovio/${{ env.IMAGE_NAME }}:${TAG} \
            egovio/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            egovio/${{ env.IMAGE_NAME }}:${TAG}-arm64
          docker manifest push egovio/${{ env.IMAGE_NAME }}:${TAG}

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`egovio/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ inputs.repo }}@${{ needs.resolve-tag.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
