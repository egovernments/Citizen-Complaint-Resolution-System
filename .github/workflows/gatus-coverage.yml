name: Gatus coverage

# Every service Compose or k3s deploys must have a Gatus check, and the two tiers'
# endpoint catalogues must stay identical.
#
# This exists because the gap is silent by construction: egov-url-shortening sat
# DOWN for days and the whole mcp stack ran unwatched, because nothing fails when
# a service simply isn't on the dashboard. A missing check looks exactly like a
# healthy one. So the guard has to be mechanical.
#
# Adding a service now fails CI until it is either monitored or listed in EXEMPT
# with a reason — the decision is forced, not forgotten.

# The two path lists below are duplicated deliberately, and MUST stay identical.
# GitHub Actions does not expand YAML anchors, so an anchor here would silently
# drop the push filter rather than share the list -- worse than the duplication.
#
# They must cover every file check-gatus-coverage.py reads (every compose file in
# its COMPOSE_FILES, plus both gatus configs) AND the script and this workflow,
# so that a change breaking a detector re-runs the script's own --self-test.
# A push filter narrower than the pull_request one lets a direct push to develop
# touching only an unwatched file skip the guard -- exactly the silent gap this
# workflow exists to close.
#
# The compose entries are globs rather than a list of names on purpose. An
# enumeration here has to be kept in step with COMPOSE_FILES by hand, and when it
# drifts the failure is silent: a PR touching only the unlisted file never triggers
# this workflow at all, so the guard cannot report what it was never run to see.
# A glob cannot drift. (The script separately fails if COMPOSE_FILES itself misses
# a file that exists on disk, which is the same gap one layer down.)
on:
  pull_request:
    paths:
      - 'local-setup/docker-compose*.yml'
      - 'local-setup/docker-compose*.yaml'
      - 'local-setup/gatus/config.yaml'
      - 'local-setup/k8s/**'
      - '.github/scripts/check-gatus-coverage.py'
      - '.github/workflows/gatus-coverage.yml'
  push:
    branches: [develop]
    paths:
      - 'local-setup/docker-compose*.yml'
      - 'local-setup/docker-compose*.yaml'
      - 'local-setup/gatus/config.yaml'
      - 'local-setup/k8s/**'
      - '.github/scripts/check-gatus-coverage.py'
      - '.github/workflows/gatus-coverage.yml'

permissions:
  contents: read

jobs:
  gatus-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install deps
        run: pip install pyyaml
      - name: Self-test the coverage check
        run: python3 .github/scripts/check-gatus-coverage.py --self-test
      - name: Check every deployed service has a Gatus check
        run: python3 .github/scripts/check-gatus-coverage.py
