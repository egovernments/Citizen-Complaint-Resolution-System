# DIGIT Production Deployments (Hetzner VPC)
#
# Bomet:   https://bometfeedbackhub.digit.org/digit-ui/     SSH: ssh egov-bomet
#           https://bometfeedbackhub.digit.org/configurator/
# Nairobi: https://naipepea.digit.org/digit-ui/              SSH: ssh egov-nairobi
#           https://naipepea.digit.org/configurator/
#
# Deploy:  ./deploy-bomet.sh   or   ./deploy-nairobi.sh
#
# UI Serving: Both servers support two modes (only one active at a time on port 18080):
#   - Docker mode:  digit-ui container (static nginx) — started by Ansible / docker start digit-ui
#   - HMR mode:     esbuild.dev.js in tmux session "esbuild" at /opt/digit-ui-esbuild/
#   Check: ssh egov-bomet "tmux has-session -t esbuild 2>/dev/null && echo HMR || echo Docker"
#
# WARNING: Ansible starts the digit-ui Docker container. If HMR is active, stop esbuild first
#          or the container will fail to bind port 18080.

[bomet]
10.0.0.2 ansible_user=root domain=bometfeedbackhub.digit.org

[nairobi]
10.0.0.5 ansible_user=root domain=naipepea.digit.org

[targets:children]
bomet
nairobi

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
