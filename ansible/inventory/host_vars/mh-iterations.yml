# mh-iterations — test/iteration sandbox box reachable via Tailscale.
# Used to dry-run deploy changes before touching naipepea/bomet.

ansible_host: 100.70.82.47
domain: mh-iterations.local

# No Let's Encrypt cert for this Tailscale-only sandbox. Renders nginx
# without the `listen 443 ssl;` block + cert mounts. Default elsewhere
# is true (Nairobi/Bomet have certbot-managed certs).
tls_enabled: false

# Opt into the DB fast-path overlay: pre-loads db/full-dump.sql into
# Postgres at first boot, so db-migrations and the seed-* containers
# become quick no-ops. Sandbox-only — Bomet/Nairobi keep the default
# (off) because the dump pre-dates their tenant data.
db_fast_path: true

# Tenancy — reuse Nairobi's keys for fixture parity, but at the city level.
state_tenant_id: ke.nairobi
boot_tenant: ke.nairobi
tenant_id: ke.nairobi

map_center:
  lat: -1.2921
  lng: 36.8219

login_tenant_allowlist:
  - ke.nairobi
employee_module_denylist:
  - IM

footer_logo_url: ""
footer_bw_logo_url: ""

digit_ui_mode: static
enable_search_stack: false

nginx_features:
  brand_assets: false
  configurator: false
  configurator_caching: false
  status: true
  api_pgr: false
  mcp: true

secrets_path: kv/digit/mh-iterations

bootstrap_secrets:
  postgres_password: egov123
  mcp_db_password: mcp123
  minio_root_user: minioadmin
  minio_root_password: minioadmin
  # Must match the master password the dump's eg_enc_*_keys were encrypted
  # with — when db_fast_path: true, the dump pre-loads keys that only
  # decrypt under this exact value. Changing it produces AEADBadTagException
  # in egov-enc-service on startup. Bomet/Nairobi (no fast-path) are free
  # to set their own master password.
  elasticsearch_master_password: "asd@#$@$!132123"
  egov_hrms_default_password: "eGov@123"
