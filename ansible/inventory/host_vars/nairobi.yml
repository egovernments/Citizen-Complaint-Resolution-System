# Nairobi City County Government — naipepea.digit.org
# VPC IP: 10.0.0.5 — SSH alias `egov-nairobi`

ansible_host: 10.0.0.5
domain: naipepea.digit.org

# Tenancy
state_tenant_id: ke.nairobi      # citizen UI pins to this single city
boot_tenant: ke.nairobi
tenant_id: ke.nairobi

# Map centre — Nairobi CBD
map_center:
  lat: -1.2921
  lng: 36.8219

# Tenant restrictions
login_tenant_allowlist:
  - ke.nairobi
employee_module_denylist:
  - IM

# Brand assets are mirrored locally to /var/www/brand/ so the SPA pulls
# them from the same origin (avoids CORS on theme.config images).
footer_logo_url: "https://naipepea.digit.org/brand/digit-footer.png"
footer_bw_logo_url: "https://naipepea.digit.org/brand/digit-footer-bw.png"

# digit-ui serving mode:
#   hmr     → host-side esbuild.dev.js in tmux session `esbuild`,
#             watching /opt/digit-ui-esbuild for live reload. Pull a
#             code change with `cd /opt/digit-ui-esbuild && git pull`.
#   static  → host nginx serves /opt/digit-ui-esbuild/build/ directly
#             (no Docker container, no esbuild dev server). Bundle is
#             produced by `node esbuild.build.js` at deploy time.
# Nairobi runs HMR for active dev; Bomet runs static for stability.
digit_ui_mode: hmr

# Nairobi runs the search stack today (egov-indexer + elasticsearch are
# healthy; digit-inbox itself has been Exited(1) for weeks but the
# indexer + ES are live and may be queried by other services). Keep it
# enabled to preserve the current state. Flip to false on the next
# deploy if you want to drop the broken inbox + lighten the box.
enable_search_stack: true

# Pull + start the digit-mcp + mcp-postgres containers. They live in the
# Hetzner VPC registry (10.0.0.4:5000) and only Nairobi/mh-iterations
# reach it. Defaults to false elsewhere so a public-internet deploy
# doesn't try to pull an image it can't see (compose validates every
# image before starting *any* service, so an unreachable MCP image
# would prevent the whole stack from coming up).
enable_mcp: true

# nginx features — Nairobi is the canonical "everything on" deployment.
nginx_features:
  brand_assets: true
  configurator: true
  configurator_caching: true
  status: true
  api_pgr: true
  mcp: true

# Pointer to the OpenBao path holding this tenant's secrets (DB password,
# Keycloak admin, OAuth client secrets, registry creds, …). The path
# itself is non-sensitive; what's behind it is. Once OpenBao is online,
# the playbook does `vault_kv2_get(secrets_path)` to pull values.
secrets_path: kv/digit/nairobi

# Bootstrap secrets — seeded once into OpenBao on first deploy ONLY.
# Subsequent edits happen via `bao kv put` / the UI, not by editing
# this file (the playbook uses cas=0 on the seed — once OpenBao has
# v1, edits here are ignored).
#
# These exact keys are pulled at every deploy (via vault_kv2_get) and
# written to /opt/digit/.env, which docker compose auto-loads. So the
# values below become the seed values; rotate via OpenBao.
#
# Defaults below match the values previously inlined in
# docker-compose.egov-digit.yaml, so the first deploy after this PR is
# no-op — the secrets just move from YAML literals to OpenBao with no
# change in effect. After deploy, rotate any of them via:
#   ssh -L 18200:127.0.0.1:18200 egov-nairobi
#   bao kv put kv/digit/nairobi postgres_password='new-strong'
bootstrap_secrets:
  postgres_password: egov123
  mcp_db_password: mcp123
  minio_root_user: minioadmin
  minio_root_password: minioadmin
  elasticsearch_master_password: "asd@#$@$!132123"
  egov_hrms_default_password: "eGov@123"
