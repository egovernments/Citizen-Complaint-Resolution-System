# Nairobi City County Government — naipepea.digit.org
# VPC IP: 10.0.0.5 — SSH alias `egov-nairobi`

ansible_host: 10.0.0.5
domain: naipepea.digit.org

# Tenancy
state_tenant_id: ke.nairobi      # citizen UI pins to this single city
boot_tenant: ke.nairobi
tenant_id: ke.nairobi

# Map centre — Nairobi CBD
map_center:
  lat: -1.2921
  lng: 36.8219

# Tenant restrictions
login_tenant_allowlist:
  - ke.nairobi
employee_module_denylist:
  - IM

# Brand assets are mirrored locally to /var/www/brand/ so the SPA pulls
# them from the same origin (avoids CORS on theme.config images).
footer_logo_url: "https://naipepea.digit.org/brand/digit-footer.png"
footer_bw_logo_url: "https://naipepea.digit.org/brand/digit-footer-bw.png"

# digit-ui serving mode:
#   hmr     → host-side esbuild.dev.js in tmux session `esbuild`,
#             watching /opt/digit-ui-esbuild for live reload. Pull a
#             code change with `cd /opt/digit-ui-esbuild && git pull`.
#   static  → digit-ui Docker container serving the pre-built bundle
#             baked into the image (no live reload).
# Both modes bind port 18080 and serve / under nginx.
# Nairobi runs HMR for active dev; Bomet runs static for stability.
digit_ui_mode: hmr

# nginx features — Nairobi is the canonical "everything on" deployment.
nginx_features:
  brand_assets: true
  configurator: true
  configurator_caching: true
  status: true
  api_pgr: true
  mcp: true
  esbuild_root: true

# Pointer to the OpenBao path holding this tenant's secrets (DB password,
# Keycloak admin, OAuth client secrets, registry creds, …). The path
# itself is non-sensitive; what's behind it is. Once OpenBao is online,
# the playbook does `vault_kv2_get(secrets_path)` to pull values.
secrets_path: kv/digit/nairobi

# Bootstrap secrets — seeded once into OpenBao on first deploy ONLY.
# Subsequent edits should happen via `bao kv put` / the UI, not by
# editing this file (the playbook uses cas=0 on the seed write so it
# won't overwrite later versions). Empty map = no auto-seeding; you
# can populate later from the UI.
#
# Once OpenBao is the source of truth, sensitive values like
# postgres_password, keycloak_admin_password, registry creds, etc.
# move under this key. For now we seed nothing (the inline values in
# compose still apply); the next PR replaces those with vault lookups.
bootstrap_secrets: {}
