# DIGIT production deployments (Hetzner VPC).
#
# Each host is a fully independent DIGIT stack. All per-tenant
# configuration lives in `host_vars/<host>.yml`; common defaults
# in `group_vars/digit.yml`; secrets in OpenBao (path stored as
# `secrets_path:` in each host_vars file).
#
# Deploy:  ./deploy.sh nairobi
#          ./deploy.sh bomet
#
# Add a new tenant: create host_vars/<name>.yml and add the host
# under `digit:` below. No script changes needed.

all:
  children:
    digit:
      hosts:
        nairobi:
        bomet:
        mh-iterations:
      vars:
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
