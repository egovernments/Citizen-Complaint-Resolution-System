# Server
server.port=8080
server.servlet.context-path=/config-service

# Database (PostgreSQL - overridden by env vars in K8s)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres4}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# Flyway
spring.flyway.url=${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/postgres4}
spring.flyway.user=${SPRING_FLYWAY_USER:postgres}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD:1234}
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:db/migration/main
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.validate-on-migrate=false

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Actuator
management.endpoints.web.base-path=/

# App Defaults
config.default.offset=0
config.default.limit=10

# Timezone
app.timezone=${APP_TIMEZONE:UTC}

# MDMS v2 Integration (unified-dev defaults)
mdms.v2.host=${MDMS_V2_HOST:http://mdms-v2.egov:8080}
mdms.v2.schema.search.path=${MDMS_V2_SCHEMA_SEARCH_PATH:/mdms-v2/schema/v1/_search}
mdms.v2.validation.enabled=${MDMS_V2_VALIDATION_ENABLED:true}

# Encryption Service Integration (enc-client) - unified-dev defaults
state.level.tenant.id=${STATE_LEVEL_TENANT_ID:dev}
encryption.service.enabled=${ENCRYPTION_SERVICE_ENABLED:true}

# eGov Encryption Service Configuration (enc-client endpoints) - unified-dev defaults
egov.enc.host=${EGOV_ENC_HOST:http://egov-enc-service.egov:8080}
egov.enc.encrypt.endpoint=${EGOV_ENC_ENCRYPT_ENDPOINT:/egov-enc-service/crypto/v1/_encrypt}
egov.enc.decrypt.endpoint=${EGOV_ENC_DECRYPT_ENDPOINT:/egov-enc-service/crypto/v1/_decrypt}

# HTTP Client Timeout Configuration (for enc-client)
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# RestTemplate timeout settings (affects enc-client internally)
http.client.connection.timeout=${HTTP_CLIENT_CONNECTION_TIMEOUT:30000}
http.client.read.timeout=${HTTP_CLIENT_READ_TIMEOUT:60000}

# Kafka Configuration (required by tracer/enc-client) - unified-dev defaults
kafka.config.bootstrap_server_config=${KAFKA_BROKER_HOST:kafka.backbone:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.retries=10

# Tracer Configuration (required by enc-client) - unified-dev defaults  
tracer.detailed.tracing.enabled=${TRACER_DETAILED_TRACING_ENABLED:false}
tracer.errors.sendToKafka=${TRACER_ERRORS_SEND_TO_KAFKA:false}

# Audit Configuration (required by tracer)
kafka.topic.audit=${KAFKA_TOPIC_AUDIT:egov.core.audit}
