# Test configuration - uses H2 in-memory database
server.port=8080
server.servlet.context-path=/config-service

# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:configdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Flyway for tests, use schema-test.sql instead
spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Actuator
management.endpoints.web.base-path=/

# App Defaults
config.default.offset=0
config.default.limit=10

# Timezone
app.timezone=UTC

# MDMS v2 - disabled for tests  
mdms.v2.validation.enabled=false
mdms.v2.host=

# Encryption Service Configuration - mock for tests
encryption.service.enabled=false
egov.enc.host=http://mock-enc-service
egov.enc.encrypt.endpoint=/mock/encrypt
egov.enc.decrypt.endpoint=/mock/decrypt

# HTTP Client Timeout Configuration
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
http.client.connection.timeout=30000
http.client.read.timeout=60000
