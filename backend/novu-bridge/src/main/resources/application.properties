server.contextPath=/novu-bridge
server.context-path=/novu-bridge
server.servlet.context-path=/novu-bridge
server.port=8290
app.timezone=UTC

# Kafka
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=novu-bridge
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

novu.bridge.kafka.input.topic=${NOVU_BRIDGE_KAFKA_INPUT_TOPIC:complaints.domain.events}
novu.bridge.kafka.retry.topic=${NOVU_BRIDGE_KAFKA_RETRY_TOPIC:novu-bridge.retry}
novu.bridge.kafka.dlq.topic=${NOVU_BRIDGE_KAFKA_DLQ_TOPIC:novu-bridge.dlq}
novu.bridge.max.retries=${NOVU_BRIDGE_MAX_RETRIES:3}
novu.bridge.channel=${NOVU_BRIDGE_CHANNEL:SMS}
novu.bridge.default.locale=${NOVU_BRIDGE_DEFAULT_LOCALE:en_IN}

# External dependencies
novu.bridge.preference.enabled=${NOVU_BRIDGE_PREFERENCE_ENABLED:true}
novu.bridge.preference.host=${NOVU_BRIDGE_PREFERENCE_HOST:http://digit-user-preferences-service.egov:8080/user-preference}
novu.bridge.preference.check.path=${NOVU_BRIDGE_PREFERENCE_CHECK_PATH:/v1/_search}
novu.bridge.preference.code=${NOVU_BRIDGE_PREFERENCE_CODE:USER_NOTIFICATION_PREFERENCES}

novu.bridge.user.host=${NOVU_BRIDGE_USER_HOST:http://egov-user.egov:8080}
novu.bridge.user.search.path=${NOVU_BRIDGE_USER_SEARCH_PATH:/user/_search}

# Proxy auth: the read-only configurator GETs (/novu-adapter/v1/logs|integrations)
# are validated server-side by introspecting the DIGIT bearer token against
# egov-user /user/_details, then requiring type==EMPLOYEE + an allowlisted role.
novu.bridge.proxy.auth.enabled=${NOVU_BRIDGE_PROXY_AUTH_ENABLED:true}
novu.bridge.user.details.path=${NOVU_BRIDGE_USER_DETAILS_PATH:/user/_details}
novu.bridge.proxy.allowed.roles=${NOVU_BRIDGE_PROXY_ALLOWED_ROLES:EMPLOYEE,SUPERUSER,GRO,PGR_LME}

# ---- Config-driven pass-through delivery ----
# Per-channel Novu workflow ids; PGR's renderedBody travels in payload.body.
novu.bridge.workflow.id.sms=${NOVU_BRIDGE_WORKFLOW_ID_SMS:complaints-sms}
novu.bridge.workflow.id.whatsapp=${NOVU_BRIDGE_WORKFLOW_ID_WHATSAPP:complaints-whatsapp}
novu.bridge.workflow.id.email=${NOVU_BRIDGE_WORKFLOW_ID_EMAIL:complaints-email}
# Subscriber identify (upsert) TTL cache window.
novu.bridge.identify.cache.ttl.ms=${NOVU_BRIDGE_IDENTIFY_CACHE_TTL_MS:300000}
# Channels actually delivered. WHATSAPP is intentionally absent until a
# legitimate provider (Meta Cloud API / Twilio WhatsApp as a Novu integration
# behind a v2-native complaints-whatsapp workflow) is onboarded; until then
# WHATSAPP events persist SKIPPED/NB_NO_PROVIDER in nb_dispatch_log.
novu.bridge.channels.enabled=${NOVU_BRIDGE_CHANNELS_ENABLED:SMS,EMAIL}

mdms.host=${MDMS_HOST:http://mdms-v2.egov:8080}
mdms.search.path=${MDMS_SEARCH_PATH:/egov-mdms-service/v2/_search}

novu.base.url=${NOVU_BASE_URL:http://novu-api.novu:3000}
novu.api.key=${NOVU_API_KEY:test-api-key-123}

# Outbound HTTP timeouts — every call runs on the Kafka listener thread; a
# hung endpoint must fail fast instead of stalling the consumer group.
novu.bridge.http.connect.timeout.ms=${NOVU_BRIDGE_HTTP_CONNECT_TIMEOUT_MS:5000}
novu.bridge.http.read.timeout.ms=${NOVU_BRIDGE_HTTP_READ_TIMEOUT_MS:10000}

# DB - Local PostgreSQL setup
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres4
spring.datasource.username=postgres
spring.datasource.password=1234

spring.flyway.url=jdbc:postgresql://localhost:5432/postgres4
spring.flyway.user=postgres
spring.flyway.password=1234
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

novu.bridge.dispatch.log.enabled=${NOVU_BRIDGE_DISPATCH_LOG_ENABLED:true}

management.endpoints.web.base-path=/

# Log level — INFO by default (DEBUG lines here can print recipient PII; the
# code masks it, but keep the floor at INFO). Override via NOVU_BRIDGE_LOG_LEVEL.
logging.level.org.egov.novubridge=${NOVU_BRIDGE_LOG_LEVEL:INFO}
logging.level.org.egov.novubridge.service.DispatchPipelineService=${NOVU_BRIDGE_LOG_LEVEL:INFO}
spring.kafka.consumer.auto-offset-reset=earliest
