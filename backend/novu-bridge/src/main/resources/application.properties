server.contextPath=/novu-bridge
server.context-path=/novu-bridge
server.servlet.context-path=/novu-bridge
server.port=8290
app.timezone=UTC

# Kafka
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=novu-bridge
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

novu.bridge.kafka.input.topic=complaints.domain.events
novu.bridge.kafka.retry.topic=novu-bridge.retry
novu.bridge.kafka.dlq.topic=novu-bridge.dlq
novu.bridge.max.retries=3
novu.bridge.channel=WHATSAPP
novu.bridge.default.locale=en_IN

# External dependencies
novu.bridge.preference.enabled=true
novu.bridge.preference.host=http://localhost:8085/user-preferences
novu.bridge.preference.check.path=/v1/_search
novu.bridge.preference.code=USER_NOTIFICATION_PREFERENCES

novu.bridge.config.host=http://localhost:8096
novu.bridge.config.resolve.path=/config-service/config/v1/_resolve
novu.bridge.config.search.path=/config-service/config/v1/_search

novu.bridge.user.host=http://localhost:8081
novu.bridge.user.search.path=/user/_search

novu.base.url=http://localhost:8085
novu.api.key=${NOVU_API_KEY:test-api-key-123}

# DB - Local PostgreSQL setup
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres4
spring.datasource.username=postgres
spring.datasource.password=1234

spring.flyway.url=jdbc:postgresql://localhost:5432/postgres4
spring.flyway.user=postgres
spring.flyway.password=1234
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

novu.bridge.dispatch.log.enabled=true

management.endpoints.web.base-path=/

# Debug logging
logging.level.org.egov.novubridge=DEBUG
logging.level.org.egov.novubridge.service.ConfigServiceClient=DEBUG
logging.level.org.egov.novubridge.service.DispatchPipelineService=DEBUG
spring.kafka.consumer.auto-offset-reset=earliest
