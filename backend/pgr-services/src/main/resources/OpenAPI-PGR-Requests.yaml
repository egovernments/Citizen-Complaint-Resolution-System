openapi: 3.0.1
info:
  title: PGR Service Requests API
  description: API for managing Public Grievance Redressal (PGR) service requests.
  version: 1.0.0
  contact:
    name: DIGIT Team
    email: digit@egovernments.org

servers:
  - url: /pgr-services/v2

tags:
  - name: ServiceRequest
    description: Operations related to citizen service requests

paths:
  /request/_create:
    post:
      tags:
        - ServiceRequest
      summary: Create a new service request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Service request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /request/_search:
    post:
      tags:
        - ServiceRequest
      summary: Search for service requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestInfoWrapper'
      parameters:
        - in: query
          name: tenantId
          schema:
            type: string
          required: true
          description: Tenant ID for which requests are to be searched
        # Add other search criteria as needed
      responses:
        '200':
          description: List of service requests matching criteria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /request/_plainsearch:
    post:
      tags:
        - ServiceRequest
      summary: Plain search for service requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestInfoWrapper'
      parameters:
        - in: query
          name: tenantId
          schema:
            type: string
          required: true
          description: Tenant ID for which requests are to be searched
        # Add other search criteria as needed
      responses:
        '200':
          description: List of service requests matching criteria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /request/_update:
    post:
      tags:
        - ServiceRequest
      summary: Update an existing service request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Service request updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /request/_count:
    post:
      tags:
        - ServiceRequest
      summary: Get count of service requests matching criteria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestInfoWrapper'
      parameters:
        - in: query
          name: tenantId
          schema:
            type: string
          required: true
          description: Tenant ID for which requests are to be counted
        # Add other search criteria as needed
      responses:
        '200':
          description: Count of service requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'

components:
  schemas:
    RequestInfo:
      $ref: "https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/RequestInfo"
    ResponseInfo:
      $ref: "https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/ResponseInfo"
    ErrorRes:
      $ref: "https://raw.githubusercontent.com/egovernments/municipal-services/common-contract/docs/common-contract-v2-0-0.yml#/components/schemas/ErrorRes"
    Address:
      $ref: "https://raw.githubusercontent.com/egovernments/municipal-services/common-contract/docs/common-contract-v2-0-0.yml#/components/schemas/Address"
    AuditDetails:
      $ref: "https://raw.githubusercontent.com/egovernments/municipal-services/common-contract/docs/common-contract-v2-0-0.yml#/components/schemas/AuditDetails"
    # Local wrappers and models
    RequestInfoWrapper:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
    ServiceRequest:
      type: object
      properties:
        requestInfo:
          $ref: '#/components/schemas/RequestInfo'
        service:
          $ref: '#/components/schemas/Service'
        workflow:
          $ref: '#/components/schemas/Workflow'
    ServiceResponse:
      type: object
      properties:
        responseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        serviceWrappers:
          type: array
          items:
            $ref: '#/components/schemas/ServiceWrapper'
        complaintsResolved:
          type: integer
        averageResolutionTime:
          type: integer
        complaintTypes:
          type: integer
    CountResponse:
      type: object
      properties:
        responseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        count:
          type: integer
    ServiceWrapper:
      type: object
      properties:
        service:
          $ref: '#/components/schemas/Service'
        workflow:
          $ref: '#/components/schemas/Workflow'
    Service:
      type: object
      description: Instance of Service request raised for a particular service.
      properties:
        active:
          type: boolean
          default: true
        citizen:
          $ref: 'https://raw.githubusercontent.com/egovernments/municipal-services/common-contract/docs/common-contract-v2-0-0.yml#/components/schemas/UserInfo'
        id:
          type: string
        tenantId:
          type: string
        serviceCode:
          type: string
        serviceRequestId:
          type: string
        description:
          type: string
        accountId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        additionalDetail:
          type: object
          description: Arbitrary additional details, up to 600 characters.
        applicationStatus:
          type: string
        source:
          type: string
        documents:
          type: array
          description: List of documents attached to this service request
          items:
            $ref: '#/components/schemas/Document'
        address:
          $ref: '#/components/schemas/Address'
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
      required:
        - tenantId
        - serviceCode
        - source
        - address

    Document:
      type: object
      description: Document attached to a service request
      properties:
        id:
          type: string
          description: Unique document identifier (UUID)
          readOnly: true
        documentType:
          type: string
          description: Document category (e.g. COMPLAINT_PHOTO)
          maxLength: 64
        fileStoreId:
          type: string
          description: Reference to file-store service
          maxLength: 64
        documentUid:
          type: string
          description: Optional unique document reference
          maxLength: 64
        additionalDetails:
          type: object
          description: Any additional metadata for the document

    Workflow:
      type: object
      description: Workflow action details for a service request transition
      properties:
        action:
          type: string
          description: Workflow action to perform
        assignes:
          type: array
          items:
            type: string
          description: List of assignee UUIDs
        comments:
          type: string
          description: Comments for the workflow transition
        verificationDocuments:
          type: array
          description: Documents attached during workflow verification
          items:
            $ref: '#/components/schemas/Document'
