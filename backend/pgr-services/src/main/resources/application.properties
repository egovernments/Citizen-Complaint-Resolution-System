server.contextPath=/pgr-services
server.servlet.context-path=/pgr-services
server.port=8280
app.timezone=UTC

# ===============================
# Database (JPA / Hibernate)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/pgr
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=public

# ===============================
# Flyway
# ===============================
spring.flyway.url=jdbc:postgresql://localhost:5432/pgr
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=false

# ===============================
# Security: OAuth2 / JWT (Keycloak)
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/ALPHA_RELEASE_NEW

# ===============================
# Redis Cache
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.cache.type=redis

# ===============================
# Jackson
# ===============================
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.main.allow-bean-definition-overriding=true

# ===============================
# DIGIT 3.0 Client — Service URLs
# ===============================
digit.services.boundary.base-url=http://localhost:8093
digit.services.workflow.base-url=http://localhost:8085
digit.services.idgen.base-url=http://localhost:8100
digit.services.filestore.base-url=http://localhost:8102
digit.services.individual.base-url=http://localhost:8105
digit.services.registry.base-url=http://localhost:8104
digit.services.timeout.read=30000

# Header propagation
digit.propagate.headers.allow=authorization,x-correlation-id,x-request-id,x-tenant-id,x-client-id,x-user-id
digit.propagate.headers.prefixes=x-ctx-,x-trace-

# ===============================
# DIGIT 3.0 — IdGen
# ===============================
idgen.templateCode=pgr

# ===============================
# DIGIT 3.0 — Workflow
# ===============================
pgr.workflow.processCode=PGR100
pgr.tenant-id=ALPHA_RELEASE_NEW

# ===============================
# DIGIT 3.0 — Registry Schema Codes
# ===============================
pgr.registry.schema-code=PGR.ServiceCategory
pgr.registry.pgr-storage.schema-code=pgr2

# ===============================
# PGR Variables
# ===============================
pgr.complain.idle.time=864000000
pgr.default.offset=0
pgr.default.limit=100
pgr.search.max.limit=200
pgr.business.codes=PGR
pgr.business.level.sla=432000000
egov.complaints.category=13

# Allowed sources for complaint submission
allowed.source=whatsapp,web,mobile,RB Bot

# Search parameter config (comma-separated allowed fields per role)
citizen.allowed.search.params=serviceRequestId,ids,mobileNumber,applicationStatus,tenantId
employee.allowed.search.params=serviceRequestId,ids,mobileNumber,serviceCode,applicationStatus,tenantId

# Department validation (set true to validate assignee dept against Registry)
pgr.validate.dept.enabled=false

# ===============================
# Notification
# ===============================
notification.sms.enabled=true
egov.user.event.notification.enabled=true
mseva.mobile.app.download.link=https://play.google.com/store/apps/details?id=org.egovernment.mseva.citizen
egov.pgr.events.rate.link=digit-ui/citizen/pgr/rate/{application-id}
egov.pgr.events.reopen.link=digit-ui/citizen/pgr/reopen/{application-id}
egov.usr.events.rate.code=RATE
egov.usr.events.reopen.code=REOPEN
egov.ui.app.host.map={"pg":"https://unified-dev.digit.org"}

# URL shortener
egov.url.shortner.host=https://unified-dev.digit.org
egov.url.shortner.endpoint=/egov-url-shortening/shortener

# Domain events
complaints.domain.events.enabled=true

# ===============================
# Escalation Scheduler
# ===============================
pgr.escalation.enabled=true
pgr.escalation.interval.ms=300000
pgr.escalation.batch.size=100
pgr.escalation.default.sla.ms=432000000
pgr.escalation.max.depth=3

# ===============================
# Dashboard Refresh Scheduler
# ===============================
pgr.dashboard.refresh.enabled=true
pgr.dashboard.refresh.interval.ms=300000

# ===============================
# Dynamic Data
# ===============================
egov.dynamicdata.period=30

# ===============================
# Central Instance
# ===============================
state.level.tenantid.length=1
is.environment.central.instance=false

# ===============================
# Actuator
# ===============================
management.endpoints.web.base-path=/
