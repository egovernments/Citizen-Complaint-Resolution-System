#
# config:
# -   name: < Name of the job, foo/bar would create job named bar inside folder foo >
#     build:
#     - work-dir: < Working directory of the app to be built >
#       dockerfile: < Path to the dockerfile, optional, assumes dockerfile in working directory if not provided >
#       image-name: < Docker image name  >
# -
# -
#
# config:
# -   name: < Name of the job, foo/bar would create job named bar inside folder foo >
#     build:
#     - work-dir: < Working directory of the app to be built >
#       dockerfile: < Path to the dockerfile, optional, assumes dockerfile in working directory if not provided >
#       image-name: < Docker image name  >
# -
# -
#
# This file is the single source of truth for the nightly-develop image build:
# every entry below is built nightly from develop and pushed to the registry
# (canonical image-name + nightly-develop / develop-YYYYMMDD tags) so deploys
# pull pre-built images instead of building on the box. Add a service here and it
# is enrolled automatically. Governance & naming: build/NIGHTLY-BUILDS.md.
# Driver: local-setup/ansible/files/nightly-build-push.sh.
#
config:
# Local governance PGR Services
  - name: "builds/Citizen-Complaint-Resolution-System/backend/pgr-services"
    build:
      - work-dir: "backend/pgr-services"
        image-name: "pgr-services"
        dockerfile: "build/maven/Dockerfile"
      - work-dir: "backend/pgr-services/src/main/resources/db"
        image-name: "pgr-services-db"
  - name: "builds/Citizen-Complaint-Resolution-System/backend/novu-bridge"
    build:
      - work-dir: "backend/novu-bridge"
        image-name: "novu-bridge"
        dockerfile: "build/maven/Dockerfile"
      - work-dir: "backend/novu-bridge/src/main/resources/db"
        image-name: "novu-bridge-db"
  - name: "builds/Citizen-Complaint-Resolution-System/backend/digit-config-service"
    build:
      - work-dir: "backend/digit-config-service"
        image-name: "digit-config-service"
        dockerfile: "build/maven/Dockerfile"
      - work-dir: "backend/digit-config-service/src/main/resources/db"
        image-name: "digit-config-service-db"
  - name: "builds/Citizen-Complaint-Resolution-System/backend/digit-user-preferences-service"
    build:
      - work-dir: "backend/digit-user-preferences-service"
        image-name: "digit-user-preferences-service"
      - work-dir: "backend/digit-user-preferences-service/db"
        image-name: "digit-user-preferences-service-db"
  - name: "builds/Citizen-Complaint-Resolution-System/backend/xstate-chatbot"
    build:
      - work-dir: "backend/xstate-chatbot/nodejs"
        image-name: "xstate-chatbot"
      - work-dir: "backend/xstate-chatbot/nodejs/db"
        image-name: "xstate-chatbot-db"
  - name: "builds/Citizen-Complaint-Resolution-System/utilities/default-data-handler"
    build:
      - work-dir: "utilities/default-data-handler"
        image-name: "default-data-handler"
        dockerfile: "build/maven/Dockerfile"
  - name: builds/Citizen-Complaint-Resolution-System/frontend/micro-ui/digit-ui
    build:
      - work-dir: frontend/micro-ui/
        dockerfile: frontend/micro-ui/web/docker/Dockerfile
        image-name: digit-ui
  # --- newer container-served services (runtime-configured, one image per service
  # serves every tenant). digit-ui-v2 / configurator are intentionally absent:
  # their bundles bake tenant build-env and need parameterized Dockerfiles first.
  - name: "builds/Citizen-Complaint-Resolution-System/digit-mcp"
    build:
      - work-dir: "digit-mcp"
        dockerfile: "digit-mcp/Dockerfile"
        image-name: "digit-mcp"
  - name: "builds/Citizen-Complaint-Resolution-System/utilities/otp-publisher"
    build:
      - work-dir: "utilities/otp-publisher"
        dockerfile: "utilities/otp-publisher/Dockerfile"
        image-name: "otp-publisher"
  - name: "builds/Citizen-Complaint-Resolution-System/digit-ui-esbuild"
    build:
      - work-dir: "digit-ui-esbuild"
        dockerfile: "digit-ui-esbuild/docker/Dockerfile"
        image-name: "digit-ui-esbuild"

