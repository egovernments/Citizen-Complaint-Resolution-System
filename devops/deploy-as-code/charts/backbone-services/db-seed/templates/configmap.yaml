# The dump ships gzipped (~103KB) so it fits comfortably inside the 1MiB
# ConfigMap ceiling; the raw SQL is ~500KB and would leave little headroom
# as the dump grows. binaryData keeps it byte-exact through etcd.
#
# hook-weight is lower than the Job's so this exists before the Job runs.
#
# Same delete policy as the Job. before-hook-creation alone only clears the
# PREVIOUS copy when a later hook run starts, so on a successful install this
# ~100KB of dump would sit in etcd indefinitely with no Job left to explain it.
# hook-succeeded fires only once the Job reports success, so retries within
# backoffLimit still see it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-seed-dump
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
binaryData:
  full-dump.sql.gz: {{ .Files.Get "files/full-dump.sql.gz" | b64enc | quote }}
