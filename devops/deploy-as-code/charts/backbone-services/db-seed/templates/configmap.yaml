{{- if .Values.enabled }}
# The dump ships gzipped (~103KB) so it fits comfortably inside the 1MiB
# ConfigMap ceiling; the raw SQL is ~500KB and would leave little headroom
# as the dump grows. binaryData keeps it byte-exact through etcd.
#
# hook-weight is lower than the Job's so this exists before the Job runs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-seed-dump
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
binaryData:
  full-dump.sql.gz: {{ .Files.Get "files/full-dump.sql.gz" | b64enc | quote }}
{{- end }}
