{{- $user := include "db-seed.dbUser" . -}}
{{- $pass := include "db-seed.dbPassword" . -}}
{{- $host := include "db-seed.dbHost" . -}}
{{- $name := include "db-seed.dbName" . -}}
{{/*
  Validate EVERY connection field here, at render time, so a misconfigured
  deploy fails immediately with an actionable message rather than at psql time.

  Two checks per field, because emptiness alone is not enough. The environment
  files ship unsubstituted placeholders — `db-host: <db_host>` and
  `db-name: <db_name>` in env.yaml, `flywayUsername: <db_username>` in
  env-secrets.yaml — and those are NON-EMPTY strings, so `default` accepts them
  and they would render straight through. A bad host leaves the Job waiting on
  pg_isready; a bad user surfaces as an opaque Postgres auth failure. Both are
  far less useful than failing here with the field named.

  Applied uniformly to all four fields: an earlier revision guarded only host
  and name, which left the credentials with exactly the gap this check exists
  to close.
*/}}
{{- if not $user }}{{ fail "db-seed: no database user. Set db.user, or provide secrets.db.flywayUsername in the environment values." }}{{ end }}
{{- if not $pass }}{{ fail "db-seed: no database password. Set db.password, or provide secrets.db.flywayPassword in the environment values." }}{{ end }}
{{- if not $host }}{{ fail "db-seed: no database host. Set db.host, or provide configmaps.egov-config.data.db-host in the environment values." }}{{ end }}
{{- if not $name }}{{ fail "db-seed: no database name. Set db.name, or provide configmaps.egov-config.data.db-name in the environment values." }}{{ end }}
{{- if regexMatch "^<.*>$" $user }}{{ fail (printf "db-seed: database user is still the placeholder %q. Substitute a real value in environments/env-secrets.yaml (secrets.db.flywayUsername) or set db.user." $user) }}{{ end }}
{{- if regexMatch "^<.*>$" $pass }}{{ fail (printf "db-seed: database password is still the placeholder %q. Substitute a real value in environments/env-secrets.yaml (secrets.db.flywayPassword) or set db.password." $pass) }}{{ end }}
{{- if regexMatch "^<.*>$" $host }}{{ fail (printf "db-seed: database host is still the placeholder %q. Substitute a real value in environments/env.yaml (configmaps.egov-config.data.db-host) or set db.host." $host) }}{{ end }}
{{- if regexMatch "^<.*>$" $name }}{{ fail (printf "db-seed: database name is still the placeholder %q. Substitute a real value in environments/env.yaml (configmaps.egov-config.data.db-name) or set db.name." $name) }}{{ end }}
# db-seed owns its credentials rather than reading core-services' `db` Secret,
# which does not exist yet when the backbone tier is applied. Rendered from the
# same environment values, so the two agree.
#
# hook-weight -10 matches the dump ConfigMap: both must exist before the Job.
apiVersion: v1
kind: Secret
metadata:
  name: db-seed-db
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  username: {{ $user | quote }}
  password: {{ $pass | quote }}
