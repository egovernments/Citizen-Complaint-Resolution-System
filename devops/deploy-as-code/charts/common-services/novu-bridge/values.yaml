# Common Labels
labels:
  app: "novu-bridge"
  group: "egov"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "novu-bridge"
  namespace: "egov"

# Init Containers - DB Migration
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "novu_bridge_schema"
    image:
      repository: "novu-bridge-db"
      tag: "master-2242e47"

# Container Configs
image:
  repository: "novu-bridge"
  tag: "master-2242e47"
replicas: "1"
httpPort: 8080
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx192m -Xms192m"
java-args: "-Dspring.profiles.active=monitoring"

# Health Checks
healthChecks:
  enabled: true
  livenessProbePath: "/novu-bridge/health"
  readinessProbePath: "/novu-bridge/health"

# Resources
memory_limits: "512Mi"
resources: |
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: {{ .Values.memory_limits | quote }}
    cpu: "300m"

# Environment variables
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/novu-bridge"
  - name: NOVU_BRIDGE_KAFKA_INPUT_TOPIC
    value: "complaints.domain.events"
  - name: NOVU_BRIDGE_KAFKA_RETRY_TOPIC
    value: "novu-bridge.retry"
  - name: NOVU_BRIDGE_KAFKA_DLQ_TOPIC
    value: "novu-bridge.dlq"
  - name: NOVU_BRIDGE_MAX_RETRIES
    value: "3"
  - name: NOVU_BRIDGE_CHANNEL
    value: "WHATSAPP"
  - name: NOVU_BRIDGE_DEFAULT_LOCALE
    value: "en_IN"
  - name: NOVU_BRIDGE_PREFERENCE_ENABLED
    value: "true"
  - name: NOVU_BRIDGE_PREFERENCE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: digit-user-preferences-service
  - name: NOVU_BRIDGE_PREFERENCE_CHECK_PATH
    value: {{ index .Values "preference-check-path" | quote }}
  - name: NOVU_BRIDGE_PREFERENCE_CODE
    value: "USER_NOTIFICATION_PREFERENCES"
  - name: NOVU_BRIDGE_CONFIG_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: digit-config-service
  - name: NOVU_BRIDGE_CONFIG_RESOLVE_PATH
    value: {{ index .Values "config-resolve-path" | quote }}
  - name: NOVU_BRIDGE_CONFIG_SEARCH_PATH
    value: {{ index .Values "config-search-path" | quote }}
  - name: NOVU_BRIDGE_USER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-user
  - name: NOVU_BRIDGE_USER_SEARCH_PATH
    value: "/user/_search"
  - name: NOVU_BASE_URL
    value: {{ index .Values "novu-base-url" | quote }}
  - name: NOVU_API_KEY
    value: {{ index .Values "novu-api-key" | quote }}
  - name: NOVU_BRIDGE_DISPATCH_LOG_ENABLED
    value: "true"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  {{- if index .Values "tracing-enabled" }}
  - name: TRACER_OPENTRACING_ENABLED
    value: "true"
  {{- end }}
  - name: KAFKA_BROKER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-brokers
  - name: TRACER_DETAILED_TRACING_ENABLED
    value: "false"
  - name: TRACER_ERRORS_SEND_TO_KAFKA
    value: "false"
