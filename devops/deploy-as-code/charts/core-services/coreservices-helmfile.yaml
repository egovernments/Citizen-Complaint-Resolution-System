environments:
  env:
    values:
      - ../environments/env-secrets.yaml
      - ../environments/env.yaml
---
templates:
  default: &default
    chart: ./{{`{{ .Release.Name }}`}}
    labels:
      target: ./{{`{{ .Release.Name }}`}}
    version: 0.1.0
    namespace: egov
    # This prevents helmfile exiting when it encounters a missing file
    # Valid values are "Error", "Warn", "Info", "Debug". The default is "Error"
    # Use "Debug" to make missing files errors invisible at the default log level(--log-level=INFO)
    missingFileHandler: Warn
    values:
      - {{ .Values | toYaml | nindent 8 }}

releases:
  - name: mdms-v2
    installed: true
    <<: *default
  
  - name: egov-localization
    installed: true
    <<: *default

  - name: boundary-service
    installed: true
    <<: *default
  
  - name: egov-accesscontrol
    installed: true
    <<: *default

  # Disabled: the audit *query* API is unused by CCRS. Its only UI consumer is the
  # Utilities "Audit History" page, reachable only via a link from the Workbench
  # module's MDMS view — and CCRS intentionally omits Workbench (see digit-ui
  # App.js: enabledModules = ["Utilities","PGR"]). Audit *capture* is unaffected —
  # audit-service-persister still runs on both stacks, so records keep persisting.
  # (Deployment-parity item #13. Re-enable if a direct/compliance API consumer surfaces.)
  - name: audit-service
    installed: false
    <<: *default

  - name: egov-enc-service
    installed: true
    needs:
    - mdms-v2
    <<: *default

  - name: egov-filestore
    installed: true
    <<: *default

  - name: egov-idgen
    installed: true
    <<: *default

  - name: egov-indexer
    installed: true
    <<: *default

  - name: egov-notification-mail
    installed: true
    <<: *default

  - name: egov-notification-sms
    installed: true
    <<: *default

  - name: egov-user
    installed: true
    needs:
    - egov-enc-service
    <<: *default

  - name: egov-otp
    installed: true
    <<: *default
  
  - name: egov-persister
    installed: true
    <<: *default

  - name: egov-url-shortening
    installed: true
    <<: *default

  - name: egov-workflow-v2
    installed: true
    needs:
    - mdms-v2
    <<: *default

  - name: user-otp
    installed: true
    <<: *default

  - name: configmaps
    installed: true
    <<: *default

  # service-request / pdf-service: not used by CCRS — zero callers in pgr-services, the
  # digit-ui app (Utilities/PGR modules), or configs. Disabled to cut footprint + attack
  # surface. Re-enable if a future CCRS feature needs them.
  - name: service-request
    installed: false
    <<: *default

  - name: pdf-service
    installed: false
    <<: *default
  
  - name: gateway
    installed: true
    <<: *default
  
  - name: boundary-bulk-bff
    installed: true
    <<: *default





