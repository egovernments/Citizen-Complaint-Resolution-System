# Common Labels
labels:
  app: "digit-ui"
  group: "web"

# Ingress Configs
ingress:
  enabled: true
  context: "digit-ui"

# Init Containers Configs
initContainers: {}

# Container Configs
# PARITY / BUILD NOTE: digit-ui has FRONTEND source changes that the stock
# `v2.11-a520687` image predates. Rebuild + repin the image from a branch that
# contains, at minimum:
#   #1098 (fix/egov-location-boundary-migration) — digit-ui-v2/packages/data-provider/src/client/endpoints.ts
# Without a rebuild the boundary/location UI wiring is stale. See PARITY-FIXES.md.
image:
  repository: "digit-ui"
  tag: "v2.11-a520687"
replicas: "1"
httpPort: 80
healthChecks:
  enabled: true
  livenessProbePath: "/digit-ui/"
  readinessProbePath: "/digit-ui/"
    
extraVolumes: |
  - name: js-injection
    configMap:
      name: digit-ui

extraVolumeMounts: |
  - mountPath: /etc/nginx/conf.d/sub_filter.conf
    name: js-injection
    subPath: sub_filter.conf
