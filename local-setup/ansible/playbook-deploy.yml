---
- name: Deploy DIGIT stack from public registry
  # `digit` is the group defined in inventory/hosts.yml. Per-tenant config
  # comes from inventory/host_vars/<host>.yml; defaults from group_vars/.
  # Run via: ./deploy.sh <tenant>  (NOT `ansible-playbook` directly).
  hosts: digit
  # Linux targets: become root for apt/systemd/host-nginx/etc (default).
  # macOS thin path: set `deploy_become: false` in host_vars — no
  # privileged host task runs on Darwin (all gated off), and become
  # would force sudo prompts + root-owned ~/digit. Must be an inventory
  # var (not a gathered fact): play-level become is evaluated before
  # fact-gathering, so `ansible_system` is undefined here.
  become: "{{ deploy_become | default(true) }}"

  # Apple-Silicon Macs must pull amd64 images under Rosetta — Mac host_vars
  # sets `docker_default_platform: linux/amd64`. Undefined on Linux ->
  # empty string, which Docker treats as "use host platform" (linux/amd64
  # on x86_64 boxes) — zero impact on Bomet/naipepea. Must be an inventory
  # var, not a gathered fact: play-level environment is evaluated before
  # fact-gathering (ansible_system undefined here).
  #
  # NB: must NOT use `default(omit)` here — `omit` works as a module-arg
  # sentinel but is rendered literally inside an environment dict value
  # ("__omit_place_holder__..." gets exported as DOCKER_DEFAULT_PLATFORM
  # and breaks every subsequent `docker build`).
  environment:
    DOCKER_DEFAULT_PLATFORM: "{{ docker_default_platform | default('') }}"

  pre_tasks:
    # digit-ui can be served two ways, both binding port 18080:
    #   - `static` mode: digit-ui Docker container with a pre-built bundle.
    #   - `hmr` mode:    host-side `node esbuild.dev.js` in tmux session
    #                    `esbuild`, watching /opt/digit-ui-esbuild.
    # Whichever mode the host_vars asks for, we converge to it — kill
    # the off-mode runner first (so port 18080 is free), bring up the
    # requested one. Both branches are idempotent.
    - name: "digit-ui — show requested mode"
      ansible.builtin.debug:
        msg: "Requested mode for {{ inventory_hostname }}: {{ digit_ui_mode }}"

    - name: "digit-ui mode=static — kill stray esbuild tmux session if any"
      ansible.builtin.shell: |
        if tmux has-session -t esbuild 2>/dev/null; then
          tmux kill-session -t esbuild
          echo killed
        fi
      register: kill_esbuild
      changed_when: kill_esbuild.stdout == "killed"
      when: digit_ui_mode == "static"

    - name: "digit-ui mode=hmr — stop digit-ui container if running"
      ansible.builtin.shell: |
        if docker ps --filter name=^digit-ui$ --format '{% raw %}{{.Names}}{% endraw %}' | grep -q '^digit-ui$'; then
          docker stop digit-ui
          echo stopped
        fi
      register: stop_digit_ui
      changed_when: stop_digit_ui.stdout == "stopped"
      when: digit_ui_mode == "hmr"

    # `static` and `hmr` modes need the digit-ui-esbuild source on disk —
    # HMR runs `node esbuild.dev.js` from it, static builds via
    # `node esbuild.build.js`. `container` mode skips this entirely:
    # digit-ui ships its dist baked in. Also gated off Darwin: /opt isn't
    # writable under become:false, and Mac always runs container mode.
    - name: "digit-ui — ensure /opt/digit-ui-esbuild repo is present and current"
      ansible.builtin.git:
        repo: "{{ digit_ui_esbuild_repo | default('https://github.com/theflywheel/digit-ui-esbuild.git') }}"
        dest: /opt/digit-ui-esbuild
        version: "{{ digit_ui_esbuild_branch | default('main') }}"
        update: yes
        # Deploy target, not a dev workspace. esbuild touches a few tracked
        # files (e.g. public/vendor/tailwind.css) during the build, which
        # would otherwise block the next git pull. Force-clean keeps the
        # working tree byte-identical to origin/{branch}.
        force: yes
      when:
        - digit_ui_mode in ['static', 'hmr']
        - ansible_system != 'Darwin'
        # When a prebuilt bundle image is pinned (static mode), the git
        # tree is not the source of what nginx serves — leave it alone so
        # a deploy can't silently regress build/ to an older checkout.
        - not (digit_ui_mode == 'static' and (digit_ui_bundle_image | default('')) | length > 0)


  tasks:
    # ==================== Preflight: target OS ====================
    # The playbook installs Docker + nginx + node + python via apt and
    # manages docker.service via systemd. Both assume an Ubuntu-family
    # target. Fail fast on Mac/RHEL/etc with a clear message rather than
    # halfway through with `apt: command not found` or systemd errors.
    #
    # Mac operators: spin up an Ubuntu 24.04 VM (UTM, OrbStack, Multipass,
    # Lima, or a remote VPS) and point `ansible_host` in your host_vars
    # at that VM. The Mac itself runs only ansible-playbook + ssh.
    # Supported targets: Debian-family (Ubuntu) for full host provisioning,
    # and macOS (Darwin) via the thin Mac path — Docker Desktop/OrbStack
    # already provides Docker, nginx runs as a container, and the
    # apt/systemd/host-nginx tasks are skipped (when: ansible_system != 'Darwin').
    # Anything else (RHEL, Alpine, …) is genuinely unsupported.
    - name: "preflight — target OS must be Debian-family or macOS"
      ansible.builtin.fail:
        msg: |
          Target host {{ inventory_hostname }} is {{ ansible_facts['os_family'] }}
          ({{ ansible_facts['distribution'] | default('?') }} {{ ansible_facts['distribution_version'] | default('?') }}).
          This playbook supports Ubuntu/Debian (full host provisioning) and
          macOS (thin Mac path — containerized nginx, Docker Desktop/OrbStack).

          On macOS, in inventory/host_vars/<tenant>.yml set:
            ansible_connection: local
            ansible_host: localhost
          and ensure Docker Desktop or OrbStack is running, then run
          `./deploy.sh <tenant>` from the Mac terminal.
      when:
        - ansible_facts['os_family'] != 'Debian'
        - ansible_system != 'Darwin'

    # ==================== Docker host install + config ====================
    # Linux/Debian targets only. On macOS the operator already runs Docker
    # Desktop / OrbStack, so apt + docker.service + /etc/docker/daemon.json
    # don't apply — this whole block is skipped on Darwin.
    - name: "Docker host install + config (Linux/Debian targets only)"
      when: ansible_system != "Darwin"
      block:
      # ==================== Docker Installation ====================
      - name: Install Docker prerequisites
        apt:
          name: [ca-certificates, curl, gnupg]
          state: present
          update_cache: yes

      - name: Add Docker GPG key
        shell: |
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
        args:
          creates: /etc/apt/keyrings/docker.asc

      - name: Add Docker repository
        shell: |
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
        args:
          creates: /etc/apt/sources.list.d/docker.list

      # Ubuntu 24.04 ships `docker.io` + `docker-compose-v2` from the
      # archive. Both conflict with Docker's upstream packages — they own
      # the same `/usr/libexec/docker/cli-plugins/docker-compose` file —
      # so dpkg refuses to install the upstream packages until the archive
      # ones are removed. Idempotent: no-op if they're not installed.
      - name: Remove conflicting Ubuntu-archive Docker packages
        apt:
          name:
            - docker.io
            - docker-doc
            - docker-compose
            - docker-compose-v2
            - podman-docker
            - containerd
            - runc
          state: absent
          purge: yes

      - name: Install Docker Engine
        apt:
          name:
            - docker-ce
            - docker-ce-cli
            - containerd.io
            - docker-buildx-plugin
            - docker-compose-plugin
          state: present
          update_cache: yes

      # apt installs docker.service `disabled` on Ubuntu 24.04 — enable +
      # start it explicitly so subsequent tasks can talk to the daemon.
      - name: Ensure docker daemon is enabled + running
        service:
          name: docker
          state: started
          enabled: yes

      # ==================== Docker Configuration ====================
      # The Hetzner VPC registry at {{ docker_registry }} (egov-ci) hosts every
      # custom-built DIGIT image (digit-mcp, sb35-rebuilt egov-* services)
      # over plain HTTP. Without this entry Docker refuses to pull with
      # `http: server gave HTTP response to HTTPS client`. Restart the
      # daemon when the file changes so the new config takes effect.
      - name: Configure Docker insecure-registries for VPC registry
        copy:
          dest: /etc/docker/daemon.json
          content: "{{ {'insecure-registries': insecure_registries | default([])} | to_nice_json }}\n"
          mode: '0644'
        register: daemon_json
        when: insecure_registries | default([]) | length > 0

      - name: Restart docker if daemon.json changed
        service:
          name: docker
          state: restarted
        when: daemon_json is defined and daemon_json.changed | default(false)

    # check_mode: false forces this to run even under `--check`, so the
    # version-compare task below has a real value to test against.
    - name: Verify Docker Compose version >= 2.20
      shell: docker compose version --short
      register: compose_version
      changed_when: false
      check_mode: false

    - name: Fail if Docker Compose too old
      fail:
        msg: "Docker Compose {{ compose_version.stdout | default('UNKNOWN') }} is too old. Need >= 2.20"
      when:
        - compose_version.stdout is defined
        - compose_version.stdout | length > 0
        - compose_version.stdout is version('2.20', '<')

    # ==================== Deploy Directory ====================
    - name: Create DIGIT directory
      file:
        path: "{{ digit_dir }}"
        state: directory

    # ==================== Compose File ====================
    - name: Copy registry-prefixed Docker Compose file
      copy:
        src: ../docker-compose.egov-digit.yaml
        dest: "{{ digit_dir }}/docker-compose.egov-digit.yaml"

    # Opt-in DB fast-path overlay. See docker-compose.fast-path.yml for
    # what it changes and why it's gated. Default off; sandbox tenants
    # can flip `db_fast_path: true` in inventory/host_vars/<tenant>.yml.
    - name: Copy fast-path overlay (used only when db_fast_path is true)
      copy:
        src: ../docker-compose.fast-path.yml
        dest: "{{ digit_dir }}/docker-compose.fast-path.yml"

    # Per-tenant compose overlay convention. If a file named
    # local-setup/docker-compose.<inventory_hostname>.yml exists on the
    # controller, copy it to the target and include it in every compose
    # invocation below. Use it to ship per-tenant env overrides (Flyway
    # table quirks, STATE_LEVEL_TENANT_ID adjustments, image tag pins,
    # extra services, etc.) without touching the base compose file. Bomet
    # uses this for url-shortening SPRING_FLYWAY_ENABLED:false + inbox
    # STATE_LEVEL_TENANT_ID:ke overrides.
    - name: "Per-tenant compose overlay — check for docker-compose.{{ inventory_hostname }}.yml"
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../docker-compose.{{ inventory_hostname }}.yml"
      register: per_tenant_overlay
      delegate_to: localhost
      become: false

    - name: "Per-tenant compose overlay — copy to target (if present)"
      copy:
        src: "../docker-compose.{{ inventory_hostname }}.yml"
        dest: "{{ digit_dir }}/docker-compose.{{ inventory_hostname }}.yml"
      when: per_tenant_overlay.stat.exists


    # ==================== OTEL Java Agent (fetched, not in git) ====================
    # The 21 MB OTEL javaagent JAR is downloaded on the controller before the
    # otel/ tree gets rsync'd to the target. Cached locally via the script's
    # own existence check, so re-runs of the playbook are no-ops after the
    # first download.
    - name: Download OpenTelemetry Java Agent
      shell: bash {{ playbook_dir }}/../otel/download-agent.sh
      args:
        creates: "{{ playbook_dir }}/../otel/opentelemetry-javaagent.jar"
      delegate_to: localhost
      become: false

    # ==================== nairobi-mdms submodule (fetched, not vendored) ====================
    # The Nairobi MDMS dump (~84k LOC of JSON for departments, designations,
    # service defs, role-actions, etc.) lives in a separate repo at
    # https://github.com/ChakshuGautam/nairobi-digit-configs.git and is wired
    # into this repo as a submodule at local-setup/ansible/nairobi-mdms.
    #
    # Only Nairobi-flavoured tenants need it, so we don't auto-init on clone
    # — the submodule is empty until this task runs. Set
    # `requires_nairobi_mdms: true` in inventory/host_vars/<tenant>.yml when
    # the tenant onboarding flow needs to read those JSONs.
    - name: "nairobi-mdms — init submodule on the controller (when tenant needs it)"
      ansible.builtin.command:
        cmd: git submodule update --init --recursive local-setup/ansible/nairobi-mdms
        chdir: "{{ playbook_dir }}/../.."
      register: nairobi_mdms_init
      changed_when: "'Submodule path' in nairobi_mdms_init.stdout"
      delegate_to: localhost
      become: false
      when: requires_nairobi_mdms | default(false)

    # ==================== Config Directories ====================
    # Each entry is `dest_name -> src_path_relative_to_ansible_dir`.
    # `dest_name` is what ends up under {{ digit_dir }}/ on the target.
    # All live at the repo root since b8629c5f. `keycloak/` holds the
    # realm-template.json that the Keycloak overlay-design ships; it's
    # mounted into the keycloak container so the playbook can render
    # per-tenant realms from it. The dir + file are inert until
    # enable_keycloak is flipped on.
    - name: Synchronize config directories
      synchronize:
        src: "{{ item.value }}/"
        dest: "{{ digit_dir }}/{{ item.key }}/"
      loop: "{{ digit_config_dirs | dict2items }}"
      vars:
        digit_config_dirs:
          otel:     ../otel
          configs:  ../configs
          nginx:    ../nginx
          kong:     ../kong
          postman:  ../postman
          db:       ../db
          seeds:    ../seeds
          gatus:    ../gatus
          jupyter:  ../jupyter
          scripts:  ../scripts
          keycloak: ../keycloak

    # docker/ contains build contexts (db-migrations, pgr-services).
    # Even though we use pre-built images, compose may validate volume mount paths.
    - name: Synchronize docker build context dirs
      synchronize:
        src: "../docker/"
        dest: "{{ digit_dir }}/docker/"

    # Resolve the MCP image ref ONCE, before .env is rendered. When the
    # tenant opts into a local build (`build_mcp: true`) the deploy builds
    # the image itself (mcp-build task below) and points compose at a
    # local-only tag (`digit-mcp:local`) — no registry pull. Otherwise it
    # pulls the published public image. An operator can still override
    # `mcp_image:` explicitly in host_vars.
    - name: "Resolve MCP image tag"
      ansible.builtin.set_fact:
        mcp_image: >-
          {{ mcp_image
             | default('digit-mcp:local' if (build_mcp | default(false))
                       else 'ghcr.io/subhashini-egov/digit-mcp:2.12-draft-20260525-034354') }}

    # Same shape as MCP. When `build_default_data_handler: true`, the build
    # task below produces `default-data-handler:local` from utilities/default-data-handler
    # using build/maven/Dockerfile. Otherwise we pull the published image
    # carrying the relaxed RAINMAKER-PGR schema (source-file fix dated
    # 2026-05-24) and the pincode-free tenant.tenants template (the 0525
    # build seeded pg's Indian pincodes onto every new tenant's citya,
    # vetoing citizen submits with CS_COMMON_PINCODE_NOT_SERVICABLE).
    - name: "Resolve default-data-handler image tag"
      ansible.builtin.set_fact:
        ddh_image: >-
          {{ ddh_image
             | default('default-data-handler:local' if (build_default_data_handler | default(false))
                       else 'ghcr.io/subhashini-egov/default-data-handler:2.12-draft-20260611-111521') }}

    # ==================== Compose .env (per-tenant overrides) ====================
    # Templates Grafana's public root URL (so the JVM dashboard / observability
    # links match the tenant's actual domain). Compose auto-loads .env from the
    # working directory, so no extra wiring is needed in the compose file.
    - name: Write per-tenant compose .env
      template:
        src: templates/digit.env.j2
        dest: "{{ digit_dir }}/.env"
        mode: '0644'

    # ==================== digit-ui globalConfigs.js (per-tenant) ====================
    # Boot-time config for the digit-ui SPA. Every value comes from the
    # inventory (host_vars overrides group_vars). Add new keys to the
    # template + inventory; never edit the rendered file on the server.
    - name: Render digit-ui globalConfigs.js
      template:
        src: templates/globalConfigs.js.j2
        dest: "{{ digit_dir }}/nginx/globalConfigs.js"
        mode: '0644'

    - name: Add API proxy to digit-ui nginx config
      copy:
        content: |
          resolver 127.0.0.11 valid=10s;

          server
          {
            listen 80;
            underscores_in_headers on;

            sub_filter_once on;
            sub_filter_types text/html;

            location /digit-ui
            {
              root /var/web;
              index index.html index.htm;
              try_files $uri $uri/ /digit-ui/index.html;

              sub_filter '</head>' '<script src="/digit-ui/globalConfigs.js"></script></head>';
            }

            # globalConfigs.js + silent-check-sso.html are served from /host-nginx,
            # a DIRECTORY mount of the host nginx dir (compose: ./nginx:/host-nginx:ro),
            # NOT single-file mounts into /var/web/digit-ui: OrbStack doesn't reliably
            # materialize a single file nested in the tar'd build dir, and an atomic
            # re-render of globalConfigs.js changes its inode (breaking a pinned file
            # mount). A directory mount is OrbStack-safe and reflects re-renders live.
            location = /digit-ui/globalConfigs.js {
              alias /host-nginx/globalConfigs.js;
              default_type application/javascript;
              add_header Cache-Control "no-cache, must-revalidate" always;
            }

            location = /digit-ui/silent-check-sso.html {
              alias /host-nginx/silent-check-sso.html;
              default_type text/html;
            }

            # Proxy API calls to Kong gateway
            location / {
              set $kong http://kong-gateway:8000;
              proxy_pass $kong;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 120s;
              proxy_buffering off;
            }
          }
        dest: "{{ digit_dir }}/nginx/digit-ui.conf"

    # ==================== Configure domain-specific settings ====================
    - name: Set Grafana domain in compose
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: 'api\.egov\.theflywheel\.in'
        replace: "{{ domain }}"

    # Pre-boot tenant rewrites — only non-STATE_LEVEL vars that DDH,
    # MCP, and infra containers need before the stack comes up. The
    # STATE_LEVEL_TENANT_ID rewrites are DEFERRED to after MCP bootstrap
    # seeds the target tenant's MDMS data (DataSecurity, Workflow, etc.),
    # so JVM services can boot against the `pg` seed data first.

    # Same shape of overwrite-on-redeploy bug as the four above, for two
    # siblings the original fix missed:
    #   - egov-inbox PARENT_LEVEL_TENANT_ID: mz
    #   - digit-mcp / jupyter DIGIT_TENANT: pg
    # Both are tenant-shaped values the verbatim compose `copy:` resets
    # to upstream defaults on every deploy. Defensive same-pattern fix.
    - name: Set PARENT_LEVEL_TENANT_ID (egov-inbox) in compose
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)PARENT_LEVEL_TENANT_ID: mz$'
        replace: '\1PARENT_LEVEL_TENANT_ID: {{ state_root }}'

    - name: Set DIGIT_TENANT (digit-mcp / jupyter) in compose
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)DIGIT_TENANT: pg$'
        replace: '\1DIGIT_TENANT: {{ state_root }}'

    - name: Set DEFAULT_TENANT_ID (default-data-handler) in compose
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)DEFAULT_TENANT_ID: pg$'
        replace: '\1DEFAULT_TENANT_ID: {{ state_root }}'

    # ==================== Publish digit-mcp image ====================
    # digit-mcp ships from the same registry as every other DIGIT image
    # ({{ docker_registry }}/digit-mcp:latest). Compose `pull` picks it
    # up like any other service — no special transfer step.
    #
    # The push endpoint is the VPC registry (10.0.0.4:5000); pulls can
    # also go through the public mirror (registry.preview.egov.theflywheel.in)
    # which is a read-through proxy. To rebuild + republish from
    # /root/DIGIT-MCP on the controller:
    #
    #   ansible-playbook ... --tags mcp-publish
    - name: Build + push digit-mcp image to VPC registry
      shell: |
        set -e
        cd /root/DIGIT-MCP
        docker build -t 10.0.0.4:5000/digit-mcp:latest .
        docker push 10.0.0.4:5000/digit-mcp:latest
      delegate_to: localhost
      become: false
      tags: ['mcp-publish', 'never']  # opt-in only; not part of default deploy

    # ==================== Pull & Start ====================
    # COMPOSE_PROFILES drives which optional service groups are included.
    # Today: `search` covers elasticsearch + egov-indexer + inbox-v2.
    # Default off; tenants opt in via `enable_search_stack: true`.
    - name: "Compute compose profiles for this tenant"
      ansible.builtin.set_fact:
        compose_profiles: >-
          {{
            ([]
              + (['search']        if enable_search_stack | default(false) else [])
              + (['mcp']           if enable_mcp          | default(false) else [])
              + (['notifications'] if enable_novu         | default(false) else [])
              + (['keycloak']      if enable_keycloak     | default(false) else [])
            ) | join(',')
          }}

    - name: "Show active compose profiles"
      ansible.builtin.debug:
        msg: "Active compose profiles for {{ inventory_hostname }}: {{ compose_profiles or '(none — lean stack)' }}"

    # Tenants opt into the DB fast-path with `db_fast_path: true` in their
    # host_vars. When on, layer the overlay onto every compose invocation
    # below (pull, up, recreate). Default off — never touches live tenants.
    - name: "Compute compose -f flags (fast-path + per-tenant overlay opt-in)"
      ansible.builtin.set_fact:
        compose_files: >-
          {{
            '-f docker-compose.egov-digit.yaml' +
            (' -f docker-compose.fast-path.yml' if (db_fast_path | default(false)) else '') +
            (' -f docker-compose.' ~ inventory_hostname ~ '.yml' if per_tenant_overlay.stat.exists else '')
          }}

    - name: "Show compose file stack"
      ansible.builtin.debug:
        msg: "compose files for {{ inventory_hostname }}: {{ compose_files }}"

    # ==================== Build digit-mcp image locally ====================
    # When `build_mcp: true`, clone/rsync DIGIT-MCP on the *target* and
    # `docker build` there (digit-mcp:local). Controller paths must not be
    # passed to remote hosts — copy the script + source first. Runs BEFORE
    # pull so the local-only tag is present; pull skips it, `up -d` uses
    # the built image. Gated on enable_mcp too.
    - name: "MCP build — ensure workspace on target"
      ansible.builtin.file:
        path: "{{ digit_dir }}/.build"
        state: directory
        mode: "0755"
      when:
        - enable_mcp | default(false)
        - build_mcp | default(false)

    - name: "MCP build — copy mcp-build.sh to target"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/mcp-build.sh"
        dest: "{{ digit_dir }}/.build/mcp-build.sh"
        mode: "0755"
      when:
        - enable_mcp | default(false)
        - build_mcp | default(false)

    - name: "MCP build — sync vendored digit-mcp source to target"
      synchronize:
        src: "{{ playbook_dir }}/../../digit-mcp/"
        dest: "{{ mcp_repo }}/"
        delete: false
        rsync_opts:
          - "--omit-dir-times"
      when:
        - enable_mcp | default(false)
        - build_mcp | default(false)
        - (mcp_repo_url | default('-')) == '-'

    - name: "Build digit-mcp image locally (when build_mcp)"
      ansible.builtin.command: >-
        bash {{ digit_dir }}/.build/mcp-build.sh
        "{{ mcp_repo }}"
        "{{ mcp_repo_url | default('-') }}"
        "{{ mcp_ref | default('') }}"
        "{{ mcp_image }}"
        "{{ docker_default_platform | default('') }}"
      register: mcp_build_run
      changed_when: true
      when:
        - enable_mcp | default(false)
        - build_mcp | default(false)

    # ==================== Build default-data-handler image locally =========
    # When `build_default_data_handler: true`, build the image from the
    # vendored source in this repo (utilities/default-data-handler) using
    # the shared maven Dockerfile (build/maven/Dockerfile). The image is
    # tagged `default-data-handler:local`; compose picks it up via DDH_IMAGE.
    #
    # Build context is the CCRS repo root so the Dockerfile can reach both
    # utilities/default-data-handler/{pom.xml,src} and build/maven/start.sh.
    # Works for `ansible_connection: local` (controller path == target path).
    # For real remote targets, add a synchronize step that rsyncs both
    # subdirs to a build-context dir on the target.
    - name: "Build default-data-handler image locally (when build_default_data_handler)"
      ansible.builtin.command: >-
        docker build
        -t default-data-handler:local
        --build-arg WORK_DIR=utilities/default-data-handler
        -f build/maven/Dockerfile
        .
      args:
        chdir: "{{ playbook_dir }}/../.."
      register: ddh_build_run
      changed_when: true
      when:
        - build_default_data_handler | default(false)

    # ==================== Build otp-publisher image locally ===============
    # When `build_otp_publisher: true`, build the vendored Node service at
    # utilities/otp-publisher (its own Dockerfile, NOT the maven one) and tag
    # it otp-publisher:local; compose picks it up via OTP_PUBLISHER_IMAGE.
    # Only needed when the notifications profile (SMS-OTP path) is enabled.
    - name: "Build otp-publisher image locally (when build_otp_publisher)"
      ansible.builtin.command: >-
        docker build
        -t otp-publisher:local
        -f utilities/otp-publisher/Dockerfile
        utilities/otp-publisher
      args:
        chdir: "{{ playbook_dir }}/../.."
      register: otp_publisher_build_run
      changed_when: true
      when:
        - build_otp_publisher | default(false)

    # ==================== Build digit-ui from source ====================
    # Mirrors the configurator + mcp fold-ins: when `build_digit_ui: true`,
    # clone digit-ui-esbuild + `npm run build` here (files/digit-ui-build.sh).
    # The bundle is laid into the digit-ui container AFTER up -d via tar (see
    # the "lay digit-ui build into container" task below) — NOT a bind-mount:
    # mounting build/ over /var/web/digit-ui makes the nested globalConfigs.js /
    # silent-check-sso.html file-mounts fail on OrbStack (file-inside-dir-mount),
    # 404'ing globalConfigs.js. tar over the baked SPA, leaving those two file
    # mounts intact, sidesteps that. No registry/pinned-image dependency.
    # Default off → no Linux behaviour change.
    - name: "Build digit-ui from source (when build_digit_ui)"
      ansible.builtin.command: >-
        bash {{ playbook_dir }}/files/digit-ui-build.sh
        "{{ digit_ui_esbuild_repo_dir | default(playbook_dir ~ '/../../digit-ui-esbuild') }}"
        "{{ digit_ui_esbuild_repo | default('-') }}"
        "{{ digit_ui_esbuild_branch | default('') }}"
      environment:
        REACT_APP_MAP_TENANT: "{{ city_tenant | default(ui_state_tenant_id | default('')) }}"
      register: digit_ui_build_run
      changed_when: true
      when:
        - build_digit_ui | default(false)

    # ---- Keycloak readiness BEFORE the dependent compose-up (converge-abort fix) ----
    # The compose-up below waits on keycloak: service_healthy, but the keycloak DB
    # secret is otherwise written to .env only AFTER it (the OpenBao block further
    # down). So the first compose-up runs keycloak with the compose-default
    # password, recreates keycloak/keycloak-postgres when .env later changes,
    # keycloak races its DB / fails the healthcheck inside compose's dependency
    # wait, and the whole play ABORTS — silently skipping every post-compose-up
    # task (configurator build, overpass, etc.). Bring up OpenBao +
    # keycloak-postgres, unseal, write the keycloak secrets to .env, and align the
    # DB-user password HERE so the compose-up finds keycloak able to start healthy
    # and the play runs to completion. All gated on enable_keycloak; idempotent.
    - name: "Keycloak prep — bring up OpenBao + keycloak-postgres first"
      ansible.builtin.shell: COMPOSE_PROFILES={{ compose_profiles }} docker compose {{ compose_files }} up -d openbao keycloak-postgres
      args:
        chdir: "{{ digit_dir }}"
      changed_when: true
      when: enable_keycloak | default(false)

    - name: "Keycloak prep — wait for OpenBao to bind 18200"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 18200
        timeout: 120
      when: enable_keycloak | default(false)

    - name: "Keycloak prep — load OpenBao init state"
      ansible.builtin.slurp:
        src: "{{ digit_dir }}/.openbao/init.json"
      register: kcprep_init
      no_log: true
      when: enable_keycloak | default(false)

    - name: "Keycloak prep — parse OpenBao init state"
      ansible.builtin.set_fact:
        kcprep_unseal_key: "{{ (kcprep_init.content | b64decode | from_json).keys_base64[0] }}"
        kcprep_root_token: "{{ (kcprep_init.content | b64decode | from_json).root_token }}"
      no_log: true
      when:
        - enable_keycloak | default(false)
        - kcprep_init.content is defined

    - name: "Keycloak prep — read OpenBao seal status"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/seal-status
        status_code: [200]
      register: kcprep_seal
      when:
        - enable_keycloak | default(false)
        - kcprep_root_token is defined

    - name: "Keycloak prep — unseal OpenBao if sealed"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/unseal
        method: POST
        body_format: json
        body:
          key: "{{ kcprep_unseal_key }}"
        status_code: [200]
      no_log: true
      when:
        - enable_keycloak | default(false)
        - kcprep_seal.json.sealed | default(false)

    - name: "Keycloak prep — read secrets from OpenBao"
      ansible.builtin.uri:
        url: "http://127.0.0.1:18200/v1/{{ secrets_path | regex_replace('^kv/', 'kv/data/') }}"
        headers:
          X-Vault-Token: "{{ kcprep_root_token }}"
        status_code: [200]
      register: kcprep_secrets
      no_log: true
      when:
        - enable_keycloak | default(false)
        - kcprep_root_token is defined

    - name: "Keycloak prep — write KEYCLOAK SECRETS into .env BEFORE compose-up"
      ansible.builtin.blockinfile:
        path: "{{ digit_dir }}/.env"
        block: |
          KC_ADMIN_PASSWORD={{ kcprep_secrets.json.data.data.keycloak_admin_password | default('') }}
          KC_DB_PASSWORD={{ kcprep_secrets.json.data.data.keycloak_db_password | default('') }}
          TOKEN_EXCHANGE_SYSTEM_PASSWORD={{ kcprep_secrets.json.data.data.token_exchange_system_password | default('eGov@123') }}
        marker: "# {mark} KEYCLOAK SECRETS"
        create: false
        mode: '0600'
      no_log: true
      when:
        - enable_keycloak | default(false)
        - kcprep_secrets.json is defined

    - name: "Keycloak prep — align keycloak DB-user password to OpenBao value"
      ansible.builtin.shell: >-
        docker exec keycloak-postgres psql -U keycloak -d keycloak -c
        "ALTER USER keycloak WITH PASSWORD '{{ kcprep_secrets.json.data.data.keycloak_db_password }}';"
      no_log: true
      changed_when: true
      failed_when: false
      when:
        - enable_keycloak | default(false)
        - kcprep_secrets.json.data.data.keycloak_db_password | default('') | length > 0

    - name: Pull all images from VPC registry
      shell: COMPOSE_PROFILES={{ compose_profiles }} docker compose {{ compose_files }} pull --ignore-pull-failures
      args:
        chdir: "{{ digit_dir }}"

    - name: Start DIGIT stack (Linux/Debian)
      shell: COMPOSE_PROFILES={{ compose_profiles }} docker compose {{ compose_files }} up -d
      args:
        chdir: "{{ digit_dir }}"
      when: ansible_system != "Darwin"

    # macOS/Rosetta: JVM services cold-start slower than compose's
    # depends_on: service_healthy timeouts, so the first `up -d` aborts
    # ("dependency failed to start") even though the containers it
    # created keep warming and DO go healthy. A bare retry then hits
    # leaked network endpoints ("endpoint <svc> already exists"). The
    # helper converges by clearing only non-running leaked endpoints and
    # re-issuing `up -d` (preserving accumulated JVM warmth — no `down`).
    - name: "Start DIGIT stack (macOS/Rosetta — converge loop)"
      ansible.builtin.command: >-
        bash {{ playbook_dir }}/files/mac-stack-up.sh
        "{{ digit_dir }}"
        "{{ digit_dir | basename }}_egov-network"
        "{{ compose_profiles }}"
        {{ compose_files }}
      register: mac_stack_up
      changed_when: true
      when: ansible_system == "Darwin"

    # Lay the from-source digit-ui bundle into the running container (tar over
    # the baked SPA), keeping the globalConfigs.js / silent-check-sso.html file
    # mounts intact (those are excluded). Done AFTER up -d (docker exec needs a
    # running container). Re-applied every deploy; ephemeral across a manual
    # container restart, which is fine — the UI only changes on deploy. We do
    # NOT bind-mount the whole build dir: on OrbStack a file-mount nested inside
    # a dir-mount fails, 404'ing globalConfigs.js.
    - name: "Lay digit-ui from-source build into the container (when build_digit_ui)"
      ansible.builtin.shell: |
        set -e
        for i in $(seq 1 24); do
          if [ "$(docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' digit-ui 2>/dev/null)" = "true" ]; then break; fi
          sleep 5
        done
        tar -C "{{ digit_ui_esbuild_repo_dir | default(playbook_dir ~ '/../../digit-ui-esbuild') }}/build" \
            --exclude=globalConfigs.js --exclude=silent-check-sso.html -cf - . \
          | docker exec -i digit-ui tar -C /var/web/digit-ui -xf -
      register: digit_ui_tar
      changed_when: true
      when:
        - build_digit_ui | default(false)

    # If a tenant just flipped enable_search_stack: true → false, the
    # previously-running search containers (digit-elasticsearch,
    # egov-indexer, digit-inbox) won't be stopped by the up -d above
    # because compose only manages services in the active profiles.
    # Sweep them explicitly when search is OFF.
    - name: "Sweep search-stack containers when profile is OFF"
      ansible.builtin.shell: |
        for c in digit-elasticsearch egov-indexer digit-inbox; do
          if docker ps --filter name=^${c}$ --format '{{ "{{" }}.Names{{ "}}" }}' | grep -q "^${c}$"; then
            docker stop "$c" >/dev/null
            docker rm "$c" >/dev/null
            echo "swept $c"
          fi
        done
      register: search_sweep
      changed_when: search_sweep.stdout | length > 0
      when: not (enable_search_stack | default(false))

    # ==================== Health Check ====================
    - name: Wait for Kong gateway to be healthy (up to 10 min)
      shell: docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' kong-gateway
      register: kong_health
      retries: 60
      delay: 10
      until: kong_health.stdout == 'healthy'
      changed_when: false

    # ==================== Wait for Persister (Kafka consumer) ====================
    - name: Wait for egov-persister to be healthy
      shell: docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' egov-persister
      register: persister_health
      retries: 30
      delay: 10
      until: persister_health.stdout == 'healthy'
      changed_when: false

    - name: Wait for egov-hrms to be healthy (JVM startup ~3 min)
      shell: docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' egov-hrms
      register: hrms_health
      retries: 30
      delay: 10
      until: hrms_health.stdout == 'healthy'
      changed_when: false

    # ==================== digit-ui mode convergence ====================
    # Three runtime models, picked by host_vars `digit_ui_mode`:
    #
    #   static — host nginx serves /opt/digit-ui-esbuild/build/ directly
    #            (no inner Docker container, no esbuild dev server).
    #            Build is produced by `node esbuild.build.js` at deploy.
    #
    #   hmr    — host-side `node esbuild.dev.js` in tmux session `esbuild`,
    #            watching /opt/digit-ui-esbuild for live reload. Binds
    #            18080; nginx proxies / to it.
    #
    # Both modes can coexist on disk (same /opt/digit-ui-esbuild), but
    # only one runs at a time. The off-mode runner is killed before the
    # in-mode one starts, so port 18080 is unambiguously owned.

    # --- static mode ---
    - name: "digit-ui mode=static — stop digit-ui container if running (host nginx serves now)"
      ansible.builtin.shell: |
        if docker ps --filter name=^digit-ui$ --format '{% raw %}{{.Names}}{% endraw %}' | grep -q '^digit-ui$'; then
          docker stop digit-ui
          echo stopped
        fi
      register: stop_digit_ui_static
      changed_when: stop_digit_ui_static.stdout == "stopped"
      when: digit_ui_mode == "static"

    # Prebuilt-bundle path: when `digit_ui_bundle_image` is set (e.g.
    # ghcr.io/subhashini-egov/digit-ui-esbuild:nightly-develop, published
    # from the monorepo's digit-ui-esbuild/), pull it and extract the
    # baked SPA into the same build/ dir host nginx already serves —
    # no on-host node/npm/esbuild, and no dependence on the upstream
    # git repo's state. Per-tenant globalConfigs.js still propagates:
    # nginx serves it from {{ digit_dir }}/nginx/ via a location alias
    # that shadows the build's baked copy.
    - name: "digit-ui mode=static — deploy prebuilt bundle from digit_ui_bundle_image"
      ansible.builtin.shell: |
        set -euo pipefail
        docker pull {{ digit_ui_bundle_image }}
        id=$(docker create {{ digit_ui_bundle_image }})
        trap 'docker rm -f "$id" >/dev/null' EXIT
        rm -rf /opt/digit-ui-esbuild/build.new
        docker cp "$id":/var/web/digit-ui /opt/digit-ui-esbuild/build.new
        mkdir -p /opt/digit-ui-esbuild/build
        rsync -a --delete /opt/digit-ui-esbuild/build.new/ /opt/digit-ui-esbuild/build/
        rm -rf /opt/digit-ui-esbuild/build.new
      args:
        executable: /bin/bash
      changed_when: true
      when:
        - digit_ui_mode == "static"
        - (digit_ui_bundle_image | default('')) | length > 0

    - name: "digit-ui mode=static — install Node 20 if missing (esbuild.build.js needs it)"
      ansible.builtin.apt:
        name: nodejs
        state: present
      when:
        - digit_ui_mode == "static"
        - ansible_system != "Darwin"
        - (digit_ui_bundle_image | default('')) | length == 0

    - name: "digit-ui mode=static — npm install if package.json is newer than node_modules"
      ansible.builtin.shell: |
        # `creates: node_modules/.package-lock.json` was wrong: it assumed
        # any prior install means deps are in sync. But when the repo gets
        # `git pull`'d and a new dep enters package.json (e.g. @turf/*),
        # node_modules is stale and esbuild.build.js fails to resolve.
        # Re-run if package.json or package-lock.json is newer than the
        # node_modules root, or if node_modules doesn't exist at all.
        cd /opt/digit-ui-esbuild
        if [ ! -d node_modules ] \
           || [ package.json -nt node_modules ] \
           || [ package-lock.json -nt node_modules ]; then
          npm install --legacy-peer-deps
          echo installed
        else
          echo skipped
        fi
      register: npm_install
      changed_when: npm_install.stdout == "installed"
      when:
        - digit_ui_mode == "static"
        - (digit_ui_bundle_image | default('')) | length == 0

    - name: "digit-ui mode=static — run esbuild.build.js (idempotent: skips if build/ index newer than sources)"
      ansible.builtin.shell: |
        cd /opt/digit-ui-esbuild
        # Quick freshness check: if build/index.html is newer than the
        # most-recent source file, skip the rebuild (~5s saved on
        # repeat deploys).
        if [ -f build/index.html ]; then
          newest_src=$(find products packages public package.json -type f -newer build/index.html 2>/dev/null | head -1)
          if [ -z "$newest_src" ]; then
            echo "build/ is up-to-date — skipping rebuild"
            exit 0
          fi
        fi
        # GLOBAL_CONFIGS lets the build inline the per-tenant config; nginx
        # also serves the same file at /digit-ui/globalConfigs.js so a
        # config change without a rebuild still propagates.
        GLOBAL_CONFIGS={{ digit_dir }}/nginx/globalConfigs.js node esbuild.build.js
      args:
        executable: /bin/bash
      register: esbuild_build
      changed_when: "'skipping rebuild' not in esbuild_build.stdout"
      when:
        - digit_ui_mode == "static"
        - (digit_ui_bundle_image | default('')) | length == 0

    # --- hmr mode ---
    - name: "digit-ui mode=hmr — stop digit-ui container after compose brought it up"
      ansible.builtin.shell: |
        if docker ps --filter name=^digit-ui$ --format '{% raw %}{{.Names}}{% endraw %}' | grep -q '^digit-ui$'; then
          docker stop digit-ui
          echo stopped
        fi
      register: post_up_stop_digit_ui
      changed_when: post_up_stop_digit_ui.stdout == "stopped"
      when: digit_ui_mode == "hmr"

    - name: "digit-ui mode=hmr — start tmux esbuild session"
      ansible.builtin.shell: |
        if ! tmux has-session -t esbuild 2>/dev/null; then
          cd /opt/digit-ui-esbuild
          tmux new-session -d -s esbuild \
            "PORT=18080 GLOBAL_CONFIGS={{ digit_dir }}/nginx/globalConfigs.js node esbuild.dev.js 2>&1 | tee /var/log/esbuild.log"
          echo started
        fi
      register: start_esbuild
      changed_when: start_esbuild.stdout == "started"
      when: digit_ui_mode == "hmr"

    # --- mode-agnostic verification ---
    - name: "digit-ui mode=static — verify built bundle is on disk"
      ansible.builtin.stat:
        path: /opt/digit-ui-esbuild/build/index.html
      register: built_bundle
      failed_when: not built_bundle.stat.exists
      when: digit_ui_mode == "static"

    - name: "digit-ui mode=hmr — verify esbuild bound :18080"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 18080
        timeout: 120
      when: digit_ui_mode == "hmr"

    # In HMR mode, esbuild is up on :18080 — probe it directly here. In
    # static mode the host nginx that aliases /digit-ui/ to
    # /opt/digit-ui-esbuild/build/ hasn't been re-templated yet (that
    # happens at the "Deploy configurator nginx site config" task far
    # below), so the /digit-ui/ probe lives in the validation block at
    # the end of the play, AFTER nginx has been reloaded.
    - name: "digit-ui mode=hmr — verify /digit-ui/ serves 200 via esbuild"
      ansible.builtin.shell: curl -sf http://127.0.0.1:18080/digit-ui/ -o /dev/null
      register: ui_early_check
      retries: 30
      delay: 10
      until: ui_early_check.rc == 0
      changed_when: false
      when: digit_ui_mode == "hmr"

    # ============================================================
    # digit-ui-v2 — Vite + React 19 citizen SPA (new in feat/keycloak-stack).
    #
    # Source lives at /opt/digit-ui-v2 on the TARGET (cloned via
    # ansible.builtin.git so the build environment matches the host's
    # Node — no controller-side cross-arch surprises). Mirrors the
    # digit-ui-esbuild pattern (clone-on-target + build-on-target),
    # NOT the configurator pattern (controller-side build). Rationale:
    # digit-ui-v2's Vite build pulls native deps (esbuild + lightningcss
    # platform binaries) that must match the runtime arch; building on
    # the target avoids the "ran on Mac controller, won't link on
    # x86_64 server" failure mode.
    #
    # Env-var contract (read by Vite at build time via import.meta.env)
    # is documented in CLAUDE.md / handoff between this PR and the
    # sister UI PR. Update both ends together.
    # ============================================================
    - name: "digit-ui-v2 — ensure /opt/digit-ui-v2 repo present + on chosen branch"
      ansible.builtin.git:
        repo: "{{ digit_ui_v2_repo | default('https://github.com/ChakshuGautam/Citizen-Complaint-Resolution-System.git') }}"
        dest: /opt/digit-ui-v2
        version: "{{ digit_ui_v2_branch | default('feat/digit-ui-v2-keycloak') }}"
        update: true
        force: true
      when: enable_digit_ui_v2 | default(false)

    - name: "digit-ui-v2 — install Node 20 if missing (Vite build needs it)"
      ansible.builtin.apt:
        name: nodejs
        state: present
      when:
        - enable_digit_ui_v2 | default(false)
        - ansible_system != "Darwin"

    - name: "digit-ui-v2 — npm install if package.json newer than node_modules"
      ansible.builtin.shell: |
        cd /opt/digit-ui-v2/digit-ui-v2
        if [ ! -d node_modules ] \
           || [ package.json -nt node_modules ] \
           || [ package-lock.json -nt node_modules ]; then
          npm install --no-audit --no-fund --prefer-offline
          echo installed
        else
          echo skipped
        fi
      register: dui2_install
      changed_when: dui2_install.stdout == 'installed'
      when: enable_digit_ui_v2 | default(false)

    - name: "digit-ui-v2 — build (vite) with env contract"
      ansible.builtin.shell: |
        cd /opt/digit-ui-v2/digit-ui-v2
        VITE_AUTH_PROVIDER="{{ auth_provider | default('') }}" \
        VITE_KEYCLOAK_URL=/auth \
        VITE_KEYCLOAK_REALM="{{ state_tenant_id }}" \
        VITE_KEYCLOAK_CLIENT_ID="{{ keycloak_client_id | default('digit-ui') }}" \
        VITE_TOKEN_EXCHANGE_URL=/token-exchange \
        VITE_CITIZEN_STATE_TENANT="{{ state_tenant_id }}" \
        VITE_CITIZEN_TENANT="{{ tenant_id }}" \
        npm run build
        test -f dist/index.html
      args:
        executable: /bin/bash
      register: dui2_build
      changed_when: true
      when: enable_digit_ui_v2 | default(false)

    - name: "digit-ui-v2 — ensure /var/www/citizen exists"
      ansible.builtin.file:
        path: /var/www/citizen
        state: directory
        mode: '0755'
      when: enable_digit_ui_v2 | default(false)

    # rsync on the TARGET (not synchronize from the controller). The
    # source dist lives on the same box as the destination, so a local
    # rsync is faster and avoids the ansible.posix.synchronize
    # cross-host SSH dance. delete=true so a removed asset doesn't
    # linger; --no-perms/--no-owner because /var/www/citizen is owned
    # by root:root and we don't want to chown to the npm-build user.
    - name: "digit-ui-v2 — sync dist/ to /var/www/citizen/"
      ansible.builtin.command: >-
        rsync -a --delete
        --no-perms --no-times --no-owner --no-group
        /opt/digit-ui-v2/digit-ui-v2/dist/
        /var/www/citizen/
      register: dui2_sync
      changed_when: dui2_sync.rc == 0
      when: enable_digit_ui_v2 | default(false)

    # ==================== Wait for MCP Server ====================
    # Only when MCP is actually deployed. enable_mcp is false on Mac (the
    # digit-mcp image is VPC-registry-only) and anywhere off the Hetzner
    # VPC — without this gate the playbook hangs 2 min then fails on a
    # service it was never asked to run. Consistent with the enable_mcp
    # gating on the mcp-bootstrap tasks below.
    - name: Wait for digit-mcp health (up to 2 min)
      shell: curl -sf http://127.0.0.1:13101/healthz -o /dev/null
      register: mcp_health
      retries: 12
      delay: 10
      until: mcp_health.rc == 0
      changed_when: false
      when: enable_mcp | default(false)

    # ==================== OpenBao bootstrap ====================
    # Per-tenant secrets backend. Initialized once; subsequent runs
    # auto-unseal using the keys captured at init. The init JSON lives
    # at /opt/digit/.openbao/init.json (0600) — back it up out-of-band
    # because losing it = losing access to every secret in this tenant's
    # OpenBao until you re-init (which loses all stored secrets).

    - name: "OpenBao — directory for init state"
      ansible.builtin.file:
        path: "{{ digit_dir }}/.openbao"
        state: directory
        mode: '0700'

    - name: "OpenBao — wait for container to bind 18200"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 18200
        timeout: 60

    - name: "OpenBao — check init status"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/init
        status_code: [200]
      register: bao_init_status

    - name: "OpenBao — initialize if first deploy (writes init.json with 0600)"
      when: not bao_init_status.json.initialized
      block:
        - name: "OpenBao — operator init"
          ansible.builtin.uri:
            url: http://127.0.0.1:18200/v1/sys/init
            method: POST
            body_format: json
            body:
              secret_shares: 1
              secret_threshold: 1
            status_code: [200]
          register: bao_init_response

        - name: "OpenBao — persist init state"
          ansible.builtin.copy:
            dest: "{{ digit_dir }}/.openbao/init.json"
            content: "{{ bao_init_response.json | to_nice_json }}"
            mode: '0600'
          no_log: true

    - name: "OpenBao — load init state"
      ansible.builtin.slurp:
        src: "{{ digit_dir }}/.openbao/init.json"
      register: bao_init_file
      no_log: true

    - name: "OpenBao — parse init state"
      ansible.builtin.set_fact:
        bao_unseal_key: "{{ (bao_init_file.content | b64decode | from_json).keys_base64[0] }}"
        bao_root_token: "{{ (bao_init_file.content | b64decode | from_json).root_token }}"
      no_log: true

    - name: "OpenBao — read seal status"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/seal-status
        status_code: [200]
      register: bao_seal_status

    - name: "OpenBao — unseal if sealed"
      when: bao_seal_status.json.sealed
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/unseal
        method: POST
        body_format: json
        body:
          key: "{{ bao_unseal_key }}"
        status_code: [200]
      no_log: true

    - name: "OpenBao — enable kv v2 mount at kv/ (idempotent)"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/mounts/kv
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code: [204, 400]   # 400 = already exists (idempotent)
      register: bao_kv_mount
      failed_when: bao_kv_mount.status == 400 and 'path is already in use' not in (bao_kv_mount.json.errors | join(' '))
      no_log: true

    - name: "OpenBao — seed bootstrap secrets from host_vars (only writes missing keys)"
      ansible.builtin.uri:
        url: "http://127.0.0.1:18200/v1/{{ secrets_path | regex_replace('^kv/', 'kv/data/') }}"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        body_format: json
        body:
          options:
            cas: 0   # only write if no version exists yet — won't overwrite later edits
          data: "{{ bootstrap_secrets | default({}) }}"
        status_code: [200, 400]   # 400 = cas check failed (already seeded)
      register: bao_seed
      failed_when: bao_seed.status == 400 and 'check-and-set' not in (bao_seed.json.errors | join(' '))
      when: bootstrap_secrets is defined and bootstrap_secrets | length > 0
      no_log: true

    # ============================================================
    # Pull live secrets back from OpenBao and write them into
    # /opt/digit/.env. docker compose auto-loads .env from its
    # working directory, so the next `up -d` (recreate-on-change)
    # picks them up — services that reference ${POSTGRES_PASSWORD}
    # etc. now read from OpenBao instead of compose-inline defaults.
    # ============================================================
    - name: "OpenBao — read tenant secrets for compose env"
      ansible.builtin.uri:
        url: "http://127.0.0.1:18200/v1/{{ secrets_path | regex_replace('^kv/', 'kv/data/') }}"
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        status_code: [200]
      register: bao_secrets
      no_log: true

    - name: "OpenBao — write secrets into compose .env (idempotent block)"
      ansible.builtin.blockinfile:
        path: "{{ digit_dir }}/.env"
        block: |
          # Pulled from OpenBao at deploy time. Edit via:
          #   bao kv put {{ secrets_path }} <key>=<value>
          # NOT by editing this file directly (it's regenerated each deploy).
          POSTGRES_PASSWORD={{ bao_secrets.json.data.data.postgres_password }}
          MCP_DB_PASSWORD={{ bao_secrets.json.data.data.mcp_db_password }}
          MINIO_ROOT_USER={{ bao_secrets.json.data.data.minio_root_user }}
          MINIO_ROOT_PASSWORD={{ bao_secrets.json.data.data.minio_root_password }}
          AWS_KEY={{ bao_secrets.json.data.data.minio_root_user }}
          AWS_SECRETKEY={{ bao_secrets.json.data.data.minio_root_password }}
          ELASTICSEARCH_MASTER_PASSWORD={{ bao_secrets.json.data.data.elasticsearch_master_password }}
          EGOV_HRMS_DEFAULT_PASSWORD={{ bao_secrets.json.data.data.egov_hrms_default_password }}
        marker: "# {mark} TENANT SECRETS"
        create: false           # .env was already written by the digit.env.j2 template earlier
        mode: '0600'            # tighten — was 0644 from the template; secrets bump to 0600
      no_log: true

    # Keycloak-tier secrets — appended as a separate marked block so the
    # main TENANT SECRETS block stays untouched on Keycloak-free tenants.
    # Default-empty strings so a missing key in OpenBao (e.g. first deploy
    # before the operator filled them in) doesn't fail template rendering;
    # the keycloak containers fail their healthcheck loudly enough the
    # operator notices. Without this block the overlay's KC_ADMIN_PASSWORD
    # defaults to "admin" in compose, which mismatches KC's actual admin
    # password and breaks user provisioning silently.
    - name: "OpenBao — write Keycloak secrets into compose .env (when enable_keycloak)"
      ansible.builtin.blockinfile:
        path: "{{ digit_dir }}/.env"
        block: |
          KC_ADMIN_PASSWORD={{ bao_secrets.json.data.data.keycloak_admin_password | default('') }}
          KC_DB_PASSWORD={{ bao_secrets.json.data.data.keycloak_db_password | default('') }}
          TOKEN_EXCHANGE_SYSTEM_PASSWORD={{ bao_secrets.json.data.data.token_exchange_system_password | default('eGov@123') }}
        marker: "# {mark} KEYCLOAK SECRETS"
        create: false
        mode: '0600'
      no_log: true
      when: enable_keycloak | default(false)

    - name: "OpenBao — append Google IdP secret into compose .env (when configured)"
      ansible.builtin.lineinfile:
        path: "{{ digit_dir }}/.env"
        regexp: '^KC_GOOGLE_CLIENT_SECRET='
        line: "KC_GOOGLE_CLIENT_SECRET={{ bao_secrets.json.data.data.keycloak_google_client_secret | default('') }}"
        create: false
        mode: '0600'
      no_log: true
      when:
        - enable_keycloak | default(false)
        - (keycloak_google_client_id | default('')) | length > 0

    # The first `up -d` started postgres with POSTGRES_PASSWORD=egov123
    # (the default before OpenBao secrets were available). initdb created
    # the `egov` role with that password. Now that the real password is
    # in .env, ALTER the role inside the running database so the second
    # `up -d` (which passes the new password to services) can connect.
    # On repeat deploys the named volume already has data, initdb won't
    # re-run, so this ALTER is the only way the password gets updated.
    - name: "OpenBao — sync postgres role password with vault secret"
      ansible.builtin.shell: >-
        printf "ALTER ROLE egov WITH PASSWORD '%s';\n" "$NEWPW" |
        docker exec -i docker-postgres psql -U egov -d egov
      environment:
        NEWPW: "{{ bao_secrets.json.data.data.postgres_password }}"
      no_log: true
      changed_when: true

    # Same drift as egov above, on the MCP session-store postgres:
    # initdb ran with the default mcp123 (no .env yet) and created the
    # `mcp` role with that password. OpenBao then wrote the real
    # MCP_DB_PASSWORD into .env; the recreated digit-mcp container will
    # send the vault value, which the role doesn't accept. ALTER the
    # role inside digit-mcp-postgres so the next up -d's MCP can connect.
    - name: "OpenBao — sync mcp-postgres role password with vault secret"
      ansible.builtin.shell: >-
        printf "ALTER ROLE mcp WITH PASSWORD '%s';\n" "$NEWPW" |
        docker exec -i digit-mcp-postgres psql -U mcp -d mcp_sessions
      environment:
        NEWPW: "{{ bao_secrets.json.data.data.mcp_db_password }}"
      no_log: true
      changed_when: true
      when: enable_mcp | default(false)

    - name: "Recreate services with the new env (Linux/Debian)"
      ansible.builtin.shell: COMPOSE_PROFILES={{ compose_profiles }} docker compose {{ compose_files }} up -d
      args:
        chdir: "{{ digit_dir }}"
      register: post_secrets_recreate
      changed_when: "'Recreated' in post_secrets_recreate.stdout or 'Started' in post_secrets_recreate.stdout"
      when: ansible_system != "Darwin"

    # OpenBao wrote secrets into .env → compose recreates the JVM
    # containers, which cold-start under Rosetta and trip the same
    # depends_on: service_healthy timeout as the initial start. Reuse the
    # converge helper (down --remove-orphans + up -d loop) so this second
    # up -d also settles instead of aborting "dependency failed to start".
    - name: "Recreate services with the new env (macOS/Rosetta — converge loop)"
      ansible.builtin.command: >-
        bash {{ playbook_dir }}/files/mac-stack-up.sh
        "{{ digit_dir }}"
        "{{ digit_dir | basename }}_egov-network"
        "{{ compose_profiles }}"
        {{ compose_files }}
      # SKIP_DOWN: network is already consistent from converge#1 and only
      # .env changed — a plain retried up -d recreates just the env-changed
      # (JVM) containers and leaves infra + openbao up. ~halves deploy time
      # and stops re-sealing openbao (the re-unseal below becomes a no-op
      # safety net). Do NOT set this for converge#1.
      environment:
        MAC_STACK_UP_SKIP_DOWN: "1"
      register: post_secrets_recreate_mac
      changed_when: true
      when: ansible_system == "Darwin"

    # converge#2 above (mac-stack-up down+up) recreated the openbao
    # container, which comes back SEALED — the earlier unseal ran before
    # this recreate. Without re-unsealing, the final "OpenBao unsealed"
    # validation 503s (sealed/standby). Darwin only: on Linux the
    # post-OpenBao recreate is a plain up -d that doesn't recreate openbao.
    - name: "OpenBao — wait for API again after converge#2 (Darwin)"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/seal-status
        status_code: [200]
      register: bao_seal_status_post
      retries: 24
      delay: 5
      until: bao_seal_status_post.status == 200
      when: ansible_system == "Darwin"

    - name: "OpenBao — re-unseal after converge#2 if sealed (Darwin)"
      when:
        - ansible_system == "Darwin"
        - bao_seal_status_post.json.sealed | default(true)
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/unseal
        method: POST
        body_format: json
        body:
          key: "{{ bao_unseal_key }}"
        status_code: [200]
      no_log: true

    - name: "OpenBao — show access info"
      ansible.builtin.debug:
        msg: |
          OpenBao is up at https://{{ domain }}:18200 (localhost-only on the box).

          Tunnel from your laptop:
            ssh -L 18200:127.0.0.1:18200 {{ ansible_user }}@{{ ansible_host }}
            open http://localhost:18200/ui

          Root token + unseal key (DO NOT lose):
            scp {{ ansible_user }}@{{ ansible_host }}:{{ digit_dir }}/.openbao/init.json ./init-{{ inventory_hostname }}.json

          Secrets path for this tenant: {{ secrets_path }}
      ignore_errors: yes

    # ============================================================
    # Host nginx — must be in place + reloaded BEFORE the validation
    # block so the public-URL probes hit the freshly-rendered template
    # (with the /digit-ui/ alias for static mode, /mcp / /status / etc.
    # for whichever features the host_vars enables).
    # ============================================================
    - name: "Configurator SPA — ensure configurator web dir"
      ansible.builtin.file:
        path: "{{ configurator_www_dir }}"
        state: directory

    # Config-driven build: when `build_configurator: true`, the deploy builds
    # the digit-configurator dist itself (npm + vite build) so a new tenant gets
    # the configurator with zero manual steps. The source is VENDORED in-tree at
    # CCRS `configurator/` (the upstream digit-configurator repo is retired into
    # CCRS) — repo_url "-" tells the script to build in place, no clone. The
    # script prints the dist path on its last line; captured into the
    # `configurator_build` var the sync task below consumes. (A real
    # configurator_repo_url still clones, for transitional/standalone use.)
    - name: "Configurator SPA — build dist (when build_configurator)"
      ansible.builtin.command: >-
        bash {{ playbook_dir }}/files/configurator-build.sh
        "{{ configurator_repo | default(playbook_dir ~ '/../../configurator') }}"
        "{{ configurator_repo_url | default('-') }}"
        "{{ configurator_ref | default('') }}"
      # When the box self-hosts Overpass, bake the same-origin endpoint into the
      # build so Phase 2's boundary fetch hits the on-box container (nginx
      # /overpass/) instead of the public, rate-limited overpass-api.de. Empty
      # otherwise → the code default (public Overpass) applies.
      environment:
        VITE_OVERPASS_URL: "{{ '/overpass/api/interpreter' if (enable_overpass | default(false)) else '' }}"
      register: configurator_build_run
      changed_when: true
      when:
        - nginx_features.configurator | default(false)
        - build_configurator | default(false)

    - name: "Configurator SPA — use freshly-built dist path"
      ansible.builtin.set_fact:
        configurator_build: "{{ configurator_build_run.stdout_lines | last }}"
      when:
        - nginx_features.configurator | default(false)
        - build_configurator | default(false)
        - configurator_build_run is defined
        - configurator_build_run.stdout_lines | default([]) | length > 0

    # Fires when the configurator location is enabled AND `configurator_build`
    # is set — either from the build step above, or pointed at a pre-built
    # dist/ by the operator. Skips entirely otherwise (no Chakshu-box default).
    - name: "Configurator SPA — sync build"
      ansible.builtin.synchronize:
        src: "{{ configurator_build }}/"
        dest: "{{ configurator_www_dir }}/"
      when:
        - nginx_features.configurator | default(false)
        - configurator_build is defined

    # ---- Turbopass search-api (opt-in: enable_turbopass) ----
    # OSM place-name autocomplete for the configurator's Phase 2 boundary
    # step (GET /turbopass/search?q=<term>&limit=<n>). Mirrors the MCP-build
    # shape: sync the vendored source to the target, `docker build` there
    # (local-only tag, no registry), run as a standalone container on
    # loopback :13301. nginx proxies /turbopass/ → it (same gate in
    # templates/nginx-site.conf.j2; trailing slash strips the prefix so the
    # app sees /search). The scraped OSM data (turbopass/data, vendored
    # in-tree) is mounted read-only at /data — the app reads DATA_DIR.
    # Default off → zero behaviour change: no image, no container, no
    # nginx block.
    - name: "Turbopass — ensure build workspace on target"
      ansible.builtin.file:
        path: "{{ digit_dir }}/.build"
        state: directory
        mode: "0755"
      when: enable_turbopass | default(false)

    - name: "Turbopass — sync vendored source + scraped data to target"
      ansible.builtin.synchronize:
        src: "{{ playbook_dir }}/../../turbopass/"
        dest: "{{ digit_dir }}/.build/turbopass/"
        delete: false
        rsync_opts:
          - "--omit-dir-times"
      when: enable_turbopass | default(false)

    - name: "Turbopass — build search-api image (turbopass-search:local)"
      ansible.builtin.command: >-
        docker build
        -t turbopass-search:local
        -f {{ digit_dir }}/.build/turbopass/search-api/Dockerfile
        {{ digit_dir }}/.build/turbopass/search-api
      register: turbopass_build_run
      changed_when: true
      when: enable_turbopass | default(false)

    - name: "Turbopass — (re)create the turbopass-search container"
      ansible.builtin.shell: |
        docker rm -f turbopass-search >/dev/null 2>&1 || true
        docker run -d --name turbopass-search --restart unless-stopped \
          -p 127.0.0.1:{{ turbopass_port | default(13301) }}:3000 \
          -e DATA_DIR=/data \
          -v {{ digit_dir }}/.build/turbopass/data:/data:ro \
          turbopass-search:local
      register: turbopass_run
      changed_when: true
      when: enable_turbopass | default(false)

    # If a tenant just flipped enable_turbopass: true → false, the
    # previously-running container isn't managed by compose, so nothing
    # above stops it. Sweep it explicitly (same idiom as the search-stack
    # sweep). No-op on tenants that never had it.
    - name: "Turbopass — sweep container when flag is OFF"
      ansible.builtin.shell: |
        if docker ps -a --filter name=^turbopass-search$ --format '{{ "{{" }}.Names{{ "}}" }}' | grep -q '^turbopass-search$'; then
          docker rm -f turbopass-search >/dev/null
          echo "swept turbopass-search"
        fi
      register: turbopass_sweep
      changed_when: turbopass_sweep.stdout | length > 0
      when: not (enable_turbopass | default(false))

    # ---- Self-hosted Overpass (opt-in: enable_overpass) ----
    # The configurator's Phase 2 boundary-polygon fetch hits Overpass. The
    # public overpass-api.de is rate-limited / 504-prone; a box can self-host
    # it as a standalone `bomet-overpass` container (loopback only) fed a
    # boundary-filtered OSM extract, with nginx proxying /overpass/ → it (same
    # gate). The configurator build above bakes VITE_OVERPASS_URL=/overpass/...
    # when this flag is on. The extract is operator-prepared (country choice +
    # size are deployment-specific) — see overpass/README.md + prepare-extract.sh;
    # the playbook only runs the container against {{ overpass_planet_file }}.
    - name: "Overpass — ensure data dir on target"
      ansible.builtin.file:
        path: "{{ overpass_data_dir | default('/opt/overpass/data') }}"
        state: directory
        mode: '0755'
      when: enable_overpass | default(false)

    - name: "Overpass — check prepared extract exists"
      ansible.builtin.stat:
        path: "{{ overpass_planet_file | default('/opt/overpass/data/boundaries.osm.bz2') }}"
      register: overpass_extract
      when: enable_overpass | default(false)

    - name: "Overpass — warn if extract missing (container not started)"
      ansible.builtin.debug:
        msg: >-
          enable_overpass is true but {{ overpass_planet_file | default('/opt/overpass/data/boundaries.osm.bz2') }}
          is missing. Prepare it with overpass/prepare-extract.sh (geofabrik pbf
          → osmium boundary-filter → .osm.bz2), then re-run. Skipping container.
      when:
        - enable_overpass | default(false)
        - not (overpass_extract.stat.exists | default(false))

    # (re)create the Overpass container. OVERPASS_RULES_LOAD=10 builds the
    # area[] index the configurator's `area["name"=...]` query needs; META=no
    # keeps the DB lean. init mode imports on first run; the DB volume persists.
    - name: "Overpass — (re)create the bomet-overpass container"
      ansible.builtin.shell: |
        docker rm -f bomet-overpass >/dev/null 2>&1 || true
        docker run -d --name bomet-overpass --restart unless-stopped \
          -e OVERPASS_META=no -e OVERPASS_MODE=init -e OVERPASS_RULES_LOAD=10 \
          -e OVERPASS_PLANET_URL=file:///data/{{ (overpass_planet_file | default('/opt/overpass/data/boundaries.osm.bz2')) | basename }} \
          -p 127.0.0.1:{{ overpass_port | default(12346) }}:80 \
          -v {{ overpass_data_dir | default('/opt/overpass/data') }}:/data \
          -v {{ overpass_db_dir | default('/opt/overpass/db') }}:/db \
          wiktorn/overpass-api
      register: overpass_run
      changed_when: true
      when:
        - enable_overpass | default(false)
        - overpass_extract.stat.exists | default(false)

    # Flag flipped true → false: sweep the standalone container (not compose-managed).
    - name: "Overpass — sweep container when flag is OFF"
      ansible.builtin.shell: |
        if docker ps -a --filter name=^bomet-overpass$ --format '{{ "{{" }}.Names{{ "}}" }}' | grep -q '^bomet-overpass$'; then
          docker rm -f bomet-overpass >/dev/null
          echo "swept bomet-overpass"
        fi
      register: overpass_sweep
      changed_when: overpass_sweep.stdout | length > 0
      when: not (enable_overpass | default(false))

    # ---- digit-integration-tests dashboards (opt-in: enable_integration_tests) ----
    # Builds the react-admin catalog dashboard from the VENDORED in-tree source
    # (tests/integration-tests/) and serves both the vanilla + react-admin
    # dashboards as static files under /var/www. catalog.json + runs/ are
    # produced out-of-band by a test runner (`make publish`), NOT this deploy —
    # a placeholder catalog is seeded only if none exists yet so a fresh box
    # renders. The nginx location blocks live in templates/nginx-site.conf.j2
    # behind `nginx_features.integration_tests`; on hosts with
    # nginx_preserve_vhost (e.g. Bomet) the template is NOT rendered, so wire
    # the blocks from tests/integration-tests/deploy/nginx-integration-tests.conf
    # by hand there.
    - name: "integration-tests — install Node 20 if missing (Vite build needs it)"
      ansible.builtin.apt:
        name: nodejs
        state: present
      when:
        - enable_integration_tests | default(false)
        - ansible_system != "Darwin"

    - name: "integration-tests — build react-admin dashboard (vendored in-tree source)"
      ansible.builtin.command: >-
        bash {{ playbook_dir }}/files/integration-tests-build.sh
        "{{ integration_tests_src | default(playbook_dir ~ '/../../tests/integration-tests') }}"
        "{{ integration_tests_dashboard_base | default('/tests-v2/') }}"
      register: it_build
      changed_when: true
      when: enable_integration_tests | default(false)

    - name: "integration-tests — resolve vendored source dir"
      ansible.builtin.set_fact:
        integration_tests_dir: "{{ it_build.stdout_lines | last }}"
      when:
        - enable_integration_tests | default(false)
        - it_build is defined
        - it_build.stdout_lines | default([]) | length > 0

    - name: "integration-tests — ensure web roots exist"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/www/integration-tests
        - /var/www/integration-tests-v2
      when:
        - enable_integration_tests | default(false)
        - integration_tests_dir is defined

    # rsync on the target; exclude the runner-owned data so re-deploying the
    # static dashboard never clobbers a published run.
    - name: "integration-tests — sync vanilla dashboard → /var/www/integration-tests/"
      ansible.builtin.command: >-
        rsync -a --no-perms --no-times --no-owner --no-group
        --exclude=catalog.json --exclude=history.json --exclude=runs
        "{{ integration_tests_dir }}/dashboard/" /var/www/integration-tests/
      changed_when: true
      when:
        - enable_integration_tests | default(false)
        - integration_tests_dir is defined

    - name: "integration-tests — sync react-admin dist → /var/www/integration-tests-v2/"
      ansible.builtin.command: >-
        rsync -a --delete --no-perms --no-times --no-owner --no-group
        "{{ integration_tests_dir }}/dashboard-react-admin/dist/" /var/www/integration-tests-v2/
      changed_when: true
      when:
        - enable_integration_tests | default(false)
        - integration_tests_dir is defined

    - name: "integration-tests — seed placeholder catalog/history (only if absent; a real publish overwrites)"
      ansible.builtin.copy:
        dest: "/var/www/integration-tests/{{ item.name }}"
        content: "{{ item.content }}"
        force: false
        mode: '0644'
      loop:
        - { name: 'catalog.json', content: '{"tests":[],"runs":[]}' }
        - { name: 'history.json', content: '{"perTest":{},"runs":[]}' }
      when:
        - enable_integration_tests | default(false)
        - integration_tests_dir is defined

    - name: "integration-tests — point v2 dashboard at the shared catalog/runs (symlinks)"
      ansible.builtin.file:
        src: "../integration-tests/{{ item }}"
        dest: "/var/www/integration-tests-v2/{{ item }}"
        state: link
        force: true
      loop: [ 'catalog.json', 'history.json', 'runs' ]
      when:
        - enable_integration_tests | default(false)
        - integration_tests_dir is defined

    - name: "integration-tests — ensure htpasswd tooling for basic-auth"
      ansible.builtin.apt:
        name: apache2-utils
        state: present
      when:
        - enable_integration_tests | default(false)
        - integration_tests_basic_auth_password is defined
        - ansible_system != "Darwin"

    # Idempotent via `creates`: rotate the password by deleting the file and
    # re-running. Password comes from vault/host_vars; the task skips entirely
    # if unset (dashboards would then 401 with no valid user — set it).
    - name: "integration-tests — basic-auth user in /etc/nginx/.htpasswd-tests"
      ansible.builtin.command: >-
        htpasswd -bBc /etc/nginx/.htpasswd-tests
        "{{ integration_tests_basic_auth_user | default('digit-tests') }}"
        "{{ integration_tests_basic_auth_password }}"
      args:
        creates: /etc/nginx/.htpasswd-tests
      no_log: true
      when:
        - enable_integration_tests | default(false)
        - integration_tests_basic_auth_password is defined
        - ansible_system != "Darwin"

    # ---- RUN button: on-box test-runner daemon (opt-in: enable_integration_tests_runner) ----
    # Backs the "Run tests" button on the v2 dashboard. Loopback-only Node
    # service; nginx (/tests/api/, nginx_features.integration_tests_runner)
    # is the auth front. Requires the dashboards block above (needs
    # integration_tests_dir). A run is heavy and shares the box with the live
    # stack, so this stays opt-in and nice'd. Linux only.
    # Deps FIRST, so the next task installs the browser revision that matches
    # the locked @playwright/test (1.59.1) rather than whatever an unpinned
    # `npx playwright` would pull.
    - name: "integration-tests runner — npm deps for the test suite (tsx + playwright)"
      ansible.builtin.shell: npm ci || npm install
      args:
        chdir: "{{ integration_tests_dir }}"
      changed_when: true
      when:
        - enable_integration_tests_runner | default(false)
        - integration_tests_dir is defined
        - ansible_system != "Darwin"

    - name: "integration-tests runner — install Playwright browsers (repo-local binary, matched version)"
      ansible.builtin.command: >-
        node_modules/.bin/playwright install --with-deps chromium
      args:
        chdir: "{{ integration_tests_dir }}"
      changed_when: true
      when:
        - enable_integration_tests_runner | default(false)
        - integration_tests_dir is defined
        - ansible_system != "Darwin"

    - name: "integration-tests runner — install systemd unit"
      ansible.builtin.template:
        src: templates/integration-tests-runner.service.j2
        dest: /etc/systemd/system/integration-tests-runner.service
        mode: '0644'
      when:
        - enable_integration_tests_runner | default(false)
        - integration_tests_dir is defined
        - ansible_system != "Darwin"

    - name: "integration-tests runner — enable + (re)start daemon"
      ansible.builtin.systemd:
        name: integration-tests-runner
        state: restarted
        enabled: true
        daemon_reload: true
      when:
        - enable_integration_tests_runner | default(false)
        - integration_tests_dir is defined
        - ansible_system != "Darwin"

    # Host nginx (Linux/Debian) — apt nginx + /etc/nginx site. Skipped on
    # macOS, where nginx runs as a container instead (next block).
    - name: "Host nginx — Linux/Debian only"
      when: ansible_system != "Darwin"
      block:
      - name: "Host nginx — install if missing"
        ansible.builtin.apt:
          name: nginx
          state: present

      # `nginx_preserve_vhost: true` in host_vars makes the next three tasks
      # (render / enable / remove-default) no-op. Use it for tenants whose
      # production vhost has hand-crafted routing the template can't (yet)
      # render — e.g. Bomet's /egov-rainmaker/ filestore passthrough,
      # /novu/+/novu-api/ routing, and the /digit-ui/ host-alias. The nginx
      # install task above still runs (idempotent), so the package is
      # always present; only the site file is left alone.

      - name: "Host nginx — render site config from template"
        ansible.builtin.template:
          src: templates/nginx-site.conf.j2
          dest: "/etc/nginx/sites-available/{{ domain }}"
          mode: '0644'
        notify: Reload nginx
        when: not (nginx_preserve_vhost | default(false))

      - name: "Host nginx — enable site"
        ansible.builtin.file:
          src: "/etc/nginx/sites-available/{{ domain }}"
          dest: "/etc/nginx/sites-enabled/{{ domain }}"
          state: link
          force: yes   # convert pre-existing regular-file copies (older deploys) into a symlink
        notify: Reload nginx
        when: not (nginx_preserve_vhost | default(false))

      - name: "Host nginx — remove default site"
        ansible.builtin.file:
          path: /etc/nginx/sites-enabled/default
          state: absent
        notify: Reload nginx
        when: not (nginx_preserve_vhost | default(false))

      - name: "Host nginx — flush handlers so reload happens before validation"
        ansible.builtin.meta: flush_handlers

    # macOS thin path: run nginx as a container instead of host nginx.
    # Renders the same template (upstream host -> host.docker.internal so
    # the container reaches the host-published Kong/UI/etc ports) and
    # serves the configurator dist + globalConfigs via bind mounts.
    - name: "Mac nginx — container path"
      when: ansible_system == "Darwin"
      block:
        - name: "Mac nginx — ensure nginx dir"
          ansible.builtin.file:
            path: "{{ digit_dir }}/nginx"
            state: directory

        - name: "Mac nginx — render site config (upstreams -> host.docker.internal)"
          ansible.builtin.template:
            src: templates/nginx-site.conf.j2
            dest: "{{ digit_dir }}/nginx/site.conf"
            mode: '0644'
          vars:
            nginx_upstream_host: host.docker.internal

        - name: "Mac nginx — (re)create the digit-nginx container"
          ansible.builtin.shell: |
            docker rm -f digit-nginx >/dev/null 2>&1 || true
            docker run -d --name digit-nginx --restart unless-stopped \
              --add-host host.docker.internal:host-gateway \
              -p {{ nginx_host_port | default(80) }}:80 \
              -v {{ digit_dir }}/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro \
              -v {{ configurator_www_dir }}:/var/www/configurator:ro \
              nginx:1.27-alpine
          register: mac_nginx
          changed_when: true

    # ============================================================
    # Infrastructure validation — runs before the heavy CI tests
    # below. Cheap checks (curl-level), but every one of them is a
    # required gate: if any fail, the deploy is marked failed and
    # the heavy CI doesn't run.
    # ============================================================
    - name: "validate — no container is restarting / unhealthy / crash-looping"
      ansible.builtin.shell: |
        # Only flag genuinely broken states. Many services don't define
        # a healthcheck at all (default-data-handler, digit-gatus,
        # digit-otel-collector, digit-jupyter, etc.) and show plain "Up X"
        # with no health suffix — that's normal, not unhealthy.
        # Bad signals: "Restarting", "Exited" (with non-zero), or
        # "(unhealthy)". One-shot init containers that finished
        # successfully report "Exited (0)" — those are fine too.
        set -e
        bad=$(docker compose -f {{ digit_dir }}/docker-compose.egov-digit.yaml ps \
                --format '{{ "{{" }}.Name{{ "}}" }} {{ "{{" }}.Status{{ "}}" }}' \
              | grep -E 'Restarting|\(unhealthy\)|Exited \([1-9]' || true)
        if [ -n "$bad" ]; then
          echo "Broken containers:"
          echo "$bad"
          exit 1
        fi
      args:
        chdir: "{{ digit_dir }}"
      changed_when: false

    # When tls_enabled=false (sandbox), hit the box on plain HTTP and pass
    # `Host: {{ domain }}` so nginx routes to the right server-name block.
    # The hostname itself doesn't have to be DNS-resolvable.
    - name: "validate — public UI returns 200"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/digit-ui/"
        status_code: [200]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      retries: 3
      delay: 5

    - name: "validate — configurator returns 200 (when enabled)"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/configurator/"
        status_code: [200]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      when: nginx_features.configurator | default(false)

    - name: "validate — gatus /status/ returns 200 (when enabled)"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/status/"
        status_code: [200]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      when: nginx_features.status | default(false)

    - name: "validate — MCP HTTP transport responds 405 to HEAD (proves /mcp routed)"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/mcp"
        method: HEAD
        status_code: [405]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      when: nginx_features.mcp | default(false)

    - name: "validate — auth flow: ADMIN can mint a token"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/user/oauth/token"
        method: POST
        headers: >-
          {{
            {'Authorization': 'Basic ZWdvdi11c2VyLWNsaWVudDo=',
             'Content-Type': 'application/x-www-form-urlencoded'}
            | combine({'Host': domain} if not (tls_enabled | default(true)) else {})
          }}
        body_format: form-urlencoded
        body:
          grant_type: password
          username: "{{ bootstrap_user | default('ADMIN') }}"
          password: "{{ bootstrap_password | default('eGov@123') }}"
          scope: read
          tenantId: "{{ bootstrap_tenant | default('pg') }}"
          userType: EMPLOYEE
        status_code: [200]
        timeout: 15
        validate_certs: "{{ tls_enabled | default(true) }}"
      register: auth_probe
      retries: 6
      delay: 10

    - name: "validate — auth probe returned an access_token"
      ansible.builtin.assert:
        that:
          - auth_probe.json.access_token is defined
          - auth_probe.json.access_token | length > 10
        fail_msg: "Auth flow returned 200 but no access_token — egov-user may have wrong DB creds or schema migration didn't run."

    # ────────────────────────────────────────────────────────────────
    # MCP-driven tenant bootstrap. Once auth/pg works, ask MCP to clone
    # everything from `pg` → `state_root` (e.g. `ke`) and `pg.citest` →
    # `tenant_id` (e.g. `ke.kericho`). This seeds 30 schemas, ~1K data
    # rows, ~8K localizations, the PGR workflow, an ADMIN eg_user, and
    # an ADMIN HRMS Employee with all departments — enough for a full
    # PGR lifecycle on day 1, and enough for the ui-tenant probe below
    # to succeed so the SPA lands on the operator's tenant (not pg).
    #
    # Gating: skipped when state_tenant_id == 'pg' (nothing to bootstrap)
    # or when MCP isn't actually reachable at runtime. We don't gate on
    # `enable_mcp` here because operators can run digit-mcp out-of-band
    # (e.g. an existing container survived a wipe of the egov stack, or
    # MCP is built locally on a non-VPC box) — what matters is whether
    # /healthz responds. The reachability probe below ALWAYS runs and
    # the bootstrap tasks key off its result.
    # ────────────────────────────────────────────────────────────────
    # Pre-generate enc-service symmetric keys for the new state root and city
    # tenant BEFORE MCP bootstrap creates the ADMIN user. egov-enc-service
    # discovers tenants via MDMS search under STATE_LEVEL_TENANT_ID — at this
    # point that's still `pg.citya`, so `mz` (a different root) is unknown and
    # user encrypt/decrypt for `mz` throws "Tenant Id not found". The custom
    # `:generatekey-endpoint` image exposes POST /crypto/v1/_generatekey which
    # inserts the key row directly, bypassing MDMS discovery — solving the
    # chicken-and-egg between bootstrap needing encryption and enc-service not
    # yet knowing the new tenant. Idempotent (created: false when key exists).
    - name: "pre-bootstrap — generate enc-service key for state root ({{ state_root }})"
      ansible.builtin.uri:
        url: "http://127.0.0.1:11234/egov-enc-service/crypto/v1/_generatekey"
        method: POST
        body_format: json
        body:
          RequestInfo:
            apiId: Citizen
            ver: ".01"
            ts: null
          tenantId: "{{ state_root }}"
        status_code: [200]
        timeout: 10
      register: enc_key_root
      failed_when: false
      changed_when: (enc_key_root.json.created | default(false)) == true
      when: state_root != 'pg'

    - name: "pre-bootstrap — generate enc-service key for city tenant ({{ tenant_id }})"
      ansible.builtin.uri:
        url: "http://127.0.0.1:11234/egov-enc-service/crypto/v1/_generatekey"
        method: POST
        body_format: json
        body:
          RequestInfo:
            apiId: Citizen
            ver: ".01"
            ts: null
          tenantId: "{{ tenant_id }}"
        status_code: [200]
        timeout: 10
      register: enc_key_city
      failed_when: false
      changed_when: (enc_key_city.json.created | default(false)) == true
      when: state_root != 'pg'

    - name: "mcp-bootstrap — probe reachability"
      ansible.builtin.uri:
        url: "http://127.0.0.1:13101/healthz"
        method: GET
        status_code: [200]
        timeout: 5
      register: mcp_reachability
      failed_when: false
      changed_when: false

    - name: "mcp-bootstrap — root tenant via /v1/tenant/bootstrap"
      ansible.builtin.uri:
        url: "http://127.0.0.1:13101/v1/tenant/bootstrap"
        method: POST
        body_format: json
        body:
          target_tenant: "{{ state_root }}"
          source_tenant: "pg"
          mobile_regex: "{{ core_mobile_configs.mobileNumberPattern | default('^[6-9][0-9]{9}$') }}"
          mobile_length: "{{ core_mobile_configs.mobileNumberLength | default(10) }}"
          mobile_prefix: "{{ core_mobile_configs.mobilePrefix | default(omit) }}"
          mobile_allowed_starting_characters: "{{ core_mobile_configs.mobileNumberAllowedStartingCharacters | default(omit) }}"
          mobile_error_message: "{{ core_mobile_configs.mobileNumberErrorMessage | default(omit) }}"
          user_validation: "{{ user_validation | default(omit) }}"
          pincode_allowlist: "{{ pgr_pincode_allowlist | default(omit) }}"
          auth:
            username: "{{ bootstrap_user | default('ADMIN') }}"
            password: "{{ bootstrap_password | default('eGov@123') }}"
            tenant_id: "pg"
        status_code: [200]
        timeout: 600
      register: mcp_root_bootstrap
      when:
        - state_root != 'pg'
        - mcp_reachability.status | default(0) == 200
      ignore_errors: true

    - name: "mcp-bootstrap — city tenant via /v1/tenant/bootstrap"
      ansible.builtin.uri:
        url: "http://127.0.0.1:13101/v1/tenant/bootstrap"
        method: POST
        body_format: json
        body:
          target_tenant: "{{ tenant_id }}"
          source_tenant: "pg.citest"
          mobile_regex: "{{ core_mobile_configs.mobileNumberPattern | default('^[6-9][0-9]{9}$') }}"
          mobile_length: "{{ core_mobile_configs.mobileNumberLength | default(10) }}"
          mobile_prefix: "{{ core_mobile_configs.mobilePrefix | default(omit) }}"
          mobile_allowed_starting_characters: "{{ core_mobile_configs.mobileNumberAllowedStartingCharacters | default(omit) }}"
          mobile_error_message: "{{ core_mobile_configs.mobileNumberErrorMessage | default(omit) }}"
          user_validation: "{{ user_validation | default(omit) }}"
          pincode_allowlist: "{{ pgr_pincode_allowlist | default(omit) }}"
          auth:
            username: "{{ bootstrap_user | default('ADMIN') }}"
            password: "{{ bootstrap_password | default('eGov@123') }}"
            tenant_id: "pg"
        status_code: [200]
        timeout: 600
      register: mcp_city_bootstrap
      when:
        - state_root != 'pg'
        - mcp_reachability.status | default(0) == 200
      ignore_errors: true

    - name: "mcp-bootstrap — log result"
      ansible.builtin.debug:
        msg:
          - "MCP reachable: {{ (mcp_reachability.status | default(0)) == 200 }}"
          - "Root  bootstrap (target={{ state_root }}): {{ (mcp_root_bootstrap.json.summary | default('skipped')) if mcp_root_bootstrap is defined else 'skipped' }}"
          - "City  bootstrap (target={{ tenant_id }}): {{ (mcp_city_bootstrap.json.summary | default('skipped')) if mcp_city_bootstrap is defined else 'skipped' }}"
      when: state_root != 'pg'

    # MCP returns success=false when any seed step failed (schemas, data,
    # workflows, or localizations). Surfacing only counts ('data_failed: 4')
    # leaves operators staring at a passing playbook with no idea *what*
    # broke. Print the actual failure entries and abort the deploy — this
    # is the difference between "looks fine, but maputo's missing from the
    # login dropdown" and "you have an actionable error message".
    - name: "mcp-bootstrap — print detailed failure entries (root)"
      ansible.builtin.debug:
        msg:
          - "Root bootstrap success: {{ mcp_root_bootstrap.json.success | default('unknown') }}"
          - "Schema failures: {{ mcp_root_bootstrap.json.results.schemas.failed | default([]) }}"
          - "Data failures: {{ mcp_root_bootstrap.json.results.data.failed | default([]) }}"
          - "Workflow failures: {{ mcp_root_bootstrap.json.results.workflow.failed | default([]) }}"
          - "Localization failures (per-locale counts): {{ mcp_root_bootstrap.json.localizations | default([]) }}"
      when:
        - state_root != 'pg'
        - mcp_root_bootstrap is defined
        - (mcp_root_bootstrap.json.success | default(true)) == false

    - name: "mcp-bootstrap — print detailed failure entries (city)"
      ansible.builtin.debug:
        msg:
          - "City bootstrap success: {{ mcp_city_bootstrap.json.success | default('unknown') }}"
          - "Schema failures: {{ mcp_city_bootstrap.json.results.schemas.failed | default([]) }}"
          - "Data failures: {{ mcp_city_bootstrap.json.results.data.failed | default([]) }}"
          - "Workflow failures: {{ mcp_city_bootstrap.json.results.workflow.failed | default([]) }}"
          - "Localization failures (per-locale counts): {{ mcp_city_bootstrap.json.localizations | default([]) }}"
      when:
        - state_root != 'pg'
        - mcp_city_bootstrap is defined
        - (mcp_city_bootstrap.json.success | default(true)) == false

    # Bail out if either bootstrap reported failures. `ignore_errors: true`
    # on the API call only suppresses 4xx/5xx so we can still capture the
    # body — we still want a hard stop when the API responds 200 but
    # success=false in the body. Operators can override with
    # `tolerate_bootstrap_failures: true` if they intentionally want to
    # ship a partially-seeded tenant for further inspection.
    - name: "mcp-bootstrap — fail if any seed step reported failures"
      ansible.builtin.fail:
        msg: >-
          MCP bootstrap reported failures.
          Root success={{ mcp_root_bootstrap.json.success | default('n/a') }},
          city success={{ mcp_city_bootstrap.json.success | default('n/a') }}.
          See the detailed-failure-entries debug output above. Re-run with
          `tolerate_bootstrap_failures: true` to continue past this.
      when:
        - state_root != 'pg'
        - not (tolerate_bootstrap_failures | default(false))
        - >
          (mcp_root_bootstrap is defined and
            (mcp_root_bootstrap.json.success | default(true)) == false)
          or
          (mcp_city_bootstrap is defined and
            (mcp_city_bootstrap.json.success | default(true)) == false)

    # ────────────────────────────────────────────────────────────────
    # Post-bootstrap STATE_LEVEL_TENANT_ID rewrite. The upstream compose
    # ships with `pg` / `pg.citya` / `mz` defaults. Services boot against
    # the `pg` seed data (which exists in full-dump.sql). Once MCP
    # bootstrap has seeded the target tenant's MDMS data (DataSecurity,
    # Workflow, etc.), we rewrite STATE_LEVEL_TENANT_ID and restart so
    # services pick up the real tenant context.
    # ────────────────────────────────────────────────────────────────
    - name: "post-bootstrap — set STATE_LEVEL_TENANT_ID (state-root) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)STATE_LEVEL_TENANT_ID: pg$'
        replace: '\1STATE_LEVEL_TENANT_ID: {{ state_root }}'
      when: state_root != 'pg'

    - name: "post-bootstrap — set EGOV_STATE_LEVEL_TENANT_ID (state-root) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)EGOV_STATE_LEVEL_TENANT_ID: pg$'
        replace: '\1EGOV_STATE_LEVEL_TENANT_ID: {{ state_root }}'
      when: state_root != 'pg'

    # egov-hrms reads `EGOV_STATELEVEL_TENANT` (no underscore between
    # STATE/LEVEL) — distinct from `EGOV_STATE_LEVEL_TENANT_ID` above —
    # to know which tenant to look up its INTERNAL_USER system user
    # at boot. Without this rewrite the hardcoded `pg` survives and
    # DefaultUserService.initalizeSystemuser throws
    # "Service returned null while fetching user" → HRMS crash-loops
    # on tenants whose state_root isn't pg. Manifest of #622.
    - name: "post-bootstrap — set EGOV_STATELEVEL_TENANT (HRMS variant) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)EGOV_STATELEVEL_TENANT: pg$'
        replace: '\1EGOV_STATELEVEL_TENANT: {{ state_root }}'
      when: state_root != 'pg'

    # pgr-services' EscalationScheduler reads
    # `PGR_STATELEVEL_TENANTID` (no `_` between STATE/LEVEL, no `_ID` —
    # third spelling variant in this stack) to pick which tenant to
    # query MDMS RAINMAKER-PGR.EscalationConfig at. Without this
    # rewrite the scheduler asks MDMS at tenant `pg`, gets no result,
    # logs "Failed to fetch EscalationConfig from MDMS, using defaults"
    # and falls back to a 5-day SLA — so auto-escalation effectively
    # never fires on tenants whose state_root is anything other than
    # `pg`. Closes the deploy-side half of #585.
    - name: "post-bootstrap — set PGR_STATELEVEL_TENANTID (pgr-services variant) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)PGR_STATELEVEL_TENANTID: pg$'
        replace: '\1PGR_STATELEVEL_TENANTID: {{ state_root }}'
      when: state_root != 'pg'

    # And the matching EGOV_UI_APP_HOST_MAP rewrite. Empirically the
    # scheduler actually uses the FIRST KEY of this map to resolve the
    # tenant for its MDMS query (PGRConfiguration#getUiAppHostMap →
    # EscalationScheduler#getStateLevelTenantId). With the hardcoded
    # `{pg:…}` placeholder it queries MDMS for pg.RAINMAKER-PGR
    # .EscalationConfig and gets nothing back. Aligning the key with
    # state_root lets the scheduler reach the seeded config and
    # actually use the 1h/4h/24h SLAs we set in MDMS.
    - name: "post-bootstrap — set EGOV_UI_APP_HOST_MAP (pgr-services tenant key) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)EGOV_UI_APP_HOST_MAP: "\{pg:'
        replace: '\1EGOV_UI_APP_HOST_MAP: "{{ "{" }}{{ state_root }}:'
      when: state_root != 'pg'

    - name: "post-bootstrap — set STATE_LEVEL_TENANT_ID (city tier — enc-service + workflow) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)STATE_LEVEL_TENANT_ID: pg\.citya$'
        replace: '\1STATE_LEVEL_TENANT_ID: {{ tenant_id }}'
      when: state_root != 'pg'

    - name: "post-bootstrap — set STATE_LEVEL_TENANT_ID (inbox-service `mz` default) in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '^(\s+)STATE_LEVEL_TENANT_ID: mz$'
        replace: '\1STATE_LEVEL_TENANT_ID: {{ state_root }}'
      when: state_root != 'pg'

    # The hrms-prereq-gate one-shot searches egov-user for the
    # INTERNAL_MICROSERVICE_ROLE user at tenant `pg` before letting HRMS
    # start. After the tenant rewrite HRMS boots against state_root, so
    # the gate must check the same tenant — otherwise it passes on the
    # pg seed user while state_root has no system user at all and HRMS
    # crash-loops on the very thing the gate exists to prevent.
    - name: "post-bootstrap — point hrms-prereq-gate at state_root in compose"
      replace:
        path: "{{ digit_dir }}/docker-compose.egov-digit.yaml"
        regexp: '("tenantId":")pg(","roleCodes":\["INTERNAL_MICROSERVICE_ROLE"\])'
        replace: '\1{{ state_root }}\2'
      when: state_root != 'pg'

    - name: "post-bootstrap — recreate services (except egov-hrms) to pick up new STATE_LEVEL_TENANT_ID"
      ansible.builtin.shell: >-
        docker compose {{ compose_files }}
        up -d --force-recreate egov-user egov-workflow-v2 egov-enc-service pgr-services
      args:
        chdir: "{{ digit_dir }}"
      when: state_root != 'pg'

    - name: "post-bootstrap — wait for egov-user healthy before restarting egov-hrms"
      ansible.builtin.shell: >-
        curl -sf http://127.0.0.1:{{ upstream_kong_port }}/user/health -o /dev/null
      register: user_ready
      retries: 18
      delay: 10
      until: user_ready.rc == 0
      changed_when: false
      when: state_root != 'pg'

    # user-seed.sh only creates INTERNAL_USER on `pg`. HRMS (now pointed
    # at state_root) tries to self-create it at boot, but egov-user's
    # tenant-aware mobile validation (enforced even on _createnovalidate
    # since :1044-preview) rejects HRMS's hardcoded 10-digit mobile on
    # tenants with a stricter rule (e.g. ethiopia's ^[17][0-9]{8}$) and
    # HRMS crash-loops with "Service returned null while fetching user".
    # Seed it here with a mobile derived from the tenant's own rule:
    # first allowed starting digit, padded with 9s to the rule length.
    - name: "post-bootstrap — seed INTERNAL_USER system user on state_root for HRMS"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ upstream_kong_port }}/user/users/_createnovalidate"
        method: POST
        body_format: json
        body:
          RequestInfo: { apiId: digit, ver: "1.0" }
          User:
            userName: INTERNAL_USER
            name: Internal Microservice User
            mobileNumber: "{{ ((core_mobile_configs.mobileNumberAllowedStartingCharacters | first) ~ ('9' * ((core_mobile_configs.mobileNumberLength | int) - 1))) if core_mobile_configs is defined else '9999999999' }}"
            gender: MALE
            active: true
            type: SYSTEM
            tenantId: "{{ state_root }}"
            password: "System@123"
            roles:
              - { code: INTERNAL_MICROSERVICE_ROLE, name: Internal Microservice Role, tenantId: "{{ state_root }}" }
        status_code: [200, 400]
        return_content: true
      register: internal_user_seed
      failed_when: >-
        internal_user_seed.status != 200 and
        'DuplicateUserName' not in (internal_user_seed.content | default(''))
      changed_when: internal_user_seed.status == 200
      when: state_root != 'pg'

    - name: "post-bootstrap — recreate egov-hrms after egov-user is healthy"
      ansible.builtin.shell: >-
        docker compose {{ compose_files }} up -d --force-recreate egov-hrms
      args:
        chdir: "{{ digit_dir }}"
      when: state_root != 'pg'

    # Without this wait a crash-looping HRMS (e.g. missing system user on
    # state_root) sails through and the deploy reports success — that is
    # exactly how the ethiopia HRMS outage went unnoticed on 2026-06-11.
    - name: "post-bootstrap — wait for egov-hrms healthy after restart"
      ansible.builtin.shell: docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' egov-hrms
      register: hrms_health_post
      retries: 30
      delay: 10
      until: hrms_health_post.stdout == 'healthy'
      changed_when: false
      when: state_root != 'pg'

    # `docker compose restart egov-user` above does NOT cascade to
    # egov-user-proxy. The proxy keeps its prior `healthy` state
    # (cached from the previous healthcheck cycle), so an immediate
    # `docker inspect` on the proxy returns `healthy` on the first
    # poll and the wait satisfies before egov-user has finished
    # restarting. The subsequent ui-tenant probe then fires while
    # egov-user is mid-boot → Kong → user-proxy → 502.
    #
    # Probe the Kong path directly instead — that's the contract the
    # ui-tenant probe will use. Any non-5xx (200/400/401) means the
    # whole chain (Kong route → user-proxy → egov-user) is live; we
    # send intentionally-bad creds so this readiness check doesn't
    # couple to ADMIN existence on the tenant.
    - name: "post-bootstrap — wait for egov-user via Kong to be ready after restart"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/user/oauth/token"
        method: POST
        headers: >-
          {{
            {'Authorization': 'Basic ZWdvdi11c2VyLWNsaWVudDo=',
             'Content-Type': 'application/x-www-form-urlencoded'}
            | combine({'Host': domain} if not (tls_enabled | default(true)) else {})
          }}
        body_format: form-urlencoded
        body:
          grant_type: password
          username: readiness-probe
          password: readiness-probe
          scope: read
          tenantId: pg
          userType: EMPLOYEE
        status_code: [200, 400, 401]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
      register: user_kong_ready_post
      retries: 30
      delay: 5
      until: user_kong_ready_post.status in [200, 400, 401]
      changed_when: false
      when: state_root != 'pg'

    # ────────────────────────────────────────────────────────────────
    # Novu Twilio bootstrap. Runs only when:
    #   1. enable_novu is true (the notifications profile is active)
    #   2. The operator has filled in novu_api_key + twilio_* in host_vars
    #
    # The first deploy after `enable_novu: true` brings up the stack but
    # leaves novu_api_key empty — operator signs up via the dashboard
    # at <scheme>://<domain>/novu/, copies the API key into host_vars,
    # re-runs deploy. Second deploy hits this task with all four values
    # set and creates the Twilio integration + workflow inside Novu.
    # ────────────────────────────────────────────────────────────────
    - name: "novu-bootstrap — wait for novu-api health"
      ansible.builtin.uri:
        url: http://127.0.0.1:14002/v1/health-check
        status_code: [200]
        timeout: 10
      register: novu_api_health
      retries: 18
      delay: 10
      until: novu_api_health.status == 200
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length > 0
        - (twilio_account_sid | default('')) | length > 0

    - name: "novu-bootstrap — copy bootstrap script to target"
      ansible.builtin.copy:
        src: ../../backend/novu-bridge/config/bootstrap-novu-whatsapp.sh
        dest: "{{ digit_dir }}/bootstrap-novu-whatsapp.sh"
        mode: '0755'
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length > 0
        - (twilio_account_sid | default('')) | length > 0

    - name: "novu-bootstrap — run Twilio integration + workflow create"
      ansible.builtin.shell: |
        cd {{ digit_dir }}
        NOVU_BASE_URL=http://127.0.0.1:14002 \
        NOVU_API_KEY={{ novu_api_key }} \
        TWILIO_ACCOUNT_SID={{ twilio_account_sid }} \
        TWILIO_AUTH_TOKEN={{ twilio_auth_token }} \
        TWILIO_WHATSAPP_FROM='{{ twilio_whatsapp_from | default("whatsapp:+14155238886") }}' \
        bash bootstrap-novu-whatsapp.sh
      register: novu_bootstrap_result
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length > 0
        - (twilio_account_sid | default('')) | length > 0
      changed_when: "'created' in (novu_bootstrap_result.stdout | default(''))"

    - name: "novu-bootstrap — wire NOVU_API_KEY into compose .env"
      ansible.builtin.lineinfile:
        path: "{{ digit_dir }}/.env"
        regexp: '^NOVU_API_KEY='
        line: "NOVU_API_KEY={{ novu_api_key }}"
        create: true
        mode: '0600'
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length > 0

    - name: "novu-bootstrap — recreate novu-bridge so it picks up NOVU_API_KEY"
      ansible.builtin.shell: |
        cd {{ digit_dir }}
        COMPOSE_PROFILES={{ compose_profiles }} docker compose {{ compose_files }} up -d --force-recreate novu-bridge
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length > 0
      changed_when: false

    - name: "novu-bootstrap — operator setup hint (when api_key missing)"
      ansible.builtin.debug:
        msg: |
          Novu containers are up. To finish setup:
            1. Open {{ 'https://' + domain if (tls_enabled | default(true)) else 'http://' + domain }}/novu/
            2. Sign up (first signup creates the org + API key)
            3. Settings → API Keys → copy the API key
            4. Set in host_vars/{{ inventory_hostname }}.yml:
                 novu_api_key: <pasted key>
                 twilio_account_sid: <from twilio console>
                 twilio_auth_token: <from twilio console>
                 twilio_whatsapp_from: 'whatsapp:+14155238886'  # Twilio Sandbox default
            5. Re-run ./deploy.sh {{ inventory_hostname }}
          The next deploy will run the bootstrap script and wire NOVU_API_KEY
          into compose .env so novu-bridge can dispatch.
      when:
        - enable_novu | default(false)
        - (novu_api_key | default('')) | length == 0

    # ────────────────────────────────────────────────────────────────
    # Keycloak bootstrap. Once the keycloak container is up (created the
    # `keycloak` DB via the postgres init script, started, healthy), we
    # render a per-tenant realm from the template and import it via
    # kcadm.sh. Idempotent: a re-import is skipped when the realm
    # already exists. Google IdP wiring is opt-in (keycloak_google_*).
    #
    # Why kcadm.sh and not `--import-realm`: the start-dev flag only
    # imports the static template that ships in the image. Realm names
    # are tenant-specific (`state_tenant_id`), so we render at deploy
    # time and import explicitly.
    #
    # Pre-req: enable_keycloak: true in host_vars (puts the `keycloak`
    # profile into COMPOSE_PROFILES so the containers actually start).
    # ────────────────────────────────────────────────────────────────
    - name: "keycloak-bootstrap — render per-tenant realm from template"
      ansible.builtin.template:
        src: templates/keycloak-realm.json.j2
        dest: "{{ digit_dir }}/keycloak/{{ state_tenant_id }}-realm.json"
        mode: '0640'
      when:
        - enable_keycloak | default(false)
        - (state_tenant_id | default('')) | length > 0

    - name: "keycloak-bootstrap — wait for keycloak to bind :8180 (up to 5 min)"
      # KC 24 image is UBI minimal — no curl/wget. Wait on the docker
      # healthcheck status (which uses bash /dev/tcp internally) rather
      # than re-probing from outside.
      ansible.builtin.shell: |
        timeout 300 bash -c 'until [ "$(docker inspect -f "{{ '{{' }}.State.Health.Status{{ '}}' }}" keycloak 2>/dev/null)" = "healthy" ]; do sleep 5; done && echo ready'
      register: kc_wait
      changed_when: false
      when: enable_keycloak | default(false)

    - name: "keycloak-bootstrap — kcadm login as master admin"
      ansible.builtin.shell: |
        docker exec keycloak /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://127.0.0.1:8180 --realm master \
          --user admin --password "{{ bao_secrets.json.data.data.keycloak_admin_password | default('') }}"
      when: enable_keycloak | default(false)
      no_log: true
      changed_when: false

    - name: "keycloak-bootstrap — check if per-tenant realm exists"
      ansible.builtin.shell: |
        docker exec keycloak /opt/keycloak/bin/kcadm.sh get "realms/{{ state_tenant_id }}" >/dev/null 2>&1 && echo exists || echo missing
      register: kc_realm_check
      changed_when: false
      when: enable_keycloak | default(false)

    - name: "keycloak-bootstrap — import per-tenant realm (first time only)"
      ansible.builtin.shell: |
        docker cp "{{ digit_dir }}/keycloak/{{ state_tenant_id }}-realm.json" keycloak:/tmp/realm.json
        docker exec keycloak /opt/keycloak/bin/kcadm.sh create realms -f /tmp/realm.json
      when:
        - enable_keycloak | default(false)
        - kc_realm_check is defined
        - (kc_realm_check.stdout | default('')) == "missing"
      changed_when: true

    - name: "keycloak-bootstrap — wire Google IdP (when configured)"
      ansible.builtin.shell: |
        docker exec keycloak /opt/keycloak/bin/kcadm.sh create identity-provider/instances \
          -r "{{ state_tenant_id }}" \
          -s alias=google \
          -s providerId=google \
          -s 'config.clientId={{ keycloak_google_client_id }}' \
          -s 'config.clientSecret={{ bao_secrets.json.data.data.keycloak_google_client_secret | default('') }}' 2>&1 | grep -v "Conflict" || true
      when:
        - enable_keycloak | default(false)
        - (keycloak_google_client_id | default('')) | length > 0
      no_log: true
      changed_when: false

    # ────────────────────────────────────────────────────────────────
    # Update digit-ui client redirect URIs in-place every deploy.
    #
    # The "import per-tenant realm" task above is one-shot — it only
    # fires when the realm doesn't already exist. On existing realms
    # (every deploy after the first), changes to the rendered
    # realm-template.json (e.g. a new /citizen/* redirect from
    # digit-ui-v2) would never reach Keycloak.
    #
    # This task closes that gap by re-applying the digit-ui client
    # config via kcadm.sh `update` every run. Idempotent: kcadm
    # accepts the same payload repeatedly without changing state.
    #
    # Fetch the client's internal UUID via `get clients?clientId=…`,
    # then PUT the desired rootUrl + baseUrl + redirectUris + webOrigins.
    # The URI list is built from {{ domain }} the same way the realm
    # template does it, so they always agree.
    # ────────────────────────────────────────────────────────────────
    - name: "keycloak-bootstrap — fetch digit-ui client UUID"
      ansible.builtin.shell: |
        docker exec keycloak /opt/keycloak/bin/kcadm.sh get clients \
          -r "{{ state_tenant_id }}" \
          --query "clientId={{ keycloak_client_id | default('digit-ui') }}" \
          --fields id 2>/dev/null \
          | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[0]["id"] if d else "")'
      register: kc_digit_ui_client_id
      changed_when: false
      when: enable_keycloak | default(false)

    - name: "keycloak-bootstrap — update digit-ui client redirect URIs in-place"
      ansible.builtin.shell: |
        SCHEME="{{ 'https://' if (tls_enabled | default(true)) else 'http://' }}"
        BASE="${SCHEME}{{ domain }}"
        docker exec keycloak /opt/keycloak/bin/kcadm.sh update \
          "clients/{{ kc_digit_ui_client_id.stdout | trim }}" \
          -r "{{ state_tenant_id }}" \
          -s "rootUrl=${BASE}" \
          -s 'baseUrl=/citizen/' \
          -s "redirectUris=[\"${BASE}/citizen/*\",\"${BASE}/digit-ui/*\",\"${BASE}/auth/callback*\",\"http://localhost:*\"]" \
          -s "webOrigins=[\"${BASE}\",\"http://localhost:3000\",\"http://localhost:5173\"]"
      when:
        - enable_keycloak | default(false)
        - kc_digit_ui_client_id is defined
        - (kc_digit_ui_client_id.stdout | default('') | trim) | length > 0
      changed_when: true

    # Keycloak end-to-end validation. Runs AFTER the realm import so the
    # well-known endpoint actually resolves. Both checks require
    # nginx_features.keycloak: true (the host nginx exposes /auth/ and
    # /token-exchange/); without that the services are only reachable
    # inside the egov-network.
    - name: "validate — keycloak per-tenant realm reachable via /auth/"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/auth/realms/{{ state_tenant_id }}/.well-known/openid-configuration"
        status_code: [200]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      retries: 3
      delay: 5
      when:
        - enable_keycloak | default(false)
        - nginx_features.keycloak | default(false)

    - name: "validate — token-exchange-svc healthz reachable via /token-exchange/"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/token-exchange/healthz"
        status_code: [200]
        timeout: 10
        validate_certs: "{{ tls_enabled | default(true) }}"
        headers: "{{ {} if (tls_enabled | default(true)) else {'Host': domain} }}"
      when:
        - enable_keycloak | default(false)
        - nginx_features.keycloak | default(false)

    # ────────────────────────────────────────────────────────────────
    # UI-tenant fall-back: until the operator's chosen state_tenant_id is
    # bootstrapped (via /v1/tenant/bootstrap), ADMIN doesn't exist there
    # and the SPA can't authenticate. Probe the chosen tenant; if ADMIN
    # login fails, re-render globalConfigs.js with `pg` (the dump's
    # always-seeded tenant) so the operator can at least log in on day 1.
    # Once the operator bootstraps state_tenant_id, the next deploy will
    # detect ADMIN and switch the UI back automatically.
    # ────────────────────────────────────────────────────────────────
    - name: "ui-tenant — probe ADMIN login on the chosen state_tenant_id"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/user/oauth/token"
        method: POST
        headers: >-
          {{
            {'Authorization': 'Basic ZWdvdi11c2VyLWNsaWVudDo=',
             'Content-Type': 'application/x-www-form-urlencoded'}
            | combine({'Host': domain} if not (tls_enabled | default(true)) else {})
          }}
        body_format: form-urlencoded
        body:
          grant_type: password
          username: "{{ bootstrap_user | default('ADMIN') }}"
          password: "{{ bootstrap_password | default('eGov@123') }}"
          scope: read
          tenantId: "{{ state_tenant_id }}"
          userType: EMPLOYEE
        status_code: [200, 400, 401]
        timeout: 15
        validate_certs: "{{ tls_enabled | default(true) }}"
      register: state_tenant_admin_probe
      no_log: true
      when: state_tenant_id != 'pg'

    - name: "ui-tenant — pick which tenant the SPA lands on"
      # An explicit host_vars `ui_state_tenant_id` WINS — this is the documented
      # per-tenant override (e.g. single-city deploys point the SPA at the city
      # tenant `mz.maputo`, where the configurator stores boundaries and the
      # citizen/employee/PGR flows must read). Without an override, auto-pick:
      # state_tenant_id when its ADMIN is provisioned, else fall back to pg.
      ansible.builtin.set_fact:
        ui_state_tenant_id: >-
          {{ ui_state_tenant_id
             if (ui_state_tenant_id is defined and ui_state_tenant_id)
             else (state_tenant_id
                   if (state_tenant_id == 'pg'
                       or (state_tenant_admin_probe.json.access_token | default('') | length > 10))
                   else 'pg') }}

    - name: "ui-tenant — log the chosen value (and why)"
      ansible.builtin.debug:
        msg: >-
          {{ 'globalConfigs.stateTenantId = ' + ui_state_tenant_id +
             (' (ADMIN/' + state_tenant_id + ' is provisioned, using it)'
              if ui_state_tenant_id == state_tenant_id
              else ' (ADMIN/' + state_tenant_id + ' not yet provisioned — falling back to pg until you bootstrap it; run /v1/tenant/bootstrap with target_tenant=' + state_tenant_id + ')') }}

    - name: "ui-tenant — re-render globalConfigs.js with the chosen tenant"
      # Always re-render. The earlier "Render globalConfigs.js" task ran
      # before ui_state_tenant_id was decided, so it used the j2 default
      # ('pg'). Whether the auto-detect picked `subhashini` (ADMIN works)
      # or fell back to `pg` (ADMIN missing), we want this final value
      # baked in. Idempotent — template task no-ops when content is unchanged.
      ansible.builtin.template:
        src: templates/globalConfigs.js.j2
        dest: "{{ digit_dir }}/nginx/globalConfigs.js"
        mode: '0644'
      register: ui_globalconfigs_rerender

    - name: "ui-tenant — reload nginx on the host (digit-ui reads the bind-mounted file directly)"
      when:
        - ansible_system != "Darwin"
        - ui_globalconfigs_rerender.changed
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      ignore_errors: true

    - name: "validate — MDMS lookup: StateInfo returns at least one record"
      ansible.builtin.uri:
        url: "{{ 'https://' + domain if (tls_enabled | default(true)) else 'http://127.0.0.1' }}/egov-mdms-service/v1/_search"
        method: POST
        headers: >-
          {{
            {'Content-Type': 'application/json'}
            | combine({'Host': domain} if not (tls_enabled | default(true)) else {})
          }}
        body_format: json
        body:
          RequestInfo:
            apiId: "Rainmaker"
            authToken: "{{ auth_probe.json.access_token }}"
          MdmsCriteria:
            tenantId: "{{ bootstrap_tenant | default('pg') }}"
            moduleDetails:
              - moduleName: "common-masters"
                masterDetails:
                  - name: "StateInfo"
        status_code: [200]
        timeout: 15
        validate_certs: "{{ tls_enabled | default(true) }}"
      register: mdms_probe

    - name: "validate — StateInfo response is non-empty"
      ansible.builtin.assert:
        that:
          - mdms_probe.json.MdmsRes['common-masters'].StateInfo is defined
          - mdms_probe.json.MdmsRes['common-masters'].StateInfo | length > 0
        fail_msg: "MDMS returned 200 but no StateInfo record — persister may have missed the seed message or Kafka lag is high."

    - name: "validate — OpenBao /v1/sys/health is unsealed + initialized"
      ansible.builtin.uri:
        url: http://127.0.0.1:18200/v1/sys/health
        status_code: [200]   # 200 = unsealed + initialized + active
        timeout: 5

    - name: "validate — summary"
      ansible.builtin.debug:
        msg:
          - "===== INFRA VALIDATION RESULTS ====="
          - "All containers:        HEALTHY"
          - "Public UI:             200 OK"
          - "Configurator:          {{ '200 OK' if nginx_features.configurator | default(false) else 'SKIPPED (disabled)' }}"
          - "Gatus /status/:        {{ '200 OK' if nginx_features.status | default(false) else 'SKIPPED (disabled)' }}"
          - "MCP /mcp:              {{ '200 OK' if nginx_features.mcp | default(false) else 'SKIPPED (disabled)' }}"
          - "Auth flow:             access_token minted"
          - "MDMS StateInfo:        non-empty"
          - "OpenBao:               unsealed + initialized"
          - "===================================="

    # mcp_health is only registered by "Wait for digit-mcp health", which
    # is gated on enable_mcp. With MCP off (Mac / off-VPC) that task is
    # skipped, so mcp_health is undefined — gate this status line the same
    # way (consistent with the other enable_mcp-gated MCP tasks).
    - name: Show MCP health status
      debug:
        msg: "DIGIT-MCP: {{ 'HEALTHY' if mcp_health.rc == 0 else 'UNHEALTHY (non-critical)' }}"
      when: enable_mcp | default(false)

    # ==================== Wait for Loki ====================
    - name: Wait for Loki health (up to 2 min)
      shell: curl -sf http://127.0.0.1:13100/ready -o /dev/null
      register: loki_health
      retries: 12
      delay: 10
      until: loki_health.rc == 0
      changed_when: false
      ignore_errors: yes

    - name: Show Loki health status
      debug:
        msg: "Loki: {{ 'HEALTHY' if loki_health.rc == 0 else 'UNHEALTHY (non-critical)' }}"

    # ==================== Claude Code Setup (opt-in) ====================
    # Installs Claude Code CLI on the target and syncs the controller's
    # ~/.claude config to it. The sync paths are hard-coded to /root/.claude
    # — that's correct only for Linux controllers running as root. On
    # macOS the controller home is /Users/<name>/ and the sync errors out
    # mid-deploy. So the whole stage is opt-in.
    - name: "Claude Code — skipped (set install_claude_code: true to enable)"
      ansible.builtin.debug:
        msg: "Claude Code install disabled. Set install_claude_code: true in host_vars to enable."
      when: not (install_claude_code | default(false))

    - name: Install Node.js 20 LTS (needed for CC and tests)
      shell: |
        if ! node --version 2>/dev/null | grep -qE "^v2[02]"; then
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
        fi
      register: nodejs_install
      changed_when: "'nodejs is already' not in nodejs_install.stdout"
      when:
        - install_claude_code | default(false)
        - ansible_system != "Darwin"

    - name: Install Claude Code CLI
      shell: npm install -g @anthropic-ai/claude-code
      register: cc_install
      changed_when: "'added' in cc_install.stdout"
      ignore_errors: yes
      when: install_claude_code | default(false)

    # If a previous run (or hand-edit) left a stale empty file at one of these
    # paths, ansible's `state: directory` errors. Clear those out first.
    - name: Remove stale Claude Code config files (must be directories)
      ansible.builtin.shell: |
        for p in /root/.claude /root/.claude/skills /root/.claude/plugins; do
          if [ -f "$p" ]; then rm -f "$p"; fi
        done
      changed_when: false
      when: install_claude_code | default(false)

    - name: Create Claude Code config directories
      file:
        path: "/root/.claude/{{ item }}"
        state: directory
      loop:
        - ""
        - skills
        - plugins
      when: install_claude_code | default(false)

    - name: Copy Claude Code settings
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "/root/.claude/settings.json", dest: "/root/.claude/settings.json" }
        - { src: "/root/.claude/settings.local.json", dest: "/root/.claude/settings.local.json" }
      ignore_errors: yes
      when: install_claude_code | default(false)

    - name: Synchronize Claude Code skills
      synchronize:
        src: /root/.claude/skills/
        dest: /root/.claude/skills/
      when: install_claude_code | default(false)

    - name: Write local MCP config (pointing to local MCP server)
      copy:
        content: |
          {
            "mcpServers": {
              "DIGIT-MCP": {
                "url": "http://localhost:13101/mcp",
                "type": "http"
              }
            }
          }
        dest: /root/.mcp.json
      when: install_claude_code | default(false)

    # ==================================================================
    # (Configurator SPA + host nginx setup moved earlier in the play —
    # see "Host nginx — render site config from template" before the
    # validation block. Validation requires nginx to already be live
    # with the new template, so the install/render/reload happens
    # there, not here.)
    # ==================================================================

    # ==================== Postman smoke + lifecycle ====================
    # Two Newman runs against the deployed stack, ALWAYS-ON:
    #   1. digit-core-validation — health checks for every core service
    #   2. complaints-demo       — full PGR lifecycle on pg.citest
    #
    # The dump (db/full-dump.sql) ships with pg.citest pre-bootstrapped
    # (CI-ADMIN with HRMS, PGR workflow loaded, complaint types). So the
    # tests work out of the box — no dataloader prerequisite.
    # postman/ + jupyter/ trees are already synced to {{ digit_dir }} by
    # the "Synchronize config directories" task above — no separate copy
    # step here, just reference the synced paths.
    - name: "Install Newman (Postman CLI runner)"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.shell: |
        if ! which newman >/dev/null 2>&1; then
          npm install -g newman
        fi
      register: newman_install
      changed_when: "'added' in newman_install.stdout"

    - name: "CI — Postman digit-core-validation (every core service)"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.shell: |
        cd {{ digit_dir }}
        newman run postman/digit-core-validation.postman_collection.json \
          --env-var "baseUrl=http://127.0.0.1:{{ upstream_kong_port }}" \
          --reporter-cli-no-banner
      register: postman_health
      changed_when: false

    - name: "CI — Postman complaints-demo (full PGR lifecycle on pg.citest)"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      # --delay-request 2000: wait 2s between each request. The PGR
      # lifecycle is async — Create publishes to Kafka and returns 200
      # *before* egov-persister writes the row to eg_pgr_service_v2.
      # If the next Update fires immediately it gets INVALID_UPDATE
      # because the row isn't there yet. 2s is more than enough headroom
      # for the persister to consume + write under normal load.
      ansible.builtin.shell: |
        cd {{ digit_dir }}
        newman run postman/complaints-demo.postman_collection.json \
          --env-var "url=http://127.0.0.1:{{ upstream_kong_port }}" \
          --env-var "username=CI-ADMIN" \
          --env-var "password=eGov@123" \
          --env-var "cityTenant=pg.citest" \
          --env-var "stateTenant=pg" \
          --env-var "userType=EMPLOYEE" \
          --env-var "authorization=Basic ZWdvdi11c2VyLWNsaWVudDo=" \
          --env-var "serviceCode=IllegalCuttingOfTrees" \
          --delay-request 2000 \
          --reporter-cli-no-banner
      register: postman_lifecycle
      changed_when: false

    # CRSLoader end-to-end test — proves the Jupyter notebook flow
    # (bootstrap a tenant from `pg`, load every phase, rollback) works.
    # Runs against `pg.cietee` — a dedicated throwaway tenant that
    # user-seed.sh provisions with ADMIN. The test's cleanup nukes MDMS
    # records on that tenant only; eg_user rows survive so ADMIN is
    # there for the next run.
    #
    # `ignore_errors: yes` because two of the 10 sub-tests have known
    # environmental issues:
    #   - `delete_boundaries()` needs kubectl (works against k8s clusters,
    #     not docker compose) — not applicable to this deploy shape.
    #   - `rollback_common_masters()` has a known loader bug (75 records
    #     stay active after rollback) — tracked separately.
    # The remaining 8 sub-tests still run and surface real failures.
    - name: "CI — install pytest + dataloader runtime deps on target"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.pip:
        # psycopg2-binary: crs_loader._delete_boundaries_via_db uses direct
        # Postgres access to clean boundary rows (no kubectl on compose).
        name: [requests, openpyxl, pandas, pytest, pytest-timeout, psycopg2-binary]
        extra_args: --break-system-packages
      changed_when: false

    - name: "CI — CRSLoader E2E (10-phase Jupyter notebook flow, throwaway tenant)"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.shell: |
        cd {{ digit_dir }}/jupyter/dataloader
        DIGIT_URL=http://127.0.0.1:{{ upstream_kong_port }} \
        DIGIT_USERNAME=ADMIN \
        DIGIT_PASSWORD=eGov@123 \
        DIGIT_TENANT=pg.cietee \
        python3 test_crs_loader_e2e.py
      register: dataloader_e2e
      changed_when: false
      ignore_errors: yes

    - name: "CI — show CRSLoader E2E results"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.debug:
        msg: "{{ dataloader_e2e.stdout_lines | select('match', '^(\\[[0-9]+/|   PASS|   FAIL)') | list }}"

    # CRSLoader v2 regression suite. 11 focused tests covering the
    # fixes added in #263 (root tenant creation, designation dedup,
    # department count accuracy, tenant-scoped counts, boundary 403 →
    # PermissionError) plus follow-up regression cases (workflow nextState
    # resolution, DataSecurity schema bootstrap, MDMS inactive
    # reactivation, employee password via user service,
    # INTERNAL_MICROSERVICE_ROLE handling, workflow copy idempotency).
    # Each test creates its own throwaway tenant; no cleanup — the next
    # deploy starts from the dump's clean state.
    #
    # This suite is the contract for new-tenant bootstrap — any failure
    # breaks the deploy. Re-run with `--start-at-task=` to skip past
    # infra setup if you're iterating on the regression itself.
    - name: "CI — CRSLoader v2 regression suite (#263 fixes)"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.shell: |
        cd {{ digit_dir }}/scripts
        DIGIT_URL=http://127.0.0.1:{{ upstream_kong_port }} \
        DIGIT_USERNAME=ADMIN \
        DIGIT_PASSWORD=eGov@123 \
        ROOT_TENANT=pg \
        python3 ci-dataloader-v2-regression.py
      register: dataloader_regression
      changed_when: false

    - name: "CI — show CRSLoader v2 regression results"
      when: run_ci_tests | default(false)   # opt-in CI/extras; was ungated
      ansible.builtin.debug:
        msg: "{{ dataloader_regression.stdout_lines | select('match', '^(TEST:|RESULTS:|✅|❌|   PermissionError|   After |   City |   Root )') | list }}"

    # Onboarding regression suite — live-stack assertions for the tenant
    # bring-up failures hit during the Maputo (mz.maputo) onboarding on
    # 2026-05-21 (see local-setup/tests/test_onboarding_regressions.py):
    #   - ServiceDefs missing at the state root  -> complaint create JSONPATH_ERROR
    #   - boundary picker empty                  -> hierarchyType != globalConfigs HIERARCHY_TYPE
    #   - localization raw keys                  -> stale/empty redis 'messages' cache
    # Read-only against the deployed tenant (the complaint-create smoke is opt-in
    # via RUN_COMPLAINT_CREATE_SMOKE so it doesn't write a complaint each run).
    # ignore_errors for now — promote to fatal (drop ignore_errors) once it's
    # been validated green across cities, not just Maputo.
    - name: "CI — stage onboarding regression suite"
      when: run_ci_tests | default(false)
      ansible.builtin.copy:
        src: ../tests/test_onboarding_regressions.py
        dest: "{{ digit_dir }}/test_onboarding_regressions.py"
      changed_when: false

    - name: "CI — onboarding regression suite (2026-05-21 Maputo bring-up)"
      when: run_ci_tests | default(false)
      ansible.builtin.shell: |
        BASE_URL=http://127.0.0.1:{{ nginx_host_port | default(80) }} \
        STATE_TENANT={{ state_tenant_id }} \
        CITY_TENANT={{ city_tenant | default(state_tenant_id ~ '.citya') }} \
        UI_TENANT={{ ui_state_tenant_id | default(city_tenant | default(state_tenant_id ~ '.citya')) }} \
        LOCALE={{ locale_default | default('en') }}_{{ locale_region | default('IN') }} \
        HIERARCHY_TYPE={{ hierarchy_type | default('ADMIN') }} \
        python3 -m pytest -v {{ digit_dir }}/test_onboarding_regressions.py
      register: onboarding_regression
      changed_when: false
      ignore_errors: yes

    - name: "CI — show onboarding regression results"
      when: run_ci_tests | default(false)
      ansible.builtin.debug:
        msg: "{{ onboarding_regression.stdout_lines | default([]) | select('search', 'PASSED|FAILED|ERROR|passed|failed|assert') | list }}"

    # ==================================================================
    # CI TESTS — opt-in only. The scripts (`local-setup/scripts/`) and the
    # Playwright suite (`local-setup/tests/`) now live IN this repo — no
    # sibling clone required. Set `run_ci_tests: true` in host_vars to
    # enable; on any host where it's left false, the playbook finishes
    # at "validate — summary" above and the infra IS the deploy.
    - name: "CI tests — skipped (set run_ci_tests: true to enable)"
      ansible.builtin.debug:
        msg: "CI test stage disabled. Set run_ci_tests: true in host_vars to enable."
      when: not (run_ci_tests | default(false))

    # ==================================================================
    # CI TESTS — Stage A: XLSX-Driven DataLoader E2E
    # ==================================================================
    - name: Install Python3 and pip
      apt:
        name: [python3, python3-pip]
        state: present
      when:
        - run_ci_tests | default(false)
        - ansible_system != "Darwin"

    - name: Install Python dependencies for DataLoader
      pip:
        name: [requests, openpyxl, pandas, python-dotenv]
        extra_args: --break-system-packages

      when: run_ci_tests | default(false)
    - name: Create CI tests directory structure
      file:
        path: "{{ digit_dir }}/ci-tests/{{ item }}"
        state: directory
      loop:
        - scripts
        - jupyter/dataloader/templates/localisations
        - data

      when: run_ci_tests | default(false)
    - name: Copy XLSX-driven CI DataLoader script
      copy:
        src: ../../scripts/ci-dataloader-xlsx.py
        dest: "{{ digit_dir }}/ci-tests/scripts/ci-dataloader-xlsx.py"
        mode: "0755"

      when: run_ci_tests | default(false)
    - name: Copy XLSX sample generator (helper imported by ci-dataloader-xlsx.py)
      copy:
        src: ../../scripts/generate-sample-from-xlsx.py
        dest: "{{ digit_dir }}/ci-tests/scripts/generate-sample-from-xlsx.py"
        mode: "0755"

      when: run_ci_tests | default(false)
    - name: Copy crossroot bootstrap script (fallback)
      copy:
        src: ../../scripts/ci-dataloader-crossroot.py
        dest: "{{ digit_dir }}/ci-tests/scripts/ci-dataloader-crossroot.py"
        mode: "0755"

      when: run_ci_tests | default(false)
    # (Removed: Copy DataLoader regression test script — it now lives in-repo
    # at local-setup/scripts/ and is run as part of the core CI block above,
    # not gated on run_ci_tests.)

    # Use OUR canonical, deduped dataloader (local-setup/jupyter/) — not
    # a sibling repo's copy. The sibling copy used to drift (e.g. it had
    # a `menuPathName` field that the MDMS schema rejects, breaking the
    # complaint-type create call). Single source of truth.
    - name: "Synchronize DataLoader library (from local-setup/jupyter/)"
      synchronize:
        src: "../jupyter/dataloader/"
        dest: "{{ digit_dir }}/ci-tests/jupyter/dataloader/"
      when: run_ci_tests | default(false)

    - name: Copy county input XLSX (Bomet)
      copy:
        src: "{{ county_xlsx | default('county-data-bomet.xlsx') }}"
        dest: "{{ digit_dir }}/ci-tests/data/county-data.xlsx"

    # CI TESTS — Stage A1: XLSX-driven Bomet County E2E
      when: run_ci_tests | default(false)
    - name: Run XLSX-driven DataLoader (Bomet County E2E)
      shell: |
        cd {{ digit_dir }}/ci-tests/scripts
        DIGIT_URL=http://127.0.0.1:18000 \
        DIGIT_USERNAME=ADMIN \
        DIGIT_PASSWORD=eGov@123 \
        ROOT_TENANT=pg \
        BOOT_TENANT={{ boot_tenant | mandatory }} \
        INPUT_XLSX={{ digit_dir }}/ci-tests/data/county-data.xlsx \
        python3 ci-dataloader-xlsx.py
      register: xlsx_dataloader_result
      timeout: 600
      ignore_errors: yes

      when: run_ci_tests | default(false)
    - name: Show XLSX DataLoader results
      debug:
        var: xlsx_dataloader_result.stdout_lines | default(['(no output)'])

    # (Removed: Stage A2 DataLoader v2 regression tests — now run in the core
    # CI block as "CI — CRSLoader v2 regression suite", which exercises the
    # in-repo `local-setup/scripts/ci-dataloader-v2-regression.py`. The
    # summary below reads `dataloader_regression` from that task.)

    # ==================================================================
    # CI TESTS — Stage B: Playwright E2E Tests
    #
    # Gated by `run_playwright_tests` (default false). Browser-driven E2E is
    # slow + flaky on cold boxes — keep it off in the standard deploy and
    # turn it on per-host when a UI iteration needs it. Setting
    # `run_ci_tests: true` alone enables Newman + XLSX dataloader; you must
    # ALSO set `run_playwright_tests: true` to bring Playwright back.
    # ==================================================================
      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Create E2E tests directory
      file:
        path: "{{ digit_dir }}/e2e-tests"
        state: directory

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Copy Playwright package.json
      copy:
        src: ../../tests/package.json
        dest: "{{ digit_dir }}/e2e-tests/package.json"

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Synchronize E2E test suite
      synchronize:
        src: "../../tests/e2e/"
        dest: "{{ digit_dir }}/e2e-tests/e2e/"

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Copy tsconfig.json for tests
      copy:
        src: ../../tests/tsconfig.json
        dest: "{{ digit_dir }}/e2e-tests/tsconfig.json"

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Install npm dependencies
      shell: npm install
      args:
        chdir: "{{ digit_dir }}/e2e-tests"

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Install Playwright Chromium with system dependencies
      shell: 'npx playwright install{{ " --with-deps" if ansible_system != "Darwin" else "" }} chromium' 
      args:
        chdir: "{{ digit_dir }}/e2e-tests"
      # Browser binaries + system deps via apt — first run on a fresh box
      # routinely hits 4-6 min on a 4-core VPS. 300s was too tight.
      timeout: 600

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Wait for DIGIT UI to serve pages (up to 10 min)
      shell: curl -sf http://127.0.0.1:18080/digit-ui/ -o /dev/null
      register: ui_health
      retries: 60
      delay: 10
      until: ui_health.rc == 0
      changed_when: false

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Run Playwright E2E tests (Bomet tenant)
      shell: |
        cd {{ digit_dir }}/e2e-tests
        BASE_URL=http://127.0.0.1:18080 \
        DIGIT_TENANT={{ boot_tenant | mandatory }} \
        DIGIT_USERNAME=BOMET_ADMIN \
        DIGIT_PASSWORD=eGov@123 \
        DIGIT_EMPLOYEE_USER=BOMET_ADMIN \
        DIGIT_EMPLOYEE_PASSWORD=eGov@123 \
        CI=1 \
        npx playwright test --config=e2e/playwright.config.ts \
          --timeout=60000 \
          employee-login \
          employee-logout \
          console-errors \
          pgr-flow \
          citizen-pgr-complaint-api
      args:
        chdir: "{{ digit_dir }}/e2e-tests"
      register: playwright_result
      timeout: 900
      ignore_errors: yes

      when: run_ci_tests | default(false) and (run_playwright_tests | default(false))
    - name: Show Playwright test results
      debug:
        var: playwright_result.stdout_lines | default(['(no output - possibly timed out)'])

    # ==================================================================
    # CI Results Summary
    # ==================================================================
      when: run_ci_tests | default(false)
    - name: CI test results summary
      vars:
        # `playwright_result` is unset when the Playwright stage is skipped
        # (run_playwright_tests=false). Treat absent as "didn't run" → 0.
        xlsx_rc: "{{ xlsx_dataloader_result.rc | default(-1) }}"
        dl_rc: "{{ dataloader_regression.rc | default(-1) }}"
        pw_rc: "{{ playwright_result.rc | default(0) }}"
        pw_label: "{{ 'SKIPPED' if (playwright_result is not defined or playwright_result.rc is not defined) else ('PASS' if pw_rc|int == 0 else 'FAIL (exit ' + pw_rc|string + ')') }}"
      debug:
        msg:
          - "===== CI TEST RESULTS ====="
          - "XLSX DataLoader (Bomet): {{ 'PASS' if xlsx_rc|int == 0 else 'FAIL (exit ' + xlsx_rc|string + ')' }}"
          - "DataLoader regression:   {{ 'PASS' if dl_rc|int == 0 else 'FAIL (exit ' + dl_rc|string + ')' }}"
          - "Playwright E2E:          {{ pw_label }}"
          - "==========================="

      when: run_ci_tests | default(false)
    - name: Fail if any CI test failed
      vars:
        xlsx_rc: "{{ xlsx_dataloader_result.rc | default(-1) }}"
        dl_rc: "{{ dataloader_regression.rc | default(-1) }}"
        pw_rc: "{{ playwright_result.rc | default(0) }}"
      fail:
        msg: |
          CI tests failed. The infra came up but a functional flow is broken.
            XLSX DataLoader (Bomet): exit {{ xlsx_rc }}
            DataLoader regression:   exit {{ dl_rc }}
            Playwright E2E:          exit {{ pw_rc }}
          Re-run with `--start-at-task=...` to skip past the infra setup,
          or check the per-test stdout above for the specific failure.
      # Only judge CI results when CI was actually requested. With
      # run_ci_tests:false every CI sub-test skips → its *_result var is
      # undefined → rc defaults to -1 → this would spuriously fail the
      # play. Gate it like every other task in the CI block.
      when:
        - run_ci_tests | default(false)
        - xlsx_rc|int != 0 or dl_rc|int != 0 or pw_rc|int != 0

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
