name: africa
modeled_on: kenya
default: true

# Default user_validation seeded into common-masters.UserValidation
# by the orchestrator's apply_user_validation step. If the master
# already has a 'mobile' rule for the target tenant, the orchestrator
# uses that instead (deployment is authoritative; template is only a
# default). The pattern below accepts both bare-9 (712345678) and
# trunk-zero (0712345678) forms, matching what live Kenya tenants
# (e.g. ke on bometfeedbackhub) actually enforce.
user_validation:
  - field_type: mobile
    pattern: '^0?[17][0-9]{8}$'
    min_length: 9
    max_length: 10
    error_message: 'CORE_COMMON_MOBILE_ERROR'

mobile_display_prefix: '+254'

boundary_hierarchy:
  hierarchy_type: ADMIN
  levels: [Country, County, SubCounty, Ward, Locality]
  complaint_filing_level: Ward

# Boundary entity DATA (specific wards, sub-counties, localities) is
# city-specific, NOT a country-wide concern, and must NOT be shipped
# in the template. The entity tree is sourced separately per tenant
# (real Bomet wards already exist on ke.bomet via the
# digit-xlsx-onboard / boundary_mgmt_process paths; future tenants
# can pull from OSM via a planned Phase 1.5 fetch tool).
# boundary_entities stays empty so the orchestrator no-ops cleanly.
boundary_entities: []

# Per PREFLIGHT.md, tenant_bootstrap copies the source tenant's
# ServiceDefs. complaint_types here adds Africa-specific types
# beyond the source baseline. The orchestrator's mdms_search probe
# makes each entry idempotent (skipped if already present).
complaint_types:
  - { code: GarbageNotCollected, name: Garbage not collected, department: DEPT_3, sla_hours: 48 }
  - { code: Pothole, name: Pothole on road, department: DEPT_2, sla_hours: 72 }
  - { code: StreetlightNotWorking, name: Streetlight not working, department: DEPT_1, sla_hours: 24 }

# Localization rows are LOCALE DELTAS — tenant_bootstrap already
# copies the source tenant's en_IN baseline (1253 rows confirmed on
# mz/rainmaker-pgr per PREFLIGHT.md). Only Swahili deltas here.
localizations:
  - { locale: sw_KE, module: rainmaker-common, code: CS_PGR_LOGIN, message: Ingia }
  - { locale: sw_KE, module: rainmaker-common, code: CS_PGR_LOGOUT, message: Toka }
  - { locale: sw_KE, module: rainmaker-pgr, code: SERVICEDEFS.GARBAGENOTCOLLECTED, message: 'Takataka hazijachukuliwa' }
