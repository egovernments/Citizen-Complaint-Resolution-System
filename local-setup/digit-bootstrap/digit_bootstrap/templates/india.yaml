name: india
modeled_on: punjab
default: false

# Indian default mobile rule (10 digits, starts with 6-9).
user_validation:
  - field_type: mobile
    pattern: '^[6-9][0-9]{9}$'
    min_length: 10
    max_length: 10
    error_message: 'Enter a 10-digit Indian mobile starting with 6, 7, 8, or 9'

mobile_display_prefix: '+91'

boundary_hierarchy:
  hierarchy_type: ADMIN
  levels: [State, District, City, Locality]
  complaint_filing_level: Locality

# India template inherits everything from pg via tenant_bootstrap.
# No deltas needed — these stay empty.
boundary_entities: []
complaint_types: []
localizations: []
