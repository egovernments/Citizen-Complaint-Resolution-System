name: minimal
modeled_on: kenya
user_validation:
  - field_type: mobile
    pattern: '^[17][0-9]{8}$'
    min_length: 9
    max_length: 9
    error_message: 'Enter a 9-digit Kenya mobile'
mobile_display_prefix: '+254'
boundary_hierarchy:
  hierarchy_type: ADMIN
  levels: [Country, County, SubCounty, Ward, Locality]
  complaint_filing_level: Ward
