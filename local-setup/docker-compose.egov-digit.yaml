      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: hrms_schema_version
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: employee-group1
      SERVER_PORT: 8092
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-hrms
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      # Trailing slash required — HRMS concatenates host+path without separator
      EGOV_IDGEN_HOST: http://egov-idgen:8088/
      EGOV_USER_HOST: http://egov-user-proxy:8107
      EGOV_FILESTORE_HOST: http://egov-filestore:8083
      EGOV_LOCALIZATION_HOST: http://egov-localization:8096
      EGOV_BOUNDARY_HOST: http://boundary-service:8081
      STATE_LEVEL_TENANT_ID: pg
      EGOV_STATELEVEL_TENANT: pg
      HRMS_SYSTEM_USERNAME: INTERNAL_USER
      EGOV_HRMS_DEFAULT_PASSWORD: ${EGOV_HRMS_DEFAULT_PASSWORD:-eGov@123}
      # Enables enrichUser() to honor passwords supplied in the create
      # request rather than overwriting with the default/auto-generated
      # one. Required by the CCRS#482 fix in :digit-common-boundary.
      EGOV_HRMS_DEV_MODE: 'true'
    ports:
      - 18092:8092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/egov-hrms/actuator/health >/dev/null 2>&1 || exit 1"]
