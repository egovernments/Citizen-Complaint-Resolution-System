  # ===========================================================================
  # PGR Services (Public Grievance Redressal)
  # ===========================================================================
  pgr-services:
    # Parameterized so deploys can pin a nightly-develop (or other) build via
    # PGR_SERVICES_IMAGE in the env; default keeps the prior behaviour.
    image: ${PGR_SERVICES_IMAGE:-egovio/pgr-services:develop-3d1b7d4}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      egov-idgen:
        condition: service_healthy
      egov-user:
        condition: service_healthy
      egov-workflow-v2:
        condition: service_healthy
      egov-localization:
        condition: service_healthy
      egov-enc-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'false'
      SPRING_FLYWAY_TABLE: pgr_services_schema
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: egov-pgr-services
      SERVER_PORT: 8080
      EGOV_IDGEN_HOST: http://egov-idgen:8088/
      EGOV_WORKFLOW_HOST: http://egov-workflow-proxy:8109/
      EGOV_MDMS_HOST: http://egov-mdms-service:8094/
      EGOV_LOCALIZATION_HOST: http://egov-localization:8096/
      EGOV_USER_HOST: http://egov-user-proxy:8107/
      EGOV_LOCATION_HOST: http://boundary-service:8081/
      EGOV_BOUNDARY_HOST: http://boundary-service:8081/
      EGOV_HRMS_HOST: http://egov-hrms:8092/
      EGOV_URL_SHORTNER_HOST: http://egov-url-shortening:8080/
      EGOV_ENC_HOST: http://egov-enc-service:1234
      EGOV_UI_APP_HOST: http://localhost:18080
      # pgr-services' EscalationScheduler resolves the tenant to query
      # MDMS at from the KEYS of this map (PGRConfiguration#getUiAppHostMap,
      # consumed by EscalationScheduler#getStateLevelTenantId). Without
      # this set, getUiAppHostMap() returns empty → getStateLevelTenantId()
      # returns null → fetchEscalationConfig short-circuits → scheduler
      # falls back to the 5-day default SLA and auto-escalation silently
      # never fires. The "pg" placeholder is rewritten per-tenant by the
      # playbook's post-bootstrap task.
      EGOV_UI_APP_HOST_MAP: "{pg:'http://localhost:18080'}"
      NOTIFICATION_SMS_ENABLED: 'false'
      NOTIFICATION_EMAIL_ENABLED: 'false'
      # Config-driven notifications (design D1/D4). When 'true', PGR reads the
      # PGR.NotificationRouting + PGR.NotificationTemplate MDMS masters, renders
      # + localizes per recipient, and publishes ONE pre-rendered event per
      # (recipient × channel) to complaints.domain.events for novu-bridge to
      # deliver. DEFAULT stays 'false' here (and in application.properties) so
      # non-Bomet tenants keep the legacy hardcoded path; Bomet flips it 'true'
      # via docker-compose.bomet.yml. Spring relaxed-binding maps this env to
      # the `pgr.notification.config.driven` property.
      PGR_NOTIFICATION_CONFIG_DRIVEN: ${PGR_NOTIFICATION_CONFIG_DRIVEN:-false}
      # Kafka topic the per-recipient pre-rendered events are published to.
      # Maps to `kafka.topics.complaints.domain.events`; kept explicit so it
      # always matches novu-bridge's NOVU_BRIDGE_KAFKA_INPUT_TOPIC.
      KAFKA_TOPICS_COMPLAINTS_DOMAIN_EVENTS: ${PGR_DOMAIN_EVENTS_TOPIC:-complaints.domain.events}
      NEW_COMPLAINT_ENABLED: 'true'
      REASSIGN_COMPLAINT_ENABLED: 'true'
      REOPEN_COMPLAINT_ENABLED: 'true'
      # Master switch for pgr-services' EscalationScheduler (@Scheduled scan).
      # Baked-in default is already 'true'; surfaced here so the auto-escalation
      # engine is a visible, per-tenant-overridable knob. Set 'false' to disable
      # the scan entirely (no workflow transitions / kafka events). Note: with
      # EGOV_UI_APP_HOST_MAP set above, this scan actively fires on the 5-day
      # fallback SLA when MDMS EscalationConfig is unseeded.
      PGR_ESCALATION_ENABLED: 'true'
      COMMENT_BY_EMPLOYEE_NOTIF_ENABLED: 'false'
      NOTIFICATION_ALLOWED_ON_STATUS: 'open,assigned,rejected,resolved'
      EGOV_USR_EVENTS_NOTIFICATION_ENABLED: 'true'
      EGOV_USR_EVENTS_CREATE_TOPIC: persist-user-events-async
      PGR_STATELEVEL_TENANTID: pg
      STATE_LEVEL_TENANT_ID: pg
      EGOV_STATE_LEVEL_TENANT_ID: pg
      JAVA_OPTS: '-Xmx384m -Xms384m'
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: pgr-services
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/pgr-services/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - egov-network

  # ===========================================================================
  # URL Shortening Service (required by PGR for notification links)
  # ===========================================================================
  egov-url-shortening:
    image: egovio/egov-url-shortening:maven-jdk21-983e8b2
    container_name: egov-url-shortening
    restart: unless-stopped
    depends_on:
