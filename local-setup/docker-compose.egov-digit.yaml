  # ===========================================================================
  # HRMS Prerequisites Gate - Verifies system user is queryable before HRMS starts
  # ===========================================================================
  hrms-prereq-gate:
    image: registry.preview.egov.theflywheel.in/curlimages/curl:latest
    container_name: hrms-prereq-gate
    depends_on:
      egov-user:
        condition: service_healthy
      user-seed:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        echo 'Waiting for INTERNAL_MICROSERVICE_ROLE user to be queryable via egov-user API...'
        echo 'HRMS searches for users by roleCodes=INTERNAL_MICROSERVICE_ROLE on startup'
        i=1
        while [ $$i -le 30 ]; do
          RESPONSE=$$(curl -sf http://egov-user:8107/user/v1/_search \
            -H "Content-Type: application/json" \
            -d '{"RequestInfo":{"apiId":"check"},"tenantId":"pg","roleCodes":["INTERNAL_MICROSERVICE_ROLE"]}')
          if echo "$$RESPONSE" | grep -q '"INTERNAL_MICROSERVICE_ROLE"'; then
            echo "INTERNAL_MICROSERVICE_ROLE user found on attempt $$i! HRMS can start."
            exit 0
          fi
          echo "Attempt $$i: INTERNAL_MICROSERVICE_ROLE user not yet queryable, waiting 3s..."
          sleep 3
          i=$$((i + 1))
        done
        echo "ERROR: INTERNAL_MICROSERVICE_ROLE user not found after 30 attempts!"
        exit 1
    networks:
      - egov-network
    restart: "no"

  # ===========================================================================
  # HRMS Service - Employee management
  # ===========================================================================
  egov-hrms:
    # 800-preview: adds the user-enrichment tenant fix (DIGIT-Common#70 /
    # CCRS#800) on top of digit-common-boundary-uuidlink. With the prior
    # image, /egov-hrms/employees/_search returned `"user": null` for
    # every employee on multi-tenant deploys — HRMS was sending the
    # state-stripped tenant (`ke`) to egov-user while EMPLOYEE rows
    # actually live at the city tenant (`ke.bomet`), so the SQL WHERE
    # missed every row. Drop this back to a canonical
    # `digit-common-boundary-uuidlink-<post-fix>` tag once DIGIT-Common#70
    # merges and a follow-up build is published.
    #
    # Previous lineage notes (still in this image):
    # - CCRS#482: custom password on employee create
    # - CCRS#484: null tenantId on User object breaking MDMS mobile
    #   validation
    # EGOV_HRMS_DEV_MODE=true must be set so enrichUser() respects the
    # password supplied in the request instead of overwriting with the
    # default/auto-generated one.
    image: registry.preview.egov.theflywheel.in/egovio/egov-hrms:800-preview
    container_name: egov-hrms
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      egov-idgen:
        condition: service_healthy
