# docker-compose.egov-digit.yaml
# Standalone compose — all images from public registry registry.preview.egov.theflywheel.in
# Generated from docker-compose.deploy.yaml with registry-prefixed images and build: removed
#
# Usage: docker compose -f docker-compose.egov-digit.yaml up -d

services:
  # ==================== Tracing Infrastructure ====================
  otel-collector:
    image: registry.preview.egov.theflywheel.in/otel/opentelemetry-collector-contrib:0.114.0
    container_name: digit-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13133:13133"
    networks:
      - egov-network

  tempo:
    image: registry.preview.egov.theflywheel.in/grafana/tempo:2.6.1
    container_name: digit-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./otel/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "13200:3200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egov-network

  grafana:
    image: registry.preview.egov.theflywheel.in/grafana/grafana:11.4.0
    container_name: digit-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Domain + root URL templated per tenant via /opt/digit/.env
      # (Ansible writes GF_SERVER_DOMAIN there from inventory `domain`).
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN:-api.egov.theflywheel.in}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://api.egov.theflywheel.in/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - egov-network

  # Prometheus — scrapes the OTEL collector's /metrics endpoint (which exposes
  # OTLP-received JVM/runtime metrics in Prometheus format). Single source of
  # truth for the Grafana JVM dashboard used for right-sizing DIGIT services.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: digit-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"
    networks:
      - egov-network

  # ==================== Core Infrastructure ====================
  # Actual PostgreSQL - services should NOT connect directly to this
  postgres-db:
    image: registry.preview.egov.theflywheel.in/postgres:16
    container_name: docker-postgres
    environment:
      POSTGRES_USER: egov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      POSTGRES_DB: egov
    command: postgres -c max_connections=200
    volumes:
    - postgres_data:/var/lib/docker-postgresql/data
    ports:
    - 15432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U egov
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - egov-network

  # PgBouncer - transparent connection pooler, aliased as "postgres"
  pgbouncer:
    image: registry.preview.egov.theflywheel.in/edoburu/pgbouncer:latest
    container_name: digit-pgbouncer
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: egov
      DB_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      DB_NAME: egov
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 60
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 10
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "egov"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      egov-network:
        aliases:
          - postgres

  redis:
    image: registry.preview.egov.theflywheel.in/redis:7.2.4
    container_name: digit-redis
    ports:
    - 16379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - egov-network

  # Redpanda - Kafka-compatible streaming (keeping original for now, debugging separately)
  redpanda:
    image: registry.preview.egov.theflywheel.in/redpandadata/redpanda:v24.1.1
    container_name: digit-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 256M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:8082
    ports:
      - 19092:9092
      - 18082:8082
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      egov-network:
        aliases:
          - kafka
          - kafka-v2.kafka-cluster

  # MinIO - S3-compatible object storage for filestore
  minio:
    image: registry.preview.egov.theflywheel.in/minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: digit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - 19000:9000
      - 19001:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egov-network

  # MinIO init - creates the bucket
  minio-init:
    image: registry.preview.egov.theflywheel.in/minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: digit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/egov-rainmaker;
      mc anonymous set download myminio/egov-rainmaker;
      exit 0;
      "
    networks:
      - egov-network

  elasticsearch:
    image: registry.preview.egov.theflywheel.in/docker.elastic.co/elasticsearch/elasticsearch:8.10.3
    profiles: ["search"]
    container_name: digit-elasticsearch
    environment:
    - discovery.type=single-node
    - xpack.security.enabled=false
    - ES_JAVA_OPTS=-Xms256m -Xmx384m
    volumes:
    - es_data:/usr/share/elasticsearch/data
    ports:
    - 19200:9200
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:9200/_cluster/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
    - egov-network

  # ===========================================================================
  # Elasticsearch Indexer - Reads Kafka topics, indexes into Elasticsearch
  # ===========================================================================
  egov-indexer:
    image: egovio/egov-indexer:maven-jdk21-9f83afb
    profiles: ["search"]
    container_name: egov-indexer
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./configs/egov-indexer:/indexer-config:ro
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'false'
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: egov_indexer_schema
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8080
      EGOV_INFRA_INDEXER_HOST: http://elasticsearch:9200/
      EGOV_INDEXER_YML_REPO_PATH: "file:///indexer-config/pgr-services.yml,file:///indexer-config/pgr-inbox-indexer.yml"
      EGOV_MDMS_SEARCH_ENDPOINT: mdms-v2/v1/_search
      EGOV_STATELEVEL_TENANTID: pg
      # No ES auth needed (xpack.security.enabled=false)
      EGOV_INDEXER_ES_USERNAME: ""
      EGOV_INDEXER_ES_PASSWORD: ""
      SECURITY_BASIC_ENABLED: 'false'
      MANAGEMENT_SECURITY_ENABLED: 'false'
      MANAGEMENT_HEALTH_DB_ENABLED: 'false'
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-indexer
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      # heap-tuned via JAVA_OPTS by patch-jvm-heaps.py for egov-indexer
      JAVA_OPTS: "-Xms192m -Xmx512m"
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    ports:
    - 18095:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/egov-indexer/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
    - egov-network

  # ===========================================================================
  # Inbox v2 - Queries Elasticsearch for inbox/search views
  # ===========================================================================
  inbox:
    image: registry.preview.egov.theflywheel.in/egovio/inbox:state-tenant-fix
    profiles: ["search"]
    container_name: digit-inbox
    depends_on:
      pgbouncer:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      egov-workflow-v2:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8080
      SERVICES_ESINDEXER_HOST: http://elasticsearch:9200/
      # No ES auth needed (xpack.security.enabled=false)
      SERVICES_ESINDEXER_USERNAME: ""
      SERVICES_ESINDEXER_PASSWORD: ""
      WORKFLOW_HOST: http://egov-workflow-proxy:8109/
      EGOV_MDMS_HOST: http://egov-mdms-service:8094/
      EGOV_USER_HOST: http://egov-user-proxy:8107/
      STATE_LEVEL_TENANT_ID: mz
      PARENT_LEVEL_TENANT_ID: mz
      WORKFLOW_PROCESS_SEARCH_PATH: egov-workflow-v2/egov-wf/process/_search
      WORKFLOW_BUSINESSSERVICE_SEARCH_PATH: egov-workflow-v2/egov-wf/businessservice/_search
      WORKFLOW_PROCESS_COUNT_PATH: egov-workflow-v2/egov-wf/process/_count
      WORKFLOW_PROCESS_STATUSCOUNT_PATH: egov-workflow-v2/egov-wf/process/_statuscount
      EGOV_MDMS_SEARCH_ENDPOINT: mdms-v2/v1/_search
      SECURITY_BASIC_ENABLED: 'false'
      MANAGEMENT_SECURITY_ENABLED: 'false'
      # Accept unknown fields in userInfo (locale, active, permanentCity etc.)
      SPRING_JACKSON_DESERIALIZATION_FAIL_ON_UNKNOWN_PROPERTIES: 'false'
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: inbox
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: -Xms256m -Xmx256m
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    ports:
    - 18097:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/inbox/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
    - egov-network

  egov-enc-service:
    # `:generatekey-endpoint` stacks the POST /crypto/v1/_generatekey
    # endpoint (Digit-Core #1354) on top of :v2.9.2-4a60f20. Without
    # _generatekey, the first encrypt for a brand-new state root (created
    # by MCP tenant_bootstrap or similar) throws "Tenant Id not found" —
    # enc-service only discovers tenants via MDMS search under
    # STATE_LEVEL_TENANT_ID, and a brand-new root isn't under any
    # existing root's tenant.tenants list. Bump can be replaced with a
    # versioned tag once Digit-Core #1354 lands and a release ships.
    image: registry.preview.egov.theflywheel.in/egovio/egov-enc-service:generatekey-endpoint
    container_name: egov-enc-service
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      # heap-tuned via JAVA_OPTS by patch-jvm-heaps.py for egov-enc-service
      JAVA_OPTS: "-Xms128m -Xmx384m"
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'false'
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: enc_schema_version
      SERVER_PORT: 1234
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-enc-service
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      MASTER_PASSWORD: ${ELASTICSEARCH_MASTER_PASSWORD:-asd@#$@$!132123}
      MASTER_SALT: qweasdzx
      MASTER_INITIALVECTOR: qweasdzxqwea
      MASTER_PASSWORD_PROVIDER: software
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_SEARCH_ENDPOINT: /mdms-v2/v1/_search
      EGOV_STATE_LEVEL_TENANT_ID: pg
      STATE_LEVEL_TENANT_ID: pg.citya
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    ports:
    - 11234:1234
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1234/egov-enc-service/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - egov-network

  # MDMS Backend (actual service)
  mdms-backend:
    image: egovio/mdms-v2:maven-jdk21-9f83afb
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      # heap-tuned via JAVA_OPTS by patch-jvm-heaps.py for mdms-backend
      JAVA_OPTS: "-Xms256m -Xmx768m"
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'false'
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: mdms_schema_version
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8094
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: mdms-backend
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms512m -Xmx1024m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    healthcheck:
      # Check Spring Boot health - Flyway runs before app context starts, so health implies migrations done
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/mdms-v2/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
    - egov-network

  # MDMS Proxy - handles path rewriting for backward compatibility
  # Rewrites /egov-mdms-service/* to /mdms-v2/* for older services
  egov-mdms-service:
    image: registry.preview.egov.theflywheel.in/nginx:alpine
    container_name: egov-mdms-service
    depends_on:
      mdms-backend:
        condition: service_healthy
    volumes:
      - ./nginx/mdms-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
    - 18094:8094
    healthcheck:
      # Simplified: just verify API responds (don't require tenant data)
      test: ["CMD-SHELL", "curl -sf -X POST 'http://localhost:8094/mdms-v2/v1/_search' -H 'Content-Type: application/json' -d '{\"RequestInfo\":{\"apiId\":\"health\"},\"MdmsCriteria\":{\"tenantId\":\"pg\",\"moduleDetails\":[{\"moduleName\":\"tenant\",\"masterDetails\":[{\"name\":\"tenants\"}]}]}}'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
    - egov-network

  egov-idgen:
    image: egovio/egov-idgen:maven-jdk21-9f83afb
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      # heap-tuned via JAVA_OPTS by patch-jvm-heaps.py for egov-idgen
      JAVA_OPTS: "-Xms128m -Xmx384m"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      # Flyway disabled - migrations run by db-migrations container
      SPRING_FLYWAY_ENABLED: 'false'
      EGOV_MDMS_HOST: http://egov-mdms-service:8094/
      MDMS_HOST: http://egov-mdms-service:8094/
      EGOV_MDMS_SEARCH_ENDPOINT: mdms-v2/v1/_search
      MDMS_SERVICE_HOST: http://egov-mdms-service:8094/
      MDMS_SERVICE_SEARCH_URI: mdms-v2/v1/_search
      AUTOCREATE_NEW_SEQ: 'true'
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8088
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-idgen
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      MANAGEMENT_HEALTH_DB_ENABLED: 'false'
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/egov-idgen/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - egov-network

  # audit-service (deployment-parity item #13). Adds the audit QUERY API + the
  # processor that turns raw audit events (process-audit-records) into persist-ready
  # records (persist-audit-records); egov-persister then writes them to eg_audit_logs
  # via configs/egov-persister/audit-service-persister.yml. K8s runs this too
  # (coreservices-helmfile: audit-service installed:true). Compose previously lacked
  # it, so audit capture was non-functional (no eg_audit_logs table). This restores
  # cross-stack parity. Schema is created by the audit-service-db Flyway image below.
  audit-service-migration:
    image: egovio/audit-service-db:v2.9.2-4a60f20
    container_name: audit-service-migration
    depends_on:
      # DIRECT to postgres-db (never the pgbouncer 'postgres' alias, which runs in
      # transaction mode and breaks Flyway's session locks).
      postgres-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/egov
      SCHEMA_TABLE: audit_service_schema
      FLYWAY_USER: egov
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_VALIDATE_ON_MIGRATE: "false"
    restart: "no"
    networks:
      - egov-network

  audit-service:
    image: egovio/audit-service:v2.9.2-4a60f20
    depends_on:
      audit-service-migration:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-enc-service:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms64m -Xmx128m"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      # Flyway disabled on the app — the audit-service-migration init ran it.
      SPRING_FLYWAY_ENABLED: 'false'
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: audit-service
      PROCESS_AUDIT_LOGS_KAFKA_TOPIC: process-audit-records
      PERSIST_AUDIT_LOGS_KAFKA_TOPIC: persist-audit-records
      # integrity-hash signing goes through enc-service (same as K8s EGOV_ENC_SIGN_HOST)
      EGOV_ENC_SIGN_HOST: http://egov-enc-service:1234
      SERVER_PORT: 8080
      SECURITY_BASIC_ENABLED: 'false'
      MANAGEMENT_SECURITY_ENABLED: 'false'
      MANAGEMENT_HEALTH_DB_ENABLED: 'false'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/audit-service/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - egov-network

  # Unified database migrations for all DIGIT services
  # Runs all Flyway migrations in one container before services start
  db-migrations:
    image: registry.preview.egov.theflywheel.in/tilt-demo-db-migrations:latest
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/egov
      FLYWAY_USER: egov
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
    networks:
      - egov-network
    restart: "no"

  egov-user:
    # Custom image stacks (a) the tenant-aware encryption fix from
    # egovernments/Digit-Core#1044 — cherry-pick of c6f5438 + call-site
    # migration 884c5e6 — on (b) the ccc0e13 NPE fix base in
    # _updatenovalidate / profile/_update. Built off the pre-d69ce29
    # commit lineage, so it also sidesteps the SafeHtmlValidator
    # BeanCreationException regression that blocks citizen registration on
    # the stock maven-jdk21-* images (CCRS#771).
    #
    # When Digit-Core#1044 merges upstream and an official
    # `egovio/egov-user:<post-1044>` tag exists, replace this pin with
    # the canonical image.
    #
    # `registry.preview.egov.theflywheel.in` is a read-only HTTPS proxy
    # in front of the egov-ci VPC registry — public cert, no
    # insecure-registries trust required, pullable from anywhere.
    #
    image: registry.preview.egov.theflywheel.in/egovio/egov-user:mobilevalidation-jdk8-4984479
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      egov-enc-service:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      # Flyway disabled - migrations run by db-migrations container
      FLYWAY_ENABLED: 'false'
      # Kafka config - use property name expected by egov-user
      KAFKA_CONFIG_BOOTSTRAP_SERVER_CONFIG: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8107
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_SEARCH_ENDPOINT: /mdms-v2/v1/_search
      MDMS_HOST: http://egov-mdms-service:8094
      MDMS_V2_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_V2_HOST: http://egov-mdms-service:8094
      MDMS_SEARCH_ENDPOINT: /mdms-v2/v1/_search
      EGOV_OTP_HOST: http://kong:8000
      EGOV_USER_HOST: http://localhost:8107
      EGOV_ENC_HOST: http://egov-enc-service:1234
      EGOV_IDGEN_HOST: http://egov-idgen:8088
      EGOV_ACCESSCONTROL_HOST: http://egov-accesscontrol:8090
      EGOV_STATE_LEVEL_TENANT_ID: pg
      STATE_LEVEL_TENANT_ID: pg
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-user
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
      CITIZEN_LOGIN_PASSWORD_OTP_FIXED_ENABLED: 'true'
      CITIZEN_LOGIN_PASSWORD_OTP_FIXED_VALUE: '123456'
      EGOV_MOBILE_VALIDATION_DEFAULT_COUNTRY_CODE: '+91'
      EGOV_MOBILE_VALIDATION_DEFAULT_REGEX: '^[6-9][0-9]{9}$'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8107/user/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - egov-network

  # Nginx reverse proxy for egov-user — distributes requests across
  # scaled instances via Docker DNS round-robin.
  egov-user-proxy:
    image: registry.preview.egov.theflywheel.in/nginx:alpine
    container_name: egov-user-proxy
    depends_on:
      egov-user:
        condition: service_healthy
    volumes:
      - ./nginx/user-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8107/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
    - egov-network

  egov-workflow-v2:
    image: egovio/egov-workflow-v2:maven-jdk21-983e8b2
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-idgen:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      # heap-tuned via JAVA_OPTS by patch-jvm-heaps.py for egov-workflow-v2
      JAVA_OPTS: "-Xms256m -Xmx768m"
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'false'
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: workflow_schema_version
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8109
      EGOV_MDMS_HOST: http://egov-mdms-service:8094/
      EGOV_MDMS_SEARCH_ENDPOINT: mdms-v2/v1/_search
      EGOV_USER_HOST: http://egov-user-proxy:8107/
      STATE_LEVEL_TENANT_ID: pg.citya
      EGOV_STATE_LEVEL_TENANT_ID: pg
      # Disable schema-per-tenant mode - use public schema for all tenants
      IS_ENVIRONMENT_CENTRAL_INSTANCE: 'false'
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: egov-workflow-v2
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      SPRING_THREADS_VIRTUAL_ENABLED: 'true'
      # Raise default search limit from 10 to 200 — PGR's internal workflow call
      # doesn't pass a limit, causing WORKFLOW_NOT_FOUND with >10 complaints.
      # Property names from egov-wf-v2.jar application.properties:
      #   egov.wf.default.limit=10  →  EGOV_WF_DEFAULT_LIMIT
      #   egov.wf.max.limit=100     →  EGOV_WF_MAX_LIMIT
      EGOV_WF_DEFAULT_LIMIT: '200'
      EGOV_WF_MAX_LIMIT: '200'
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -javaagent:/otel/opentelemetry-javaagent.jar ${MAC_JVM_OPTS:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8109/egov-workflow-v2/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - egov-network

  # Nginx reverse proxy for egov-workflow-v2 — distributes requests across
