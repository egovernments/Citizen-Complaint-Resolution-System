      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres-db:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      JAVA_OPTS: '-Xmx96m -Xms96m'
    networks:
      - egov-network

  # ===========================================================================
  # DIGIT UI (React Frontend)
  # Image built by Tilt from CCRS repo, or manually with:
  # docker build -t digit-ui-dev -f ../Citizen-Complaint-Resolution-System/frontend/micro-ui/web/docker/Dockerfile ../Citizen-Complaint-Resolution-System/frontend/micro-ui
  # ===========================================================================
  digit-ui:
    # Parameterized so deploys can pin a nightly-develop (or other) build via
    # DIGIT_UI_IMAGE; default keeps the prior pinned tag. NOTE: this is the
    # legacy micro-ui container — the modern esbuild bundle is laid in via
    # build_digit_ui or served by host nginx (see build/NIGHTLY-BUILDS.md).
    image: ${DIGIT_UI_IMAGE:-registry.preview.egov.theflywheel.in/digit-ui:pgr-fixes}
    container_name: digit-ui
    ports:
      - "18080:80"
    volumes:
      # Custom nginx config with sub_filter to inject globalConfigs.js at runtime
      - ./nginx/digit-ui.conf:/etc/nginx/conf.d/default.conf:ro
      # globalConfigs.js + silent-check-sso.html are served by digit-ui.conf from
      # this DIRECTORY mount (not single-file mounts): OrbStack doesn't reliably
      # materialize a single file nested in the tar'd build dir, and an atomic
      # re-render changes globalConfigs.js's inode (breaking a pinned file mount).
      # A directory mount is OrbStack-safe and reflects re-renders live.
      - ./nginx:/host-nginx:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/digit-ui/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - egov-network

  # ===========================================================================
  # Kong API Gateway (DB-less mode)
  # Main entry point: http://localhost:18000/digit-ui/
  # ===========================================================================
  kong:
    image: registry.preview.egov.theflywheel.in/kong:3.6
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_MEM_CACHE_SIZE: 64m
      KONG_NGINX_WORKER_PROCESSES: auto
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: "cjson, resty.http"
      KONG_NGINX_PROXY_CLIENT_BODY_BUFFER_SIZE: "10m"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "18000:8000"   # Proxy (HTTP)
      - "18443:8443"   # Proxy (HTTPS)
      - "18001:8001"   # Admin API
      - "18002:8002"   # Kong Manager GUI
      - "18100:8100"   # Status endpoint
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
    networks:
      - egov-network

  # ==================== Gatus Health Monitoring ====================
  gatus:
    image: registry.preview.egov.theflywheel.in/twinproduction/gatus:latest
    container_name: digit-gatus
    depends_on:
      pgbouncer:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
    ports:
      - "18889:8080"
    environment:
      GATUS_CONFIG_PATH: /config/config.yaml
    networks:
      - egov-network

  # ==================== Loki Log Aggregation ====================
  loki:
    image: grafana/loki:3.4.2
    container_name: digit-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./otel/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "13100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egov-network

  # Promtail tails every Docker container's stdout/stderr (the JSON-log files
  # under /var/lib/docker/containers) and ships them to Loki. This is what
  # makes raw container logs (nginx fronts, Node.js services, MinIO, Kafka,
  # Postgres, etc.) queryable in Loki — OTLP-emitted Java logs are richer but
  # only cover the Java services. With Promtail, every container is in Loki.
  promtail:
    image: grafana/promtail:3.4.2
    container_name: digit-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./otel/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - egov-network

  # ==================== DIGIT MCP Server ====================
  # The MCP image is built off CCRS. Deploys inside the Hetzner egov VPC
  # pull it from the private registry (10.0.0.4:5000); standalone/public
  # boxes fall back to the pinned public build on ghcr.io (see the
  # digit-mcp `image:` line below).
  # Both services are tagged `mcp` so they only start when the operator
  # explicitly opts in (`COMPOSE_PROFILES=mcp docker compose up`). On a
  # fresh public-internet box, the default deploy skips them entirely —
  # nothing tries to pull an image it can't reach.
  mcp-postgres:
    image: postgres:16-alpine
    container_name: digit-mcp-postgres
    restart: unless-stopped
    profiles: ["mcp"]
    environment:
      POSTGRES_DB: mcp_sessions
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${MCP_DB_PASSWORD:-mcp123}
    volumes:
      - mcp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_sessions"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egov-network

  digit-mcp:
    profiles: ["mcp"]
    # MCP image source resolved at deploy time. The Ansible playbook
    # writes MCP_IMAGE={{ docker_registry }}/digit-mcp:latest into the
    # .env it generates per tenant (so compose picks it up here).
    # When running compose directly without the playbook, the fallback
    # below pulls a public, pinned build from ghcr.io — no VPC access or
    # insecure-registries trust required. Override MCP_IMAGE to use a
    # different registry/tag.
    image: ${MCP_IMAGE:-ghcr.io/subhashini-egov/digit-mcp:2026-06-11}
    container_name: digit-mcp
    restart: unless-stopped
    depends_on:
      mcp-postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      MCP_TRANSPORT: http
      MCP_PORT: "3000"
      # `self-hosted` is the generic env entry — actual URL comes from
      # CRS_API_URL (kong service in this compose). CRS_ENV_NAME is what
      # /v1/version and get_environment_info display; keep it tenant-
      # specific so operators don't see "Chakshu Dev" on their own box.
      CRS_ENVIRONMENT: self-hosted
      CRS_ENV_NAME: ${MCP_ENV_NAME:-Self-hosted DIGIT}
      CRS_API_URL: http://kong:8000
      CRS_USERNAME: ${MCP_USERNAME:-ADMIN}
      CRS_PASSWORD: ${MCP_PASSWORD:-eGov@123}
      CRS_TENANT_ID: ${MCP_TENANT_ID:-pg}
      SESSION_DB_HOST: mcp-postgres
      SESSION_DB_PORT: "5432"
      SESSION_DB_NAME: mcp_sessions
      SESSION_DB_USER: mcp
      SESSION_DB_PASSWORD: ${MCP_DB_PASSWORD:-mcp123}
      EGOV_REDIS_HOST: redis
      EGOV_REDIS_PORT: "6379"
      # DIGIT egov-db read-only pool for the dashboard endpoints
      # (digit-db.ts). Without these, MCP falls back to its in-code
      # defaults (host=docker-postgres, password=egov123) and emits
      # `[digit-db] password authentication failed for user "egov"`
      # on every startup. Route via pgbouncer (`postgres`) — same as
      # every other egov service in this compose.
      DIGIT_DB_HOST: postgres
      DIGIT_DB_PORT: "5432"
      DIGIT_DB_NAME: egov
      DIGIT_DB_USER: egov
      DIGIT_DB_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
    ports:
      - "13101:3000"
    healthcheck:
      # 127.0.0.1, not localhost: Alpine's wget resolves localhost to ::1
      # (IPv6) per /etc/hosts order; the MCP server binds IPv4-only, so
      # the probe gets "Connection refused" and the container is marked
      # unhealthy even though it's serving fine on :3000.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - egov-network

  # ==================== Jupyter Lab for PGR Configuration ====================
  jupyter:
    image: registry.preview.egov.theflywheel.in/tilt-demo-jupyter:latest
    container_name: digit-jupyter
    user: root
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      DIGIT_URL: http://kong:8000
      DIGIT_DIRECT_MDMS: http://egov-mdms-service:8094
      DIGIT_DIRECT_USER: http://egov-user:8107
      DIGIT_DIRECT_PGR: http://pgr-services:8080
      DIGIT_TENANT: pg
      JUPYTER_ENABLE_LAB: "yes"
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.base_url=/jupyter
      --ServerApp.allow_origin='*'
    ports:
      - "18888:8888"
    volumes:
      - ./jupyter/dataloader/templates:/home/jovyan/work/templates
      - ./jupyter/dataloader:/home/jovyan/work/dataloader
      - ./jupyter/dataloader/DataLoader_v2.ipynb:/home/jovyan/work/DataLoader_v2.ipynb
    networks:
      - egov-network

  # ==================== OpenBao (secrets backend) ====================
  # Per-tenant secrets store. File-backed KV v2; the playbook handles
  # init + auto-unseal on first deploy and stores the unseal keys at
  # /opt/digit/.openbao/init.json (0600). Subsequent restarts unseal
  # automatically using those keys.
  #
  # CAVEAT: with the unseal keys on the same host, this protects against
  # plaintext secrets in git + adds an audit trail, but does NOT protect
  # data-at-rest if the box itself is compromised. A real production model
  # uses cloud-KMS auto-unseal or operator-held Shamir shares; that's a
  # follow-up once we have a KMS to point at.
  #
  # Access:
  #   ssh -L 18200:127.0.0.1:18200 egov-{nairobi,bomet}
  #   open http://localhost:18200/ui     (UI)
  #   bao login <root-token-from-init.json>
  openbao:
    image: openbao/openbao:latest
    container_name: openbao
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_ADDR: http://127.0.0.1:8200
      BAO_API_ADDR: http://openbao:8200
      BAO_LOCAL_CONFIG: |
        {
          "storage": { "file": { "path": "/openbao/file" } },
          "listener": [{ "tcp": { "address": "0.0.0.0:8200", "tls_disable": true } }],
          "default_lease_ttl": "168h",
          "max_lease_ttl": "720h",
          "ui": true
        }
    command: ["server"]
    volumes:
      - openbao_data:/openbao/file
    ports:
      - "127.0.0.1:18200:8200"
    networks:
      - egov-network
    healthcheck:
      # 200 = unsealed+active, 429 = unsealed+standby, 472 = data-recovery
      # 473 = perf-standby, 501 = uninitialized, 503 = sealed.
      # Treat sealed/uninitialized as healthy (the playbook will init/unseal).
      test: ["CMD", "wget", "-qO-", "--header=X-Vault-Request: true",
             "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  # ==================== Novu (self-hosted) ============================
  # Five-container Novu community deployment: api + worker + ws +
  # dashboard + dedicated mongo. Reuses the existing `redis` container
  # on DB index 2 (Novu defaults to that index for its cache; the rest
  # of DIGIT uses index 0). Profile-gated like the rest of the
  # notifications stack — won't start unless
  # `COMPOSE_PROFILES=notifications`.
  #
  # Secrets (jwt, encryption key, novu secret key) default to dev
  # values; the Ansible playbook generates real per-tenant secrets
  # from OpenBao before bringing the stack up.
  novu-mongo:
    # docker.io/library/mongo:8.0.3 — not mirrored to registry.preview
    # (yet); ghcr.io/novuhq/* below also pulls direct from GHCR.
    image: mongo:8.0.3
    container_name: novu-mongo
    restart: unless-stopped
    profiles: ["notifications"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${NOVU_MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${NOVU_MONGO_PASSWORD:-secret}
    volumes:
      - novu_mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin | grep -q 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - egov-network

  novu-api:
    image: ghcr.io/novuhq/novu/api:2.3.0
    container_name: novu-api
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      novu-mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      PORT: '3000'
      API_ROOT_URL: ${NOVU_API_ROOT_URL:-http://localhost:14002}
      FRONT_BASE_URL: ${NOVU_FRONT_BASE_URL:-http://localhost:14000/novu}
      MONGO_URL: mongodb://${NOVU_MONGO_USERNAME:-root}:${NOVU_MONGO_PASSWORD:-secret}@novu-mongo:27017/novu-db?authSource=admin
      MONGO_MIN_POOL_SIZE: '10'
      MONGO_MAX_POOL_SIZE: '100'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
      REDIS_DB_INDEX: '2'
      JWT_SECRET: ${NOVU_JWT_SECRET:-dev-jwt-secret-change-in-production-please}
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-change-this-key-32-characters!!!}
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-dev-novu-secret-key-change-in-production}
      API_CONTEXT_PATH: ''
      DISABLE_USER_REGISTRATION: 'false'
      IS_API_IDEMPOTENCY_ENABLED: 'false'
      IS_API_RATE_LIMITING_ENABLED: 'false'
      IS_NEW_MESSAGES_API_RESPONSE_ENABLED: 'true'
      IS_V2_ENABLED: 'true'
      MONGO_AUTO_CREATE_INDEXES: 'true'
    ports:
      - "14002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/v1/health-check >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - egov-network

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:2.3.0
    container_name: novu-worker
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      novu-mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      # Required when NODE_ENV != local (the worker exits with "Missing
      # environment variables: API_ROOT_URL" otherwise). Server-side call,
      # so point at the api service directly — not the nginx-proxied
      # NOVU_API_ROOT_URL public URL the dashboard uses.
      API_ROOT_URL: http://novu-api:3000
      MONGO_URL: mongodb://${NOVU_MONGO_USERNAME:-root}:${NOVU_MONGO_PASSWORD:-secret}@novu-mongo:27017/novu-db?authSource=admin
      MONGO_MAX_POOL_SIZE: '500'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
      REDIS_DB_INDEX: '2'
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-change-this-key-32-characters!!!}
      BROADCAST_QUEUE_CHUNK_SIZE: '100'
      MULTICAST_QUEUE_CHUNK_SIZE: '100'
      IS_EMAIL_INLINE_CSS_DISABLED: 'false'
      IS_USE_MERGED_DIGEST_ID_ENABLED: 'false'
    networks:
      - egov-network

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:2.3.0
    container_name: novu-ws
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      novu-mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      PORT: '3002'
      MONGO_URL: mongodb://${NOVU_MONGO_USERNAME:-root}:${NOVU_MONGO_PASSWORD:-secret}@novu-mongo:27017/novu-db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
      REDIS_DB_INDEX: '2'
      JWT_SECRET: ${NOVU_JWT_SECRET:-dev-jwt-secret-change-in-production-please}
    ports:
      - "14003:3002"
    networks:
      - egov-network

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:2.3.0
    container_name: novu-dashboard
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      novu-api:
        condition: service_started
    environment:
      VITE_API_HOSTNAME: ${NOVU_API_PUBLIC_URL:-http://localhost:14002}
      VITE_WEBSOCKET_HOSTNAME: ${NOVU_WS_PUBLIC_URL:-http://localhost:14003}
      VITE_SELF_HOSTED: 'true'
      VITE_BASE_PATH: /novu
      VITE_PUBLIC_PATH: /novu
      VITE_LEGACY_DASHBOARD_URL: ''
    ports:
      - "14000:4000"
    networks:
      - egov-network

  # Novu Framework "Bridge" endpoint. Novu v2 workflows are Code-First
  # — the workflow definitions (SMS body templates, conditional steps,
  # etc.) live in code, not in the Novu DB. At trigger time, Novu's API
  # calls THIS service to render the step content. Without it every
  # trigger fails with "Bridge execution failed".
  #
  # The workflows are defined in
  # /backend/novu-bridge-endpoint/workflows.js — one per domain event
  # (OTP send + 6 complaint lifecycle events).
  novu-bridge-endpoint:
    image: registry.preview.egov.theflywheel.in/egovio/novu-bridge-endpoint:latest
    container_name: novu-bridge-endpoint
    restart: unless-stopped
    profiles: ["notifications"]
    environment:
      PORT: '3000'
      # MUST match the env API key Novu uses to sign bridge requests
      # (set NOVU_SECRET_KEY in compose .env to whatever the per-env
      # API key Novu generated is, OR leave STRICT_AUTH=false for the
      # in-cluster case where we trust the network).
      NOVU_SECRET_KEY: ${NOVU_BRIDGE_SECRET_KEY:-dev-novu-secret-key-change-in-production}
      STRICT_AUTH: 'false'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - egov-network

  # ==================== Notification stack (opt-in) ====================
  # `digit-config-service` + `digit-user-preferences-service` +
  # `novu-bridge` work together to deliver event-driven WhatsApp/SMS via
  # Twilio (through self-hosted Novu, which the operator opts into
  # separately via the `notifications` profile that brings up
  # novu-api/worker/ws/dashboard + mongo).
  #
  # The pipeline is:
  #   1. A module (e.g. PGR) publishes a domain event to Kafka
  #      (topic: complaints.domain.events).
  #   2. novu-bridge consumes the event, checks the user's notification
  #      consent via digit-user-preferences-service, resolves the
  #      template via digit-config-service, and triggers Novu.
  #   3. Novu's Twilio integration delivers the message to the user.
  #
  # All three are profile-gated — they don't start on a default
  # `docker compose up`. Opt in with `COMPOSE_PROFILES=notifications`.
  # The Ansible playbook flips this on when `enable_novu: true` in
  # host_vars.
  digit-config-service:
    image: registry.preview.egov.theflywheel.in/egovio/digit-config-service:latest
    container_name: digit-config-service
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      # application.properties keeps Flyway URL separate from datasource;
      # both env vars must be set or Flyway falls back to localhost.
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: digit_config_service_schema
      SERVER_PORT: '8080'
      SERVER_SERVLET_CONTEXT_PATH: /config-service
      CONFIG_DEFAULT_OFFSET: '0'
      CONFIG_DEFAULT_LIMIT: '100'
      # MDMS-v2 reachability — config-service validates every `_create`
      # against the registered schema. Without these envs it falls back
      # to application.properties' default (`http://localhost:8083`),
      # which is the container itself → MDMS_VALIDATION_FAILED with
      # "I/O error on POST request" on every record-create.
      MDMS_V2_HOST: http://egov-mdms-service:8094
      MDMS_V2_SCHEMA_SEARCH_PATH: /mdms-v2/schema/v1/_search
      # Tenant root used for fallback schema-search when the request
      # tenant has no schema of its own. Should match the deployment's
      # state-level tenant (set in host_vars).
      STATE_LEVEL_TENANT_ID: ${STATE_LEVEL_TENANT_ID:-pg}
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: digit-config-service
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -javaagent:/otel/opentelemetry-javaagent.jar
    healthcheck:
      # management.endpoints.web.base-path=/ so actuator's /health is at
      # /config-service/health (context-path) — NOT /config-service/actuator/health.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/config-service/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - egov-network

  digit-user-preferences-service:
    image: registry.preview.egov.theflywheel.in/egovio/digit-user-preferences-service:latest
    container_name: digit-user-preferences-service
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      SERVER_PORT: '8080'
      SERVER_CONTEXT_PATH: /user-preference
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: egov
      DB_USER: egov
      DB_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      DB_SSL_MODE: disable
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - egov-network

  novu-bridge:
    # Overridable so Bomet can pull the pass-through build (PGR pre-renders
    # + localizes; the bridge only identifies the Novu subscriber and
    # delivers renderedBody — design D4/D6). CI builds+pushes to the VPC
    # registry; default keeps the prior preview tag.
    image: ${NOVU_BRIDGE_IMAGE:-registry.preview.egov.theflywheel.in/egovio/novu-bridge:latest}
    container_name: novu-bridge
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      digit-config-service:
        condition: service_healthy
      digit-user-preferences-service:
        condition: service_healthy
      novu-api:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      # application.properties hardcodes spring.flyway.url to localhost
      # without an env placeholder — relaxed binding to SPRING_FLYWAY_*
      # is the only way to override.
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_FLYWAY_USER: egov
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_TABLE: novu_bridge_schema
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # application.properties also reads kafka.config.bootstrap_server_config
      # (an egov-services-common convention); set both so any path that
      # reads either picks up the right broker.
      KAFKA_CONFIG_BOOTSTRAP_SERVER_CONFIG: redpanda:9092
      SERVER_PORT: '8080'
      SERVER_SERVLET_CONTEXT_PATH: /novu-bridge
      # Kafka topics (bridge auto-creates if redpanda's
      # auto.create.topics.enable=true; otherwise create them upfront).
      NOVU_BRIDGE_KAFKA_INPUT_TOPIC: complaints.domain.events
      NOVU_BRIDGE_KAFKA_RETRY_TOPIC: novu-bridge.retry
      NOVU_BRIDGE_KAFKA_DLQ_TOPIC: novu-bridge.dlq
      # Channel is compared CASE-SENSITIVELY against the TemplateBinding
      # `channel` field. Our seed data uses lowercase `sms` / `whatsapp`
      # — keep this lowercase too. Override per-tenant in host_vars.
      # (Default SMS: WhatsApp is paused pending an A2P/provider. The config-
      # driven path uses NOVU_BRIDGE_CHANNELS_ENABLED below, not this legacy knob.)
      NOVU_BRIDGE_CHANNEL: ${NOVU_BRIDGE_CHANNEL:-SMS}
      NOVU_BRIDGE_DEFAULT_LOCALE: en_IN
      # NOTE: the preference check calls
      # `digit-user-preferences-service/user-preference/v1/_check`,
      # which 404s on the upstream image (the actual path differs and
      # the controller may not be deployed). Leaving it off lets OTP
      # and complaint events flow; flip to 'true' once preferences are
      # wired up for the tenant.
      NOVU_BRIDGE_PREFERENCE_ENABLED: ${NOVU_BRIDGE_PREFERENCE_ENABLED:-false}
      NOVU_BRIDGE_PREFERENCE_HOST: http://digit-user-preferences-service:8080
      NOVU_BRIDGE_PREFERENCE_CHECK_PATH: /user-preference/v1/_check
      # Full search endpoint (returns the preferences list) — used by the
      # read-only /novu-adapter/v1/preferences proxy for the configurator's
      # User Preferences screen. Distinct from the boolean _check path above.
      NOVU_BRIDGE_PREFERENCE_SEARCH_PATH: /user-preference/v1/_search
      NOVU_BRIDGE_PREFERENCE_CODE: USER_NOTIFICATION_PREFERENCES
      # Per-channel Novu workflow ids the bridge triggers (rendered text
      # travels in payload.body; the workflow is just the delivery shell).
      NOVU_BRIDGE_WORKFLOW_ID_SMS: ${NOVU_BRIDGE_WORKFLOW_ID_SMS:-complaints-sms}
      NOVU_BRIDGE_WORKFLOW_ID_WHATSAPP: ${NOVU_BRIDGE_WORKFLOW_ID_WHATSAPP:-complaints-whatsapp}
      NOVU_BRIDGE_WORKFLOW_ID_EMAIL: ${NOVU_BRIDGE_WORKFLOW_ID_EMAIL:-complaints-email}
      # TTL cache (ms) skips redundant identifies for the same subscriberId.
      NOVU_BRIDGE_IDENTIFY_CACHE_TTL_MS: ${NOVU_BRIDGE_IDENTIFY_CACHE_TTL_MS:-300000}
      # Channels actually delivered. WHATSAPP stays OFF until a legitimate
      # provider is onboarded as a Novu integration (then just add it here).
      NOVU_BRIDGE_CHANNELS_ENABLED: ${NOVU_BRIDGE_CHANNELS_ENABLED:-SMS,EMAIL}
      NOVU_BRIDGE_USER_HOST: http://egov-user:8107
      NOVU_BRIDGE_USER_SEARCH_PATH: /user/_search
      # MDMS_HOST MUST be set. The bridge's application.properties default
      # is `mdms.host=${MDMS_HOST:-http://mdms-v2.egov:8080}` — that host
      # does not resolve on the egov docker network, so the citizen
      # phone-prefix lookup (formatRecipientPhone -> MDMS
      # ValidationConfigs.mobileNumberValidation) throws
      # NB_MDMS_PHONE_PREFIX_UNAVAILABLE and NO notification is ever sent.
      # Setting only MDMS_SEARCH_PATH (as earlier iterations did) is not
      # enough. Verified on Bomet 2026-05-16: with MDMS_HOST unset, every
      # complaint failed here; with it set, prefix resolves (+254) and the
      # pipeline completes through Twilio.
      MDMS_HOST: http://egov-mdms-service:8094
      MDMS_SEARCH_PATH: /mdms-v2/v2/_search
      # Novu API endpoints are populated in iteration 3 once novu-api
      # is in the stack; bridge starts up but won't dispatch until
      # NOVU_BASE_URL + NOVU_API_KEY resolve to a reachable Novu.
      # In-cluster Novu API. Override NOVU_API_KEY at deploy time
      # (Ansible bootstrap step creates an API key and writes it back
      # to the compose .env).
      NOVU_BASE_URL: ${NOVU_BASE_URL:-http://novu-api:3000}
      NOVU_API_KEY: ${NOVU_API_KEY:-changeme}
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: novu-bridge
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -javaagent:/otel/opentelemetry-javaagent.jar
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/novu-bridge/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - egov-network

  # ==================== Keycloak SSO stack (opt-in) ====================
  # `keycloak` + `token-exchange-svc` add OIDC-based SSO on top of DIGIT
  # without touching egov-user's OTP flow. Architecture (Option 4 in the
  # keycloak overlay design doc — no Kong OIDC plugin):
  #
  #   Browser → (OIDC PKCE) → Keycloak → access_token (RS256)
  #   Browser → /token-exchange/exchange (POSTs the access_token)
  #   token-exchange-svc → validates JWT against Keycloak JWKS
  #                      → looks up / creates the matching eg_user via
  #                        egov-user (using DIGIT_SYSTEM_USERNAME)
  #                      → mints a DIGIT access_token and returns it
  #   Browser → uses DIGIT access_token for all downstream API calls
  #
  # Both services are profile-gated — they don't start on a default
  # `docker compose up`. Opt in with `COMPOSE_PROFILES=keycloak`. The
  # Ansible playbook flips this on when `enable_keycloak: true` in
  # host_vars.
  #
  # Keycloak has its OWN Postgres instance (keycloak-postgres) rather
  # than sharing the DIGIT postgres-db. Two reasons:
  #   1. Clean isolation: KC's Liquibase migrations don't entangle with
  #      DIGIT's Flyway history; backups/restores are independent.
  #   2. Works on any tenant: shared-Postgres init scripts only run on
  #      first boot of an empty data dir. Tenants with live DIGIT data
  #      (Bomet/Nairobi) wouldn't get the `keycloak` DB auto-created.
  #      Dedicated container sidesteps the whole problem.
  # The realm is still rendered per-tenant by the playbook and imported
  # via kcadm.sh (the `--import-realm` start flag only handles the
  # static template that ships in the image).
  keycloak-postgres:
    image: postgres:16
    container_name: keycloak-postgres
    restart: unless-stopped
    profiles: ["keycloak"]
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - egov-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    profiles: ["keycloak"]
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: '8180'
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: admin
      # Default-fallback (`admin`) lets the first `docker compose up`
      # succeed before Ansible has written the OpenBao-sourced strong
      # password into .env. The Recreate-with-new-env task later in the
      # playbook then re-applies the real KC_ADMIN_PASSWORD value.
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
    ports:
      - 18180:8180
    volumes:
      # Per-tenant rendered realm goes in here too (written by the
      # keycloak-bootstrap Ansible block). The shipped template stays
      # for reference; it's NOT imported automatically because realm
      # names are tenant-specific.
      - ./keycloak/realm-template.json:/opt/keycloak/data/import/realm-template.json:ro
    healthcheck:
      # KC 24 image is UBI minimal — no curl/wget. Use the bash /dev/tcp
      # trick (KC's start-dev base image has bash + the kc.sh wrapper).
      # We just check the realm endpoint returns "HTTP/1.1 200" / "HTTP/1.0 200".
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180 && printf 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      # `start-dev --import-realm` re-runs the Quarkus augmentation + realm
      # import on EVERY container start, so cold-start to "Listening on 8180"
      # is ~120s (measured ~118s on bomet under a full-stack converge). At the
      # old 60s the container flipped to `unhealthy` mid-startup, and the
      # converge's `up -d` (services depend_on keycloak: service_healthy) aborted
      # "dependency failed to start" — which on Linux ends the whole playbook,
      # silently skipping every later task (configurator build, bootstrap, …).
      # Keep start_period comfortably above real startup so the container stays
      # `starting` (not `unhealthy`) until it's actually up. retries×interval
      # (150s) still catches a genuinely dead keycloak after the grace window.
      start_period: 180s
    networks:
      - egov-network

  # token-exchange-svc — bridges a Keycloak access_token to a DIGIT
  # access_token (and resolves / provisions the matching eg_user).
  # Source: /root/DIGIT-keycloak-overlay (Dockerfile, TypeScript).
  # The image is pre-built and pushed to the preview registry; if you
  # need to rebuild locally, switch from `image:` to a `build:` block
  # pointing at the overlay repo path.
  token-exchange-svc:
    # Published unscoped (not under egovio/) at registry.preview because
    # it predates the namespace standardisation. Pin to :dev for now;
    # bump when a versioned tag is published.
    image: registry.preview.egov.theflywheel.in/token-exchange-svc:keycloak-deploy
    container_name: token-exchange-svc
    restart: unless-stopped
    profiles: ["keycloak"]
    depends_on:
      keycloak:
        condition: service_healthy
      egov-user:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      PORT: '3000'
      KEYCLOAK_ISSUER: http://keycloak:8180/realms/${TOKEN_EXCHANGE_SYSTEM_TENANT}
      KEYCLOAK_JWKS_URI: http://keycloak:8180/realms/${TOKEN_EXCHANGE_SYSTEM_TENANT}/protocol/openid-connect/certs
      # KEYCLOAK_ADMIN_URL: base used by the overlay both for admin REST
      # (/admin/realms/*) AND for the password-grant token endpoint it
      # forwards to. Defaults to localhost:8180 which breaks inside the
      # compose network — pin to the in-network service name.
      KEYCLOAK_ADMIN_URL: http://keycloak:8180
      KEYCLOAK_USER_REALM: ${TOKEN_EXCHANGE_SYSTEM_TENANT}
      # Overlay's KC admin creds default to admin/admin. The real KC
      # admin password is the strong value from OpenBao (which is also
      # what the keycloak container itself was created with). Reuse the
      # same .env variable so the overlay's admin client stays in sync.
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Route through egov-user-proxy on port 8107 (where every other
      # DIGIT service reaches egov-user from — see kong.yml). The proxy
      # is on the egov-network too, listens on 8107, and forwards to
      # the real egov-user container.
      DIGIT_USER_HOST: http://egov-user-proxy:8107
      # The DIGIT API gateway that token-exchange-svc forwards authenticated
      # /kc/* calls to. The keycloak-deploy image defaults DIGIT_GATEWAY_HOST
      # to the legacy zuul address http://gateway:8080, which does not exist
      # on a kong-based stack — kong's proxy listens on :8000 and the service
      # is named `kong`. Without this every /kc/* request 502s with
      # "getaddrinfo EAI_AGAIN gateway". (CCRS#771-adjacent; the block sets
      # DIGIT_USER_HOST but historically omitted the gateway host.)
      DIGIT_GATEWAY_HOST: ${DIGIT_GATEWAY_HOST:-http://kong:8000}
      # Defaults to ADMIN (which user-seed.sh always creates on a
      # fresh DIGIT install). On environments where you have a
      # dedicated INTERNAL_MICROSERVICE_ROLE seeded, override via
      # host_vars + ansible env. Note: matching DIGIT_SYSTEM_USER_TYPE
      # below — ADMIN is EMPLOYEE, INTERNAL_MICROSERVICE_ROLE is SYSTEM.
      DIGIT_SYSTEM_USERNAME: ${TOKEN_EXCHANGE_SYSTEM_USERNAME:-ADMIN}
      DIGIT_SYSTEM_USER_TYPE: ${TOKEN_EXCHANGE_SYSTEM_USER_TYPE:-EMPLOYEE}
      # Same first-boot pattern as KEYCLOAK_ADMIN_PASSWORD above —
      # default lets compose up succeed; Ansible re-applies the real
      # value from OpenBao after the secrets-to-.env task runs.
      DIGIT_SYSTEM_PASSWORD: ${TOKEN_EXCHANGE_SYSTEM_PASSWORD:-eGov@123}
      DIGIT_SYSTEM_TENANT: ${TOKEN_EXCHANGE_SYSTEM_TENANT}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      CACHE_PREFIX: keycloak
      CACHE_TTL_SECONDS: '604800'
    ports:
      # Host port 18200 is already taken by OpenBao on the existing
      # bomet/nairobi deployments — use 18300 instead. The nginx
      # /token-exchange/ location proxies to this port; if you change
      # it here, update the ansible nginx template too.
      - 18300:3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - egov-network
  # otp-publisher — replaces Kong's mock /user-otp termination with a real
  # OTP generator: mint a 6-digit OTP -> cache in Redis -> publish OTP.SEND to
  # kafka complaints.domain.events -> novu-bridge -> Twilio SMS. Part of the
  # SMS-OTP path; gated behind the notifications profile (off by default).
  # Node service vendored at utilities/otp-publisher; built locally via
  # `build_otp_publisher: true` (tag otp-publisher:local) or override with
  # OTP_PUBLISHER_IMAGE.
  otp-publisher:
    image: ${OTP_PUBLISHER_IMAGE:-otp-publisher:local}
    container_name: otp-publisher
    restart: unless-stopped
    profiles: ["notifications"]
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      PORT: '3030'
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      EVENT_TOPIC: complaints.domain.events
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-600}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-pg}
      STATIC_OTP: ${OTP_PUBLISHER_STATIC_OTP:-}
      # Per-tenant recipient for OTP routing; set in host_vars when wiring SMS.
      OTP_RECIPIENT_USER_ID: ${OTP_RECIPIENT_USER_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - egov-network

networks:
  egov-network:
    driver: bridge

volumes:
  postgres_data: null
  es_data: null
  filestore_data: null
  minio_data: null
  tempo_data: null
  grafana_data: null
  prometheus_data: null
  loki_data: null
  promtail_data: null
  mcp_postgres_data: null
  keycloak_postgres_data: null
  openbao_data: null
  novu_mongo_data: null
