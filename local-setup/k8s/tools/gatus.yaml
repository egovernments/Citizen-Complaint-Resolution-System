# Gatus health dashboard for the k3s tier.
#
# Kept in sync with the compose tier: local-setup/gatus/config.yaml.
# Both files define the SAME endpoint catalogue -- identical names, groups, URLs and
# conditions, with no tier-only entries. Only runtime enablement differs.
#
# The optional stacks (otp/search/keycloak/mcp/notifications) and the two nginx proxies
# have no manifests under local-setup/k8s/ yet, so their checks are DEFINED here and
# switched OFF via the GATUS_PROFILE_* / GATUS_PROXIES values in the Deployment env
# below. When those manifests land, flip the matching toggle to "true" -- the endpoint
# blocks already exist, so do not add new ones.
# CI enforces tier parity (.github/workflows/gatus-coverage.yml).
#
# This ConfigMap is the ONLY definition of gatus-config. Tiltfile.k8s used to
# generate one of the same name from gatus/config.yaml; defining it in both places
# makes Tilt abort the entire tier with "Duplicate YAML: ConfigMap gatus-config".
# If you reintroduce generation there, delete this ConfigMap -- never both.
#
# What the old generated-from-compose arrangement bought, and this one gives up:
# tier drift used to be impossible by construction, since both tiers read one file.
# This file duplicates the catalogue so the k3s tier can pin its own toggles, so
# drift is now merely *detected* (by the CI guard above) rather than prevented.
# Keep the two catalogues identical by hand; the guard will fail the PR if you don't.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: digit
data:
  config.yaml: |
    storage:
      type: memory

    ui:
      title: DIGIT Core Services - Health Dashboard
      description: Real-time health monitoring for all DIGIT microservices

    endpoints:
      # ==================== Infrastructure ====================
      # NOTE: the `postgres` Service selects app=pgbouncer, not Postgres itself.
      # The database is reachable as `postgres-db`. Both are checked separately so a
      # dead database cannot hide behind a healthy pooler.
      - name: PostgreSQL
        group: Infrastructure
        url: "tcp://postgres-db:5432"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: PgBouncer
        group: Infrastructure
        url: "tcp://postgres:5432"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Redis
        group: Infrastructure
        url: "tcp://redis:6379"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Redpanda (Kafka)
        group: Infrastructure
        url: "tcp://redpanda:9092"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: MinIO
        group: Infrastructure
        url: "http://minio:9000/minio/health/live"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # ==================== Core Services ====================
      - name: MDMS Service
        group: Core Services
        url: "http://egov-mdms-service:8094/mdms-v2/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: MDMS Backend
        group: Core Services
        url: "http://mdms-backend:8094/mdms-v2/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Encryption Service
        group: Core Services
        url: "http://egov-enc-service:1234/egov-enc-service/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: ID Generation Service
        group: Core Services
        url: "http://egov-idgen:8088/egov-idgen/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: User Service
        group: Core Services
        url: "http://egov-user:8107/user/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Workflow Service
        group: Core Services
        url: "http://egov-workflow-v2:8109/egov-workflow-v2/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Localization Service
        group: Core Services
        url: "http://egov-localization:8096/localization/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Boundary Service
        group: Core Services
        url: "http://boundary-service:8081/boundary-service/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # No HTTP health endpoint exposed; its own container healthcheck is a TCP probe.
      - name: Boundary Management Service
        group: Core Services
        url: "tcp://egov-bndry-mgmnt:8080"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Access Control Service
        group: Core Services
        url: "http://egov-accesscontrol:8090/access/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Persister Service
        group: Core Services
        url: "http://egov-persister:8091/common-persist/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Filestore Service
        group: Core Services
        url: "http://egov-filestore:8083/filestore/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: HRMS Service
        group: Core Services
        url: "http://egov-hrms:8092/egov-hrms/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: URL Shortening Service
        group: Core Services
        url: "http://egov-url-shortening:8080/egov-url-shortening/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # audit-service exists only in docker-compose.egov-digit.yaml (the tenant path
      # ansible deploys); this tier has no audit-service manifest, so GATUS_AUDIT is
      # "false" below -- defined here only to keep both catalogues identical.
      - name: Audit Service
        group: Core Services
        enabled: ${GATUS_AUDIT}
        url: "http://audit-service:8080/audit-service/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # ==================== Optional stacks (profile-gated) ====================
      # These services only exist when their compose profile is active (see
      # docker-compose.egov-digit.yaml), so their checks are gated on a matching
      # GATUS_PROFILE_* variable rather than always running. Gatus treats `enabled`
      # as true when the variable is unset, so every compose file that mounts this
      # config MUST pass each variable explicitly -- the `${VAR:-false}` defaults on
      # the gatus service are what make an unset toggle mean "off" instead of "red".
      #
      # Profiles are declared only in docker-compose.egov-digit.yaml. In the other
      # compose files these services are ungated and always start, so those files
      # pass "true" directly. Keep the toggles beside COMPOSE_PROFILES in .env.

      # -------------------- profile: otp --------------------
      - name: OTP Service
        group: OTP
        enabled: ${GATUS_PROFILE_OTP}
        url: "http://egov-otp:8089/otp/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: User OTP Service
        group: OTP
        enabled: ${GATUS_PROFILE_OTP}
        url: "http://user-otp:8090/user-otp/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].status == UP"

      # The port is a variable because this service listens on 8005 under
      # docker-compose.egov-digit.yaml but on 8080 in every other compose file, and
      # they all share this config. Both work -- SERVER_PORT is honoured either way
      # and the context path is /notification-sms regardless.
      - name: Notification SMS Service
        group: OTP
        enabled: ${GATUS_PROFILE_OTP}
        url: "http://egov-notification-sms:${GATUS_SMS_PORT}/notification-sms/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].status == UP"

      # -------------------- profile: search --------------------
      - name: Elasticsearch
        group: Search
        enabled: ${GATUS_PROFILE_SEARCH}
        url: "http://elasticsearch:9200/_cluster/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Indexer Service
        group: Search
        enabled: ${GATUS_PROFILE_SEARCH}
        url: "http://egov-indexer:8080/egov-indexer/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Inbox Service
        group: Search
        enabled: ${GATUS_PROFILE_SEARCH}
        url: "http://inbox:8080/inbox/actuator/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # -------------------- profile: mcp --------------------
      - name: DIGIT MCP
        group: MCP
        enabled: ${GATUS_PROFILE_MCP}
        url: "http://digit-mcp:3000/healthz"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: MCP Postgres
        group: MCP
        enabled: ${GATUS_PROFILE_MCP}
        url: "tcp://mcp-postgres:5432"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      # -------------------- profile: keycloak --------------------
      - name: Keycloak
        group: Keycloak
        enabled: ${GATUS_PROFILE_KEYCLOAK}
        url: "http://keycloak:8180/realms/master"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Keycloak Postgres
        group: Keycloak
        enabled: ${GATUS_PROFILE_KEYCLOAK}
        url: "tcp://keycloak-postgres:5432"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Token Exchange Service
        group: Keycloak
        enabled: ${GATUS_PROFILE_KEYCLOAK}
        url: "http://token-exchange-svc:3000/healthz"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # -------------------- profile: notifications --------------------
      # novu-worker exposes no port and so cannot be probed; it is deliberately absent.
      - name: Novu API
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://novu-api:3000/v1/health-check"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Novu WS
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "tcp://novu-ws:3002"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Novu Dashboard
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "tcp://novu-dashboard:4000"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Novu Mongo
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "tcp://novu-mongo:27017"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Novu Bridge
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://novu-bridge:8080/novu-bridge/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Novu Bridge Endpoint
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://novu-bridge-endpoint:3000/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Config Service
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://digit-config-service:8080/config-service/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: User Preferences Service
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://digit-user-preferences-service:8080/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: OTP Publisher
        group: Notifications
        enabled: ${GATUS_PROFILE_NOTIFICATIONS}
        url: "http://otp-publisher:3030/healthz"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # ==================== API Gateway ====================
      - name: Kong Gateway (Proxy)
        group: API Gateway
        url: "http://kong:8000/"
        interval: 30s
        conditions:
          - "[STATUS] < 500"

      - name: Kong Admin API
        group: API Gateway
        url: "http://kong:8001/"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Kong Status
        group: API Gateway
        url: "http://kong:8100/status"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # nginx proxies fronting egov-user / egov-workflow-v2. No Deployment for these
      # in the k3s tier yet, so GATUS_PROXIES is "false" here; defined so the two
      # tiers stay identical and flip together once the manifests land.
      - name: User Service Proxy
        group: API Gateway
        enabled: ${GATUS_PROXIES}
        url: "http://egov-user-proxy:8107/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      - name: Workflow Service Proxy
        group: API Gateway
        enabled: ${GATUS_PROXIES}
        url: "http://egov-workflow-proxy:8109/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # ==================== Application Services ====================
      - name: PGR Services
        group: Application
        url: "http://pgr-services:8080/pgr-services/health"
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].status == UP"

      - name: DIGIT UI
        group: Application
        url: "http://digit-ui:80/digit-ui/"
        interval: 30s
        conditions:
          - "[STATUS] == 200"

      # ==================== API Functionality Tests ====================
      - name: MDMS API - Tenant Search
        group: API Tests
        url: "http://egov-mdms-service:8094/mdms-v2/v1/_search"
        method: POST
        headers:
          Content-Type: application/json
        body: |
          {
            "RequestInfo": {"apiId": "digit", "ver": "1.0", "ts": 0},
            "MdmsCriteria": {
              "tenantId": "pg",
              "moduleDetails": [{"moduleName": "tenant", "masterDetails": [{"name": "tenants"}]}]
            }
          }
        interval: 60s
        conditions:
          - "[STATUS] == 200"

      - name: IDGen API - Generate ID
        group: API Tests
        url: "http://egov-idgen:8088/egov-idgen/id/_generate"
        method: POST
        headers:
          Content-Type: application/json
        body: |
          {
            "RequestInfo": {"apiId": "digit", "ver": "1.0"},
            "idRequests": [{"tenantId": "pg", "idName": "pgr.servicerequestid"}]
          }
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].responseInfo.status == SUCCESSFUL"

      - name: Localization API - Message Search
        group: API Tests
        url: "http://egov-localization:8096/localization/messages/v1/_search?tenantId=pg&locale=en_IN&module=rainmaker-common"
        method: POST
        headers:
          Content-Type: application/json
        body: |
          {
            "RequestInfo": {"apiId": "digit", "ver": "1.0"}
          }
        interval: 60s
        conditions:
          - "[STATUS] == 200"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: digit
  labels:
    app: gatus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      containers:
        - name: gatus
          image: localhost:5000/twinproduction/gatus:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GATUS_CONFIG_PATH
              value: /config/config.yaml
            # k3s has no manifests for the optional stacks, so every toggle is off.
            # Flip one to "true" only once the matching manifests land under
            # local-setup/k8s/ -- keep it in step with the compose tier.
            - name: GATUS_PROFILE_OTP
              value: "false"
            - name: GATUS_PROFILE_SEARCH
              value: "false"
            - name: GATUS_PROFILE_MCP
              value: "false"
            - name: GATUS_PROFILE_KEYCLOAK
              value: "false"
            - name: GATUS_PROFILE_NOTIFICATIONS
              value: "false"
            # No nginx proxy Deployments in the k3s tier either.
            # No audit-service Deployment in the k3s tier either.
            - name: GATUS_AUDIT
              value: "false"
            - name: GATUS_PROXIES
              value: "false"
            - name: GATUS_SMS_PORT
              value: "8080"
          resources:
            limits:
              memory: 64Mi
              cpu: "100m"
            requests:
              memory: 32Mi
              cpu: "50m"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: gatus-config
              mountPath: /config/config.yaml
              subPath: config.yaml
      volumes:
        - name: gatus-config
          configMap:
            name: gatus-config
---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: digit
spec:
  selector:
    app: gatus
  ports:
    - port: 8080
      targetPort: 8080
