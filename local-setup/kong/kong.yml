_format_version: '3.0'
_transform: true
consumers:
- username: digit-dev
  keyauth_credentials:
  - key: digit-dev-api-key-change-me
  tags:
  - development
- username: digit-admin
  keyauth_credentials:
  - key: digit-admin-api-key-change-me
  tags:
  - admin
plugins:
- name: opentelemetry
  config:
    endpoint: http://otel-collector:4318/v1/traces
    resource_attributes:
      service.name: kong-gateway
    header_type: w3c
- name: cors
  config:
    origins:
    - '*'
    methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
    headers:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-Type
    - Authorization
    - X-API-Key
    - X-Requested-With
    - auth-token
    exposed_headers:
    - X-Auth-Token
    credentials: true
    max_age: 3600
- name: request-size-limiting
  config:
    allowed_payload_size: 10
    size_unit: megabytes
- name: pre-function
  config:
    access:
      - |
        -- Auth enrichment: resolve authToken → userInfo (mirrors Spring Cloud Gateway AuthCheckFilterHelper)
        local cjson = require("cjson")
        local http = require("resty.http")
        if kong.request.get_method() ~= "POST" then return end
        local raw_body = kong.request.get_raw_body()
        if not raw_body or raw_body == "" then return end
        local ok, body = pcall(cjson.decode, raw_body)
        if not ok or type(body) ~= "table" then return end
        local ri = body["RequestInfo"]
        if not ri or type(ri) ~= "table" then return end
        local token = ri["authToken"]
        if not token or type(token) ~= "string" or token == "" then return end
        if ri["userInfo"] and type(ri["userInfo"]) == "table" then
          local ui = ri["userInfo"]
          if ui["uuid"] or ui["id"] or ui["userName"] then return end
        end
        local httpc = http.new()
        httpc:set_timeout(5000)
        local res, err = httpc:request_uri("http://egov-user-proxy:8107/user/_details?access_token=" .. token, {
          method = "POST",
          headers = { ["Content-Type"] = "application/json" },
        })
        if not res then kong.log.err("auth-enrichment: ", err); return end
        if res.status ~= 200 then kong.log.err("auth-enrichment: status ", res.status); return end
        local ok2, user = pcall(cjson.decode, res.body)
        if not ok2 or type(user) ~= "table" then return end
        if not user["uuid"] and not user["userName"] then return end
        ri["userInfo"] = user
        body["RequestInfo"] = ri
        kong.service.request.set_raw_body(cjson.encode(body))
