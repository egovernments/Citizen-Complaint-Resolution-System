- name: location-service
  url: http://boundary-service:8081
  tags:
  - core
  routes:
  - name: location-route
    paths:
    - /egov-location
    strip_path: false
  plugins:
  - name: pre-function
    config:
      access:
        - |
          -- Adapter: egov-location → boundary-service with response transform
          local cjson = require("cjson")
          local http = require("resty.http")
          local uri = kong.request.get_path_with_query()
          if not uri:find("/boundarys/_search") then return end
          local tenant = kong.request.get_query_arg("tenantId")
          local hier = kong.request.get_query_arg("hierarchyTypeCode") or "ADMIN"
          if not tenant then
            kong.response.exit(400, cjson.encode({error="tenantId required"}), {["Content-Type"]="application/json"})
            return
          end
          local raw_body = kong.request.get_raw_body() or "{}"
          local httpc = http.new()
          httpc:set_timeout(10000)
          local search_url = "http://boundary-service:8081/boundary-service/boundary-relationships/_search?tenantId=" .. tenant .. "&hierarchyType=" .. hier .. "&includeChildren=true"
          local res, err = httpc:request_uri(search_url, {
            method = "POST", body = raw_body,
            headers = { ["Content-Type"] = "application/json" },
          })
          if not res then
            kong.response.exit(502, cjson.encode({error="boundary-service unreachable: " .. (err or "")}), {["Content-Type"]="application/json"})
            return
          end
          if res.status ~= 200 then
            kong.response.exit(res.status, res.body, {["Content-Type"]="application/json"})
            return
          end
          local ok, data = pcall(cjson.decode, res.body)
          if not ok then
            kong.response.exit(502, res.body, {["Content-Type"]="application/json"})
            return
          end
          -- Transform TenantBoundary to old egov-location format
          -- cjson encodes empty Lua tables as {} (object), not [] (array).
          -- Use cjson.empty_array to preserve empty arrays for boundary/children.
          local empty_arr = cjson.empty_array
          local function is_empty_table(t)
            return type(t) == "table" and next(t) == nil
          end
          local tbs = data["TenantBoundary"] or {}
          for _, tb in ipairs(tbs) do
            local ht = tb["hierarchyType"]
            if type(ht) == "string" then
              tb["hierarchyType"] = { code = ht, name = ht }
            elseif ht == nil or ht == cjson.null then
              tb["hierarchyType"] = { code = hier, name = hier }
            end
            -- Add name/label fields to boundaries recursively
            local function enrich(nodes)
              for _, n in ipairs(nodes) do
                if not n["name"] then n["name"] = n["code"] end
                if not n["localname"] then n["localname"] = n["code"] end
                if not n["label"] then n["label"] = n["boundaryType"] or "" end
                local ch = n["children"]
                if is_empty_table(ch) or ch == nil or ch == cjson.null then
                  n["children"] = empty_arr
                else
                  enrich(ch)
                end
              end
            end
            local bs = tb["boundary"]
            if is_empty_table(bs) or bs == nil or bs == cjson.null then
              tb["boundary"] = empty_arr
            elseif type(bs) == "table" then
              enrich(bs)
            end
          end
          kong.response.exit(200, cjson.encode(data), {["Content-Type"]="application/json"})
