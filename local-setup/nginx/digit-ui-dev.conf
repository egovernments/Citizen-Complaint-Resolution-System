server
{
  listen 80;
  underscores_in_headers on;

  # Proxy digit-ui to CRA dev server running on Windows host (port 3000)
  # host.docker.internal resolves to the Windows host from inside Docker Desktop
  location /digit-ui
  {
    proxy_pass http://host.docker.internal:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host localhost;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
  }

  # WebSocket for HMR - CRA 4 uses /sockjs-node
  location /sockjs-node
  {
    proxy_pass http://host.docker.internal:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # WebSocket for HMR - CRA 5+ uses /ws
  location /ws
  {
    proxy_pass http://host.docker.internal:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Serve globalConfigs.js
  location = /digit-ui/globalConfigs.js
  {
    alias /var/web/digit-ui/globalConfigs.js;
    default_type application/javascript;
  }

  # Proxy DIGIT API calls to Kong so UI also works on direct digit-ui port (:18080)
  location ~ ^/(mdms-v2|localization|egov-location|egov-workflow-v2|pgr-services|filestore|egov-hrms|user|boundary-service|egov-idgen|access|common-persist|egov-bndry-mgmnt|inbox)(/|$) {
    proxy_pass http://kong:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
