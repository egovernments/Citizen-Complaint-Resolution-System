server
{
  listen 80;
  underscores_in_headers on;

  # Enable sub_filter for HTML injection
  sub_filter_once on;
  sub_filter_types text/html;

  location /digit-ui
  {
    root /var/web;
    index index.html index.htm;
    try_files $uri $uri/ /digit-ui/index.html;

    # Inject globalConfigs.js script tag before </head>
    sub_filter '</head>' '<script src="/digit-ui/globalConfigs.js"></script></head>';
  }

  # Serve globalConfigs.js
  location = /digit-ui/globalConfigs.js {
    alias /var/web/digit-ui/globalConfigs.js;
    default_type application/javascript;
  }

  location = /digit-ui/silent-check-sso.html {
    alias /var/web/digit-ui/silent-check-sso.html;
    default_type text/html;
  }

  # Proxy backend API calls to Kong gateway
  # This is needed because the frontend makes API calls to the same origin
  location ~ ^/(mdms-v2|egov-mdms-service|user|user-otp|localization|filestore|pgr-services|egov-workflow-v2|egov-hrms|access|boundary-service|egov-idgen|egov-persister|egov-accesscontrol)/ {
    proxy_pass http://kong:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Pass through all headers including auth-token
    proxy_pass_request_headers on;
  }
}
