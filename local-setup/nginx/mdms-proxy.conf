server {
    listen 8094;

    # Docker internal DNS for dynamic resolution of scaled services
    resolver 127.0.0.11 valid=5s;

    # Rewrite old MDMS v1 paths to mdms-v2 paths
    location /egov-mdms-service/ {
        # set MUST come before rewrite-break (both are rewrite-phase directives)
        set $mdms_upstream mdms-backend;
        rewrite ^/egov-mdms-service/(.*)$ /mdms-v2/$1 break;
        proxy_pass http://$mdms_upstream:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Pass through mdms-v2 paths directly
    location /mdms-v2/ {
        set $mdms_upstream mdms-backend;
        proxy_pass http://$mdms_upstream:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
