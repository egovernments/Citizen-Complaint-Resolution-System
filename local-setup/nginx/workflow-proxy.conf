server {
    listen 8109;

    # Docker internal DNS for dynamic resolution of scaled services
    resolver 127.0.0.11 valid=5s;

    # Proxy all workflow requests to egov-workflow-v2 instances
    location / {
        set $workflow_upstream egov-workflow-v2;
        proxy_pass http://$workflow_upstream:8109;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
