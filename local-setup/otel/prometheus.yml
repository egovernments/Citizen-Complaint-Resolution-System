global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # All JVM/runtime metrics flow OTLP → otel-collector → /metrics on :8889.
  # Prometheus scrapes that single endpoint; per-service `job` labels come
  # from the OTEL resource attribute `service.name`.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # Host-level metrics (CPU/mem/disk/net) from node-exporter, added by the
  # docker-compose.monitoring.yml overlay (issue #1335). Reached by DNS name
  # over egov-network. Feeds the "Node Exporter Full" Grafana dashboard.
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
