global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # All JVM/runtime metrics flow OTLP → otel-collector → /metrics on :8889.
  # Prometheus scrapes that single endpoint; per-service `job` labels come
  # from the OTEL resource attribute `service.name`.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
