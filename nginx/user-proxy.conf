server {
    listen 8107;

    # Docker internal DNS for dynamic resolution of scaled services
    resolver 127.0.0.11 valid=5s;

    # Proxy all user requests to egov-user instances
    location / {
        set $user_upstream egov-user;
        proxy_pass http://$user_upstream:8107;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
