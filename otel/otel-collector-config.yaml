receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_mib: 200
  # Browser dashboard metrics (#1110) arrive as DELTA-temporality histograms
  # (ephemeral emitters can't hold cumulative state); the prometheus exporter
  # needs CUMULATIVE, so accumulate deltas here. Inert for the (cumulative)
  # javaagent metrics already flowing through this pipeline.
  deltatocumulative:

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  # Expose collected OTLP metrics in Prometheus scrape format on :8889/metrics.
  # `service.name` from OTLP resource attributes is mapped to the `job` label so
  # the JVM dashboard can group panels by service.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, deltatocumulative, batch]
      exporters: [prometheus]
