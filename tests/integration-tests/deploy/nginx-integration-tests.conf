# Integration-tests dashboards for the bomet vhost.
#
# Drop these two location blocks INSIDE the existing
#   server { server_name bometfeedbackhub.digit.org; ... }
# in /etc/nginx/sites-available/bometfeedbackhub.digit.org, then:
#   sudo nginx -t && sudo nginx -s reload
#
# Mirrors naipepea's /tests/ + /tests-v2/ pair. Both are STATIC, basic-auth
# protected, and must NOT shadow /digit-ui/, /configurator/, /user/,
# /egov-*/, /pgr-services/, /file-store/, /boundary-service/,
# /egov-rainmaker/, /egov-workflow-v2/. They don't — the paths are unique.
#
# Create the htpasswd once (not in git):
#   sudo htpasswd -c /etc/nginx/.htpasswd-tests digit-tests

# Vanilla test catalog dashboard + per-run Playwright reports
location /integration-tests/ {
  alias /opt/integration-tests/dist/;
  autoindex off;
  auth_basic "DIGIT integration tests";
  auth_basic_user_file /etc/nginx/.htpasswd-tests;
  add_header Cache-Control "no-cache, must-revalidate" always;
  try_files $uri $uri/ $uri/index.html =404;
}

# React-admin dashboard rebuild (v2) — reads the same catalog.json
location /integration-tests-v2/ {
  alias /opt/integration-tests/dist-v2/;
  autoindex off;
  auth_basic "DIGIT integration tests";
  auth_basic_user_file /etc/nginx/.htpasswd-tests;
  add_header Cache-Control "no-cache, must-revalidate" always;
  try_files $uri $uri/ /integration-tests-v2/index.html =404;
}
